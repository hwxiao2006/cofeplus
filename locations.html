<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>点位管理 - 运营控制台</title>
    <meta name="format-detection" content="telephone=no">
    <style>
        :root {
            --primary: #4ecdc4;
            --primary-dark: #3dbdb4;
            --primary-light: #e8f8f7;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --bg-sidebar: #0b132b;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* 侧边栏 */
        .sidebar {
            --sidebar-header-padding-x: 24px;
            --sidebar-nav-padding-x: 12px;
            --sidebar-section-title-padding-x: 14px;
            width: 240px;
            background: var(--bg-sidebar);
            color: #dbeafe;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px var(--sidebar-header-padding-x);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-title {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
        }

        .sidebar-meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
            padding-left: calc(var(--sidebar-nav-padding-x) + var(--sidebar-section-title-padding-x) - var(--sidebar-header-padding-x));
            min-width: 0;
        }

        .brand-version {
            font-size: 12px;
            line-height: 1;
            color: rgba(219, 234, 254, 0.55);
            white-space: nowrap;
        }


        .sidebar-login {
            margin-top: 8px;
            padding-top: 8px;
            padding-left: calc(var(--sidebar-nav-padding-x) + var(--sidebar-section-title-padding-x) - var(--sidebar-header-padding-x));
            border-top: 1px solid rgba(219, 234, 254, 0.12);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            font-size: 11px;
        }

        .sidebar-login-name {
            color: rgba(241, 245, 249, 0.86);
            font-weight: 500;
            line-height: 1.2;
            flex: 0 0 auto;
            font-size: 1em;
        }

        .sidebar-login-phone {
            color: rgba(219, 234, 254, 0.58);
            line-height: 1.2;
            flex: 0 0 auto;
            white-space: nowrap;
            font-size: 1em;
        }

        .sidebar-login-phone::before {
            content: '·';
            color: rgba(219, 234, 254, 0.46);
            margin: 0 6px;
        }
        .sidebar-admin-lang {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            color: rgba(219, 234, 254, 0.62);
            font-size: 11px;
            line-height: 1;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .sidebar-admin-lang::before {
            content: '·';
            color: rgba(219, 234, 254, 0.32);
            margin-right: 2px;
        }

        .sidebar-admin-lang-btn {
            border: 0;
            padding: 0;
            background: transparent;
            color: inherit;
            font: inherit;
            cursor: pointer;
            transition: color 0.15s ease, opacity 0.15s ease;
            opacity: 0.78;
        }

        .sidebar-admin-lang-btn:hover {
            color: #ffffff;
            opacity: 1;
        }

        .sidebar-admin-lang-btn.active {
            color: #ffffff;
            opacity: 1;
            font-weight: 600;
        }

        .sidebar-admin-lang-sep {
            opacity: 0.34;
        }

        .sidebar-nav {
            flex: 1;
            padding: 8px var(--sidebar-nav-padding-x);
            min-height: 0;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 8px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: rgba(186, 230, 253, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px var(--sidebar-section-title-padding-x);
            margin-bottom: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 11px 14px;
            margin-bottom: 2px;
            color: rgba(219, 234, 254, 0.88);
            text-decoration: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .nav-item:hover {
            background: rgba(46, 196, 182, 0.14);
            color: #ffffff;
        }

        .nav-item.active {
            background: linear-gradient(130deg, rgba(46, 196, 182, 0.38), rgba(56, 189, 248, 0.38));
            color: #ffffff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        /* 主内容 */
        .main {
            flex: 1;
            margin-left: 240px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .mobile-header {
            display: none;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid var(--border);
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .header-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.35);
        }

        .content {
            padding: 24px 28px;
            flex: 1;
        }

        /* 搜索栏 */
        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .search-select {
            min-width: 180px;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text-primary);
            background: #fff;
            outline: none;
            transition: all 0.2s;
        }

        .search-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #fff;
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-icon.blue { background: #e0f2fe; }
        .stat-icon.green { background: #d1fae5; }
        .stat-icon.orange { background: #fef3c7; }
        .stat-icon.purple { background: #f3e8ff; }

        .stat-content {
            flex: 1;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 点位列表 */
        .location-list {
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .list-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .location-item {
            padding: 16px 20px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: background 0.2s;
        }

        .location-item:hover {
            background: #fafafa;
        }

        .location-item:last-child {
            border-bottom: none;
        }

        .location-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--primary-light) 0%, #e0f2fe 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
        }

        .location-info {
            flex: 1;
            min-width: 0;
        }

        .location-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .location-meta {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .location-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .location-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-operational {
            background: var(--success-light);
            color: var(--success);
        }

        .status-closed {
            background: var(--bg-body);
            color: var(--text-tertiary);
        }

        .location-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            background: #fff;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--primary-light);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-tertiary);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            padding: 20px 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            font-size: 20px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .modal-body {
            padding: 20px 24px;
            overflow-y: auto;
            max-height: calc(90vh - 140px);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .form-label .required {
            color: var(--danger);
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text-primary);
            background: #fff;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .form-textarea {
            min-height: 80px;
            resize: vertical;
        }

        .code-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .code-input-group .form-input {
            flex: 1;
        }

        .code-regenerate-btn {
            padding: 0 12px;
            height: 40px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-body);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .code-regenerate-btn:hover {
            border-color: var(--primary);
            color: var(--primary-dark);
            background: var(--primary-light);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .modal-footer {
            padding: 16px 24px 24px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn-default {
            background: var(--bg-body);
            color: var(--text-secondary);
        }

        .btn-default:hover {
            background: var(--border);
            color: var(--text-primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--text-primary);
            color: white;
            padding: 12px 20px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            z-index: 2000;
            opacity: 0;
            transform: translateX(100px);
            transition: all 0.3s ease;
            box-shadow: var(--shadow-lg);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(0);
        }

        .toast.success {
            background: var(--success);
        }

        /* 遮罩层 */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }

        .overlay.show {
            display: block;
        }

        /* 移动端 */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
            }

            .mobile-header {
                display: flex;
            }

            .header {
                padding: 16px;
            }

            .content {
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
        /* 跨页统一优化（桌面 + 移动） */
        .content {
            width: 100%;
            max-width: 1480px;
            margin: 0 auto;
        }

        .header {
            padding: 18px 28px;
        }

        @media (max-width: 768px) {
            .header {
                padding: 14px 14px 12px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .header-title {
                font-size: 30px;
                line-height: 1;
            }

            .header-right {
                flex-direction: row;
                gap: 8px;
                flex-wrap: wrap;
            }

            .content {
                padding: 14px;
            }

            .filter-section,
            .stats-bar,
            .table-wrap,
            .list-wrap {
                border-radius: 14px;
                box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <!-- 侧边栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <div class="brand-icon"><img src="logo.png" alt="COFE+"></div>
                    <div class="brand-title">运营控制台</div>
                </div>
                <div class="sidebar-meta-row">
                    <div class="brand-version">Prototype v0</div>
                    <div class="sidebar-admin-lang" role="group" aria-label="后台菜单语言">
                        <button type="button" class="sidebar-admin-lang-btn" data-admin-lang-option="zh" onclick="setAdminSidebarLang('zh')" aria-pressed="false">中</button>
                        <span class="sidebar-admin-lang-sep">|</span>
                        <button type="button" class="sidebar-admin-lang-btn" data-admin-lang-option="en" onclick="setAdminSidebarLang('en')" aria-pressed="false">EN</button>
                    </div>
                </div>
                <div class="sidebar-login">
                    <div class="sidebar-login-name" id="sidebarLoginName">-</div>
                    <div class="sidebar-login-phone" id="sidebarLoginPhone">-</div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">运营管理</div>
                    <a href="overview.html" class="nav-item"><span class="nav-icon">📊</span><span>总览</span></a>
                    <a href="devices.html" class="nav-item"><span class="nav-icon">⚙️</span><span>设备</span></a>
                    <a href="menu-management.html" class="nav-item"><span class="nav-icon">📋</span><span>商品管理</span></a>
                    <a href="materials.html" class="nav-item"><span class="nav-icon">📦</span><span>物料</span></a>
                    <a href="orders.html" class="nav-item"><span class="nav-icon">📝</span><span>订单</span></a>
                    <a href="faults.html" class="nav-item"><span class="nav-icon">🛠️</span><span>故障列表</span></a>
                    <a href="staff-management.html" class="nav-item"><span class="nav-icon">👥</span><span>人员管理</span></a>
                </div>
                <div class="nav-section">
                    <div class="nav-section-title">基础信息管理</div>
                    <a href="customers.html" class="nav-item"><span class="nav-icon">🏢</span><span>客户管理</span></a>
                    <a href="locations.html" class="nav-item active"><span class="nav-icon">📍</span><span>点位管理</span></a>
                </div>
            </nav>
        </aside>

        <!-- 主内容 -->
        <main class="main">
            <div class="mobile-header">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <strong>点位管理</strong>
            </div>

            <header class="header">
                <div class="header-left">
                    <h1 class="header-title">点位管理</h1>
                    <span class="header-desc">管理设备点位信息和运营状态</span>
                </div>
                <div class="header-right">
                    <button class="btn btn-primary" onclick="openModal()">
                        <span>➕</span>
                        <span>新增点位</span>
                    </button>
                </div>
            </header>

            <div class="content">
                <!-- 统计卡片 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon blue">📍</div>
                        <div class="stat-content">
                            <div class="stat-value" id="totalLocations">0</div>
                            <div class="stat-label">点位总数</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green">✅</div>
                        <div class="stat-content">
                            <div class="stat-value" id="activeLocations">0</div>
                            <div class="stat-label">运营中</div>

    <!-- 新增/编辑点位模态框 -->

                    <label class="form-label">点位分类 <span class="required">*</span></label>

    <div class="toast" id="toast"></div>

    <script>

        const SIDEBAR_LOGIN_PROFILE_KEY = 'sidebarLoginProfile';
        const DEFAULT_SIDEBAR_LOGIN_PROFILE = {
            name: '运营管理员',
            phone: '13800138000'
        };

        const ADMIN_SIDEBAR_LANG_KEY = 'adminSidebarLang';
        const ADMIN_SIDEBAR_TRANSLATIONS = {
            zh: {
                brand_console: '运营控制台',
                section_operations: '运营管理',
                section_foundation: '基础信息管理',
                nav_overview: '总览',
                nav_devices: '设备',
                nav_menu_management: '商品管理',
                nav_materials: '物料',
                nav_orders: '订单',
                nav_faults: '故障列表',
                nav_staff: '人员管理',
                nav_customers: '客户管理',
                nav_locations: '点位管理',
                page_overview: '总览',
                page_devices: '设备',
                page_menu_management: '商品管理',
                page_materials: '物料管理',
                page_orders: '订单',
                page_faults: '故障管理',
                page_customers: '客户管理',
                page_locations: '点位管理',
                page_staff_management: '人员管理',
                page_product_detail: '商品详情'
            },
            en: {
                brand_console: 'Operations Console',
                section_operations: 'Operations',
                section_foundation: 'Basic Info',
                nav_overview: 'Overview',
                nav_devices: 'Devices',
                nav_menu_management: 'Catalog',
                nav_materials: 'Materials',
                nav_orders: 'Orders',
                nav_faults: 'Faults',
                nav_staff: 'Staff',
                nav_customers: 'Customers',
                nav_locations: 'Locations',
                page_overview: 'Overview',
                page_devices: 'Devices',
                page_menu_management: 'Catalog',
                page_materials: 'Materials',
                page_orders: 'Orders',
                page_faults: 'Faults',
                page_customers: 'Customers',
                page_locations: 'Locations',
                page_staff_management: 'Staff',
                page_product_detail: 'Product Detail'
            }
        };
        const ADMIN_SIDEBAR_PAGE_TITLE_BY_PATH = {
            'overview.html': 'page_overview',
            'devices.html': 'page_devices',
            'menu-management.html': 'page_menu_management',
            'materials.html': 'page_materials',
            'orders.html': 'page_orders',
            'faults.html': 'page_faults',
            'customers.html': 'page_customers',
            'locations.html': 'page_locations',
            'staff-management.html': 'page_staff_management',
            'product-detail.html': 'page_product_detail'
        };
        let adminSidebarLang = 'zh';

        function getAdminSidebarLang() {
            try {
                const savedLang = localStorage.getItem(ADMIN_SIDEBAR_LANG_KEY);
                return savedLang === 'en' ? 'en' : 'zh';
            } catch (e) {
                return 'zh';
            }
        }

        function translateAdminSidebar(key) {
            const dictionary = ADMIN_SIDEBAR_TRANSLATIONS[adminSidebarLang] || ADMIN_SIDEBAR_TRANSLATIONS.zh;
            return dictionary[key] || ADMIN_SIDEBAR_TRANSLATIONS.zh[key] || '';
        }

        function getAdminSidebarCurrentPage() {
            if (!window || !window.location) return '';
            const pathname = String(window.location.pathname || '');
            return pathname.split('/').pop();
        }

        function getAdminSidebarNavKey(item) {
            if (!item) return '';
            const tab = item.dataset ? item.dataset.tab : '';
            if (tab === 'overview') return 'nav_overview';
            if (tab === 'menu') return 'nav_menu_management';

            const href = item.getAttribute ? item.getAttribute('href') : '';
            switch (href) {
                case 'overview.html': return 'nav_overview';
                case 'devices.html': return 'nav_devices';
                case 'menu-management.html': return 'nav_menu_management';
                case 'materials.html': return 'nav_materials';
                case 'orders.html': return 'nav_orders';
                case 'faults.html': return 'nav_faults';
                case 'staff-management.html': return 'nav_staff';
                case 'customers.html': return 'nav_customers';
                case 'locations.html': return 'nav_locations';
                default: return '';
            }
        }

        function getAdminSidebarMobileTitleKey() {
            const currentPage = getAdminSidebarCurrentPage();
            if (currentPage === 'menu.html') {
                if (typeof currentTab === 'string' && currentTab === 'menu') {
                    return 'page_menu_management';
                }
                return 'page_overview';
            }
            return ADMIN_SIDEBAR_PAGE_TITLE_BY_PATH[currentPage] || '';
        }

        function renderAdminSidebarTranslations() {
            adminSidebarLang = getAdminSidebarLang();

            const brandTitle = document.querySelector('.brand-title');
            if (brandTitle) {
                brandTitle.textContent = translateAdminSidebar('brand_console');
            }

            const sectionTitles = document.querySelectorAll('.nav-section-title');
            if (sectionTitles[0]) {
                sectionTitles[0].textContent = translateAdminSidebar('section_operations');
            }
            if (sectionTitles[1]) {
                sectionTitles[1].textContent = translateAdminSidebar('section_foundation');
            }

            document.querySelectorAll('.sidebar-nav .nav-item').forEach(item => {
                const labelNode = item.querySelector('span:last-child');
                const key = getAdminSidebarNavKey(item);
                if (labelNode && key) {
                    labelNode.textContent = translateAdminSidebar(key);
                }
            });

            const mobileHeaderTitle = document.querySelector('.mobile-header strong, .mobile-header span[style], .mobile-header .mobile-header-title');
            const mobileTitleKey = getAdminSidebarMobileTitleKey();
            if (mobileHeaderTitle && mobileTitleKey) {
                mobileHeaderTitle.textContent = translateAdminSidebar(mobileTitleKey);
            }

            document.querySelectorAll('[data-admin-lang-option]').forEach(button => {
                const active = button.getAttribute('data-admin-lang-option') === adminSidebarLang;
                button.classList.toggle('active', active);
                button.setAttribute('aria-pressed', active ? 'true' : 'false');
            });
        }

        function setAdminSidebarLang(lang) {
            if (lang !== 'zh' && lang !== 'en') return;
            adminSidebarLang = lang;
            try {
                localStorage.setItem(ADMIN_SIDEBAR_LANG_KEY, lang);
            } catch (e) {
                // ignore localStorage write failures
            }
            renderAdminSidebarTranslations();
        }


        function getSidebarLoginProfile() {
            try {
                const raw = localStorage.getItem(SIDEBAR_LOGIN_PROFILE_KEY);
                if (!raw) return { ...DEFAULT_SIDEBAR_LOGIN_PROFILE };
                const parsed = JSON.parse(raw);
                return {
                    name: String(parsed?.name || DEFAULT_SIDEBAR_LOGIN_PROFILE.name),
                    phone: String(parsed?.phone || DEFAULT_SIDEBAR_LOGIN_PROFILE.phone)
                };
            } catch (e) {
                return { ...DEFAULT_SIDEBAR_LOGIN_PROFILE };
            }
        }

        function renderSidebarLoginProfile() {
            const profile = getSidebarLoginProfile();
            const nameNode = document.getElementById('sidebarLoginName');
            const phoneNode = document.getElementById('sidebarLoginPhone');
            if (nameNode) {
                nameNode.textContent = profile.name;
            }
            if (phoneNode) {
                phoneNode.textContent = profile.phone;
            }
            fitSidebarLoginInline();
            renderAdminSidebarTranslations();
        }

        function fitSidebarLoginInline() {
            const wrap = document.querySelector('.sidebar-login');
            if (!wrap) return;
            let size = 11;
            wrap.style.fontSize = `${size}px`;
            while (wrap.scrollWidth > wrap.clientWidth && size > 9) {
                size -= 0.5;
                wrap.style.fontSize = `${size}px`;
            }
        }

        window.addEventListener('resize', function() {
            fitSidebarLoginInline();
        });

        // 点位数据
        let locationsData = JSON.parse(localStorage.getItem('locationsData') || '[]');
        let editingLocationId = null;
        const POINT_CATEGORY_OPTIONS = [
            { value: 'exhibition', label: '展会点位' },
            { value: 'operation', label: '运营点位' }
        ];
        const MIN_POINT_CATEGORY_MOCK_COUNT = {
            exhibition: 2
        };

        // 默认点位数据
        const defaultLocations = [
            { id: 'L001', code: 'k8298', name: '上海市中心店', customerId: 'C001', customerName: '星巴克咖啡', address: '上海市浦东新区陆家嘴环路1000号', manager: '张店长', phone: '13800138001', status: 'operational', pointCategory: 'operation', createTime: '2024-01-15', remark: '核心商圈' },
            { id: 'L002', code: 'k8667', name: '北京朝阳门店', customerId: 'C002', customerName: '瑞幸咖啡', address: '北京市朝阳区建国路88号', manager: '李经理', phone: '13800138002', status: 'operational', pointCategory: 'exhibition', createTime: '2024-02-20', remark: '' },
            { id: 'L003', code: 'k9001', name: '广州天河店', customerId: 'C003', customerName: '太平洋咖啡', address: '广州市天河区天河路208号', manager: '王店长', phone: '13800138003', status: 'operational', pointCategory: 'operation', createTime: '2024-03-10', remark: '' },
            { id: 'L004', code: 'k9002', name: '深圳南山会展店', customerId: 'C004', customerName: 'Costa咖啡', address: '深圳市南山区科技园南路88号', manager: '赵经理', phone: '13800138004', status: 'closed', pointCategory: 'exhibition', createTime: '2024-04-05', remark: '会展档期暂停营业' },
            { id: 'L005', code: 'k9100', name: '上海国家会展中心A馆', customerId: 'C001', customerName: '星巴克咖啡', address: '上海市青浦区崧泽大道333号 A馆 1层', manager: '周运营', phone: '13800138100', status: 'operational', pointCategory: 'exhibition', createTime: '2024-04-18', remark: '展会高峰点位' },
        ];

        function normalizePointCategory(value, fallbackIndex = 0) {
            const normalized = String(value || '').trim();
            if (POINT_CATEGORY_OPTIONS.some(option => option.value === normalized)) {
                return normalized;
            }
            if (!POINT_CATEGORY_OPTIONS.length) return 'operation';
            const safeIndex = Math.abs(Number(fallbackIndex) || 0) % POINT_CATEGORY_OPTIONS.length;
            return POINT_CATEGORY_OPTIONS[safeIndex].value;
        }

        function resolvePointCategoryLabel(value) {
            const normalized = normalizePointCategory(value);
            const matched = POINT_CATEGORY_OPTIONS.find(option => option.value === normalized);
            return matched ? matched.label : '运营点位';
        }

        function renderPointCategoryOptions() {
            const filterNode = document.getElementById('pointCategoryFilter');
            const formNode = document.getElementById('locationCategory');
            const optionHtml = POINT_CATEGORY_OPTIONS
                .map(option => `<option value="${option.value}">${option.label}</option>`)
                .join('');
            if (filterNode) {
                filterNode.innerHTML = `<option value="all">全部点位分类</option>${optionHtml}`;
            }
            if (formNode) {
                formNode.innerHTML = optionHtml;
            }
        }

        function normalizeLocationsPointCategory(data) {
            let changed = false;
            const normalized = data.map((item, index) => {
                const nextCategory = normalizePointCategory(item.pointCategory, index);
                if (item.pointCategory !== nextCategory) changed = true;
                return {
                    ...item,
                    pointCategory: nextCategory
                };
            });
            return { normalized, changed };
        }

        function buildNextLocationId(data) {
            const maxId = data.reduce((max, item) => {
                const num = Number(String(item?.id || '').replace(/^L/, ''));
                return Number.isFinite(num) ? Math.max(max, num) : max;
            }, 0);
            return `L${String(maxId + 1).padStart(3, '0')}`;
        }

        function extractLocationCodeNumber(code) {
            const matched = String(code || '').trim().match(/^k(\d+)$/i);
            if (!matched) return null;
            const parsed = Number(matched[1]);
            return Number.isFinite(parsed) ? parsed : null;
        }

        function generateNextLocationCode() {
            const used = new Set();
            let maxCodeNumber = 999;
            locationsData.forEach(item => {
                const rawCode = String(item?.code || '').trim();
                if (!rawCode) return;
                used.add(rawCode.toLowerCase());
                const codeNumber = extractLocationCodeNumber(rawCode);
                if (Number.isFinite(codeNumber)) {
                    maxCodeNumber = Math.max(maxCodeNumber, codeNumber);
                }
            });
            let next = maxCodeNumber + 1;
            let candidate = `k${next}`;
            while (used.has(candidate.toLowerCase())) {
                next += 1;
                candidate = `k${next}`;
            }
            return candidate;
        }

        function regenerateLocationCode() {
            document.getElementById('locationCode').value = generateNextLocationCode();
        }

        function buildFallbackMockLocation(option, seedIndex) {
            const serial = String(seedIndex + 1).padStart(2, '0');
            const typeLabel = option?.label || '点位';
            const typeValue = option?.value || 'operation';
            return {
                code: `k9${String(500 + seedIndex).padStart(3, '0')}`,
                name: `${typeLabel}Mock点位${serial}`,
                customerId: 'C001',
                customerName: '星巴克咖啡',
                address: `Mock示例地址 ${serial} 号`,
                manager: 'Mock负责人',
                phone: `13800139${String(seedIndex).padStart(3, '0')}`,
                status: 'operational',
                pointCategory: typeValue,
                remark: `${typeLabel}自动补齐mock`
            };
        }

        function ensurePointCategoryMockCoverage(data) {
            let changed = false;
            const normalized = [...data];
            const existingCodes = new Set(normalized.map(item => String(item?.code || '').trim()).filter(Boolean));
            const counts = {};
            normalized.forEach(item => {
                const category = normalizePointCategory(item.pointCategory);
                counts[category] = (counts[category] || 0) + 1;
            });

            POINT_CATEGORY_OPTIONS.forEach((option, optionIndex) => {
                const minCount = MIN_POINT_CATEGORY_MOCK_COUNT[option.value] || 1;
                while ((counts[option.value] || 0) < minCount) {
                    const seed = defaultLocations.find(item =>
                        normalizePointCategory(item.pointCategory) === option.value &&
                        !existingCodes.has(String(item.code || ''))
                    );
                    const fallback = buildFallbackMockLocation(option, normalized.length + optionIndex);
                    const next = seed ? { ...seed } : fallback;
                    normalized.push({
                        ...next,
                        id: buildNextLocationId(normalized),
                        pointCategory: option.value,
                        createTime: new Date().toISOString().split('T')[0]
                    });
                    existingCodes.add(String(next.code || ''));
                    counts[option.value] = (counts[option.value] || 0) + 1;
                    changed = true;
                }
            });
            return { normalized, changed };
        }

        // 初始化
        function init() {
            renderSidebarLoginProfile();
            renderPointCategoryOptions();
            let changed = false;
            if (locationsData.length === 0) {
                locationsData = [...defaultLocations];
                changed = true;
            }
            const normalizedResult = normalizeLocationsPointCategory(locationsData);
            locationsData = normalizedResult.normalized;
            if (normalizedResult.changed) changed = true;
            const coverageResult = ensurePointCategoryMockCoverage(locationsData);
            locationsData = coverageResult.normalized;
            if (coverageResult.changed) changed = true;
            if (changed) {
                saveToStorage();
            }
            loadCustomers();
            renderLocations();
            updateStats();
        }

        // 加载客户列表到下拉框
        function loadCustomers() {
            const customersData = JSON.parse(localStorage.getItem('customersData') || '[]');
            const select = document.getElementById('customerSelect');
            
            let html = '<option value="">选择客户</option>';
            customersData.forEach(c => {
                if (c.status === 'active') {
                    html += `<option value="${c.id}" data-name="${c.name}">${c.name}</option>`;
                }
            });
            select.innerHTML = html;
        }

        // 保存到 localStorage
        function saveToStorage() {
            localStorage.setItem('locationsData', JSON.stringify(locationsData));
        }

        // 更新统计
        function updateStats() {
            const total = locationsData.length;
            const active = locationsData.filter(l => l.status === 'operational').length;
            
            // 从设备数据计算设备数
            const devicesData = JSON.parse(localStorage.getItem('devicesData') || '[]');
            const customersData = JSON.parse(localStorage.getItem('customersData') || '[]');
            
            document.getElementById('totalLocations').textContent = total;
            document.getElementById('activeLocations').textContent = active;
            document.getElementById('totalDevices').textContent = devicesData.length || 15;
            const customerIds = locationsData
                .map(l => String(l.customerId || '').trim())
                .filter(Boolean);
            document.getElementById('totalCustomers').textContent = new Set(customerIds).size || customersData.length || 4;
        }

        // 渲染点位列表
        function renderLocations() {
            const list = document.getElementById('locationList');
            const filterText = document.getElementById('searchInput').value.trim();
            const categoryFilter = document.getElementById('pointCategoryFilter').value;

            let filtered = locationsData;
            if (filterText) {
                const lower = filterText.toLowerCase();
                filtered = filtered.filter(l =>
                    l.name.toLowerCase().includes(lower) ||
                    l.code.toLowerCase().includes(lower) ||
                    l.address.toLowerCase().includes(lower)
                );
            }

            if (categoryFilter !== 'all') {
                filtered = filtered.filter(l => normalizePointCategory(l.pointCategory) === categoryFilter);
            }

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">📍</div>
                        <div>暂无点位数据</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = filtered.map(location => `
                <div class="location-item">
                    <div class="location-icon">📍</div>
                    <div class="location-info">
                        <div class="location-name">${location.name}</div>
                        <div class="location-meta">
                            <span>🏷️ ${location.code}</span>
                            <span>🏢 ${location.customerName || '未关联商户'}</span>
                            <span>🧭 ${resolvePointCategoryLabel(location.pointCategory)}</span>
                            <span>📍 ${location.address}</span>
                        </div>
                    </div>
                    <div class="location-status ${location.status === 'operational' ? 'status-operational' : 'status-closed'}">
                        ${location.status === 'operational' ? '●' : '○'} ${location.status === 'operational' ? '运营中' : '暂停运营'}
                    </div>
                    <div class="location-actions">
                        <button class="btn-icon" onclick="editLocation('${location.id}')" title="编辑">✏️</button>
                        <button class="btn-icon" onclick="deleteLocation('${location.id}')" title="删除">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        // 搜索点位
        function searchLocations() {
            renderLocations();
        }

        function filterLocations() {
            renderLocations();
        }

        // 打开模态框
        function openModal() {
            editingLocationId = null;
            loadCustomers();
            document.getElementById('modalTitle').textContent = '新增点位';
            document.getElementById('locationName').value = '';
            document.getElementById('locationCode').value = generateNextLocationCode();
            document.getElementById('customerSelect').value = '';
            document.getElementById('locationStatus').value = 'operational';
            document.getElementById('locationCategory').value = normalizePointCategory('', locationsData.length);
            document.getElementById('locationAddress').value = '';
            document.getElementById('locationManager').value = '';
            document.getElementById('locationPhone').value = '';
            document.getElementById('locationRemark').value = '';
            document.getElementById('locationModal').classList.add('active');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('locationModal').classList.remove('active');
            editingLocationId = null;
        }

        // 编辑点位
        function editLocation(id) {
            const location = locationsData.find(l => l.id === id);
            if (!location) return;

            editingLocationId = id;
            loadCustomers();
            document.getElementById('modalTitle').textContent = '编辑点位';
            document.getElementById('locationName').value = location.name;
            document.getElementById('locationCode').value = location.code;
            document.getElementById('customerSelect').value = location.customerId;
            document.getElementById('locationStatus').value = location.status;
            document.getElementById('locationCategory').value = normalizePointCategory(location.pointCategory);
            document.getElementById('locationAddress').value = location.address;
            document.getElementById('locationManager').value = location.manager || '';
            document.getElementById('locationPhone').value = location.phone || '';
            document.getElementById('locationRemark').value = location.remark || '';
            document.getElementById('locationModal').classList.add('active');
        }

        // 保存点位
        function saveLocation() {
            const name = document.getElementById('locationName').value.trim();
            const code = document.getElementById('locationCode').value.trim();
            const customerId = document.getElementById('customerSelect').value;
            const status = document.getElementById('locationStatus').value;
            const pointCategory = document.getElementById('locationCategory').value;
            const address = document.getElementById('locationAddress').value.trim();
            const manager = document.getElementById('locationManager').value.trim();
            const phone = document.getElementById('locationPhone').value.trim();
            const remark = document.getElementById('locationRemark').value.trim();

            if (!name || !code || !address) {
                showToast('请填写必填项', 'error');
                return;
            }

            // 获取客户名称
            const customersData = JSON.parse(localStorage.getItem('customersData') || '[]');
            const customer = customersData.find(c => c.id === customerId);

            if (editingLocationId) {
                // 编辑
                const index = locationsData.findIndex(l => l.id === editingLocationId);
                if (index !== -1) {
                    locationsData[index] = {
                        ...locationsData[index],
                        name, code, customerId, customerName: customer?.name || '',
                        status, pointCategory: normalizePointCategory(pointCategory), address, manager, phone, remark
                    };
                }
                showToast('点位信息已更新');
            } else {
                // 新增
                const newId = 'L' + String(locationsData.length + 1).padStart(3, '0');
                locationsData.push({
                    id: newId,
                    name, code, customerId, customerName: customer?.name || '',
                    status, pointCategory: normalizePointCategory(pointCategory), address, manager, phone, remark,
                    createTime: new Date().toISOString().split('T')[0]
                });
                showToast('点位添加成功');
            }

            saveToStorage();
            renderLocations();
            updateStats();
            closeModal();
        }

        // 删除点位
        function deleteLocation(id) {
            if (!confirm('确定要删除该点位吗？')) return;
            
            locationsData = locationsData.filter(l => l.id !== id);
            saveToStorage();
            renderLocations();
            updateStats();
            showToast('点位已删除');
        }

        // 切换侧边栏
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        // 显示提示
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // 点击模态框外部关闭
        document.getElementById('locationModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 初始化
        init();
    </script>
</body>
</html>
