                    `;
                }).join('')
                : '<div class="lane-material-empty">当前货道大类下没有匹配的物料</div>';

            const categoryText = allowedCategories.length ? allowedCategories.join('、') : '未配置';
            document.getElementById('laneMaterialHint').textContent = `${merchant.merchantName || merchant.merchantId} · 仅可选择：${categoryText} · ${filteredOptions.length}/${options.length} 个可选物料`;
        }

        function switchLaneMaterialCategory(category) {
            currentLaneMaterialCategory = category;
            renderLaneMaterialOptions(currentLaneMaterialSelectedNumber);
        }

        function selectLaneMaterial(materialNumber) {
            currentLaneMaterialSelectedNumber = String(materialNumber || '').trim();
            renderLaneMaterialOptions(currentLaneMaterialSelectedNumber);
        }

        function handleLaneMaterialSearch(value) {
            currentLaneMaterialSearch = value || '';
            renderLaneMaterialOptions(currentLaneMaterialSelectedNumber);
        }

        function openLaneMaterialModal(laneCode) {
            const material = materialsData.find(item => item.code === laneCode);
            if (!material) {
                showToast('未找到对应货道', 'error');
                return;
            }
            if (!canEditLaneMaterial()) {
                showToast('暂无编辑货道关联物料权限', 'error');
                return;
            }

            currentLaneMaterialEditCode = material.code;
            currentLaneMaterialSelectedNumber = material.materialNumber || material.materialCode || '';
            currentLaneMaterialCategory = '';
            currentLaneMaterialSearch = '';
            document.getElementById('laneMaterialSearch').value = '';
            renderLaneMaterialOptions(currentLaneMaterialSelectedNumber);
            document.getElementById('laneMaterialModalTitle').textContent = `编辑关联物料 · ${material.laneName}`;
            document.getElementById('laneMaterialModal').classList.add('active');
        }

        function closeLaneMaterialModal() {
            document.getElementById('laneMaterialModal').classList.remove('active');
            currentLaneMaterialEditCode = null;
            currentLaneMaterialSelectedNumber = '';
            currentLaneMaterialCategory = '';
            currentLaneMaterialSearch = '';
        }

        function confirmLaneMaterialEdit() {
            if (!currentLaneMaterialEditCode) return;
            const material = findCurrentMerchantMaterial(currentLaneMaterialSelectedNumber);
            if (!material) {
                showToast('请选择当前商户物料表中的物料', 'error');
                return;
            }
            const laneItem = materialsData.find(item => item.code === currentLaneMaterialEditCode) || null;
            const allowedCategories = getAllowedMaterialCategoriesForLane(laneItem);
            if (!allowedCategories.includes(material.category)) {
                showToast('请选择与当前货道分类匹配的物料', 'error');
                return;
            }

            const merchantId = getCurrentMerchantContext().merchantId;
            const overrides = readLaneMaterialOverrides();
            if (!overrides[merchantId] || typeof overrides[merchantId] !== 'object') {
                overrides[merchantId] = {};
            }
            if (!overrides[merchantId][currentDevice] || typeof overrides[merchantId][currentDevice] !== 'object') {
                overrides[merchantId][currentDevice] = {};
            }
            overrides[merchantId][currentDevice][currentLaneMaterialEditCode] = {
                merchantId: getCurrentMerchantContext().merchantId,
                materialNumber: material.materialNumber,
                materialCode: material.materialNumber
            };
            writeLaneMaterialOverrides(overrides);

            materialsData = materialsData.map(item => item.code === currentLaneMaterialEditCode
                ? applyMaterialOverrideToLane(item, material)
                : item);

            renderMaterials();
            closeLaneMaterialModal();
            showToast('关联物料已更新', 'success');
        }

        function resolveMaterialDisplayStatus(item) {
            if (Number(item?.remaining || 0) <= 0) {
                return { className: 'soldout', label: '售罄' };
            }
            if (Number(item?.remaining || 0) <= Number(item?.critical || 0)) {
                return { className: 'critical', label: '告急' };
            }
            return { className: 'healthy', label: '正常' };
        }

        function renderMaterialCard(item) {
            const fillPct = Math.max(0, Math.min(100, (item.remaining / item.max) * 100));
            const warningPct = Math.max(0, Math.min(100, (item.warning / item.max) * 100));
            const criticalPct = Math.max(0, Math.min(100, (item.critical / item.max) * 100));
            const displayStatus = resolveMaterialDisplayStatus(item);
            const statusText = displayStatus.label;
            const statusClass = displayStatus.className;

            return `
                <article class="material-card ${statusClass}">
                    <div class="material-card-head">
                        <div class="material-card-copy">
                            <div class="material-card-title-row">
                                <h3 class="material-name">${item.laneName}</h3>
                                <div class="material-card-tools">
                                    <span class="status-pill ${statusClass}">${statusText}</span>
                                    ${canEditLaneName() ? `<button type="button" class="material-lane-edit-btn" onclick="openLaneNameModal('${item.code}')">编辑货道名称</button>` : ''}
                                    ${canEditLaneMaterial() ? `<button type="button" class="material-lane-edit-btn" onclick="openLaneMaterialModal('${item.code}')">编辑关联物料</button>` : ''}
                                </div>
                            </div>
                            <div class="material-meta-row">
                                <span class="material-associated-name">关联物料：${item.materialName || item.name}</span>
                            </div>
                            <div class="material-meta-row">
                                <span class="material-associated-code">商品编码：${item.materialCode || item.materialNumber || item.code}</span>
                            </div>
                        </div>
                    </div>
                    <div class="material-card-body">
                        <div class="stock-metrics">
                            <span class="stock-line-label">剩余量</span>
                            <div class="stock-line-value">
                                <strong>${item.remaining}</strong>
                                <em>${item.unit}</em>
                            </div>
                        </div>
                        <div class="stock-bar">
                            <div class="stock-fill" style="width:${fillPct}%;"></div>
                            <span class="threshold warning" style="left:${warningPct}%;"></span>
                            <span class="threshold critical" style="left:${criticalPct}%;"></span>
                        </div>
                        <div class="threshold-meta">
                            <span>预警 ${item.warning} ${item.unit}</span>
                            <span>告警 ${item.critical} ${item.unit}</span>
                        </div>
                    </div>
                    <div class="material-card-footer">
                        <div class="card-actions">
                            <button class="ship-btn" onclick="goToRefillPage('${item.code}')">
                                <span>📦</span>
                                <span>发货</span>
                            </button>
                            <button class="refill-btn" onclick="openRefillModal('${item.code}')">
                                <span>✏️</span>
                                <span>补充</span>
                            </button>
                        </div>
                    </div>
                </article>
            `;
        }

        function renderMaterials() {
            const sections = document.getElementById("materialsSections");
            const healthyCount = materialsData.filter(item => item.status === "healthy").length;
            const criticalCount = materialsData.filter(item => item.status !== "healthy").length;
            const groups = buildLaneGroupSections(materialsData);

            sections.innerHTML = groups.map(group => {
                const criticalMeta = group.criticalCount > 0
                    ? `<span class="materials-category-critical">告急 ${group.criticalCount}</span>`
                    : '';
                const contentHtml = group.items.length
                    ? `<div class="materials-grid">${group.items.map(renderMaterialCard).join("")}</div>`
                    : '<div class="materials-category-empty">当前设备暂无此类物料</div>';

                return `
                    <section class="materials-category-section">
                        <div class="materials-category-head">
                            <div class="materials-category-copy">
                                <h3 class="materials-category-title">${group.category}</h3>
                            </div>
                            <div class="materials-category-meta">
                                <span class="materials-category-count">${group.items.length} 个货道</span>
                                ${criticalMeta}
                            </div>
                        </div>
                        ${contentHtml}
                    </section>
                `;
            }).join("");

            document.getElementById("materialCount").textContent = materialsData.length;
            document.getElementById("criticalCount").textContent = criticalCount;
            document.getElementById("healthyCount").textContent = healthyCount;
        }

        function persistShipmentReturnContext(materialCode = null) {
            const matchedLane = materialCode
                ? (Array.isArray(materialsData) ? materialsData.find(item => item.code === materialCode) : null)
                : null;
            const associatedMaterialCode = matchedLane?.materialCode || matchedLane?.materialNumber || materialCode || null;
            const payload = {
                source: 'materials',
                deviceId: currentDevice,
                laneName: matchedLane?.laneName || null,
                materialCode: associatedMaterialCode
            };
            sessionStorage.setItem('materialsShipmentReturnContext', JSON.stringify(payload));
        }

        // 跳转到批量添加物料页面
        function goToRefillPage(materialCode = null) {
            // 保存当前设备信息
            sessionStorage.setItem('currentDevice', currentDevice);
            persistShipmentReturnContext(materialCode);
            
            if (materialCode) {
                const matchedLane = materialsData.find(item => item.code === materialCode);
                sessionStorage.setItem('preselectMaterial', matchedLane?.materialCode || matchedLane?.materialNumber || materialCode);
            }
            window.location.href = 'materials-refill.html';
        }

        // 跳转到发货清单页面
        function goToOrdersList() {
            window.location.href = '/materials-orders.html?from=materials';
        }

        // 设备变更
        function onDeviceChangeByInput() {
            const input = document.getElementById('deviceSearchInput');
            if (input.dataset.skipChange === '1') {
                input.dataset.skipChange = '0';
                return;
            }
            const matched = matchDeviceByInput(input.value);
            if (!matched) {
                showToast('设备不存在，请输入完整设备编号', 'error');
                input.value = getDeviceSearchDisplayLabel(currentDevice);
                return;
            }
            currentDevice = matched;
            input.value = getDeviceSearchDisplayLabel(matched);
            sessionStorage.setItem('currentDevice', currentDevice);
            applyLaneNameOverrides();
            syncDeviceContext(currentDevice);
            showToast(`已切换到设备 ${currentDevice}`);
        }

        // 打开补充设置弹窗（支持修改当前量、预警值、告警值）
        function openRefillModal(materialCode = null) {
            const material = materialsData.find(m => m.code === materialCode);
            if (!material) {
                showToast('未找到对应物料', 'error');
                return;
            }

            currentRefillCode = material.code;
            document.getElementById('modalTitle').textContent = `补充设置 - ${material.laneName}`;
            document.getElementById('currentMaterialCode').textContent = material.code;
            document.getElementById('currentStockValue').textContent = `${material.remaining} ${material.unit}`;
            currentRefillResetMode = false;
            document.getElementById('adjustCurrent').value = 0;
            document.getElementById('adjustWarning').value = material.warning;
            document.getElementById('adjustCritical').value = material.critical;
            document.getElementById('unitCurrent').textContent = material.unit;
            document.getElementById('unitWarning').textContent = material.unit;
            document.getElementById('unitCritical').textContent = material.unit;
            document.getElementById('refillModal').classList.add('active');
        }

        function closeRefillModal() {
            document.getElementById('refillModal').classList.remove('active');
            currentRefillCode = null;
            currentRefillResetMode = false;
        }

        function selectNumericInputValue(input) {
            if (!input || typeof input.select !== 'function') return;
            setTimeout(() => input.select(), 0);
        }

        function resetRefillCurrentToZero() {
            const currentInput = document.getElementById('adjustCurrent');
            if (currentInput) {
                currentInput.value = 0;
            }
            currentRefillResetMode = true;
        }

        function formatDateTimeWithSeconds(dateValue = new Date()) {
            const date = dateValue instanceof Date ? dateValue : new Date(dateValue);
            if (Number.isNaN(date.getTime())) {
                return '-';
            }
            const pad = n => String(n).padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
        }

        function buildRefillRecordContent(material, oldRemaining, nextRemaining) {
            const formatAmount = (value) => Number.isInteger(value) ? String(value) : value.toFixed(1);
            const delta = nextRemaining - oldRemaining;
            if (delta > 0) {
                return `${material.laneName}加${formatAmount(delta)}${material.unit}`;
            }
            if (delta < 0) {
                return `${material.laneName}调整为${formatAmount(nextRemaining)}${material.unit}（减少${formatAmount(Math.abs(delta))}${material.unit}）`;
            }
            return `${material.laneName}阈值调整，当前量${formatAmount(nextRemaining)}${material.unit}`;
        }

        function pickFirstValidValue(...values) {
            for (const value of values) {
                const normalized = normalizeText(value, '');
                if (normalized) return normalized;
            }
            return '';
        }

        function resolveOperatorByDevice(deviceId) {
            let devices = [];
            try {
                devices = JSON.parse(localStorage.getItem('devicesData') || '[]');
            } catch (error) {
                devices = [];
            }

            const targetDeviceId = normalizeDeviceId(deviceId);
            const match = Array.isArray(devices)
                ? devices.find(item => normalizeDeviceId(item?.id) === targetDeviceId)
                : null;
            const entryInfo = match?.entryInfo || {};

            const operatorName = pickFirstValidValue(
                entryInfo.operatorName,
                entryInfo.operator,
                entryInfo.operatorDisplayName,
                entryInfo.maintenanceOperator,
                entryInfo.maintainerName,
                entryInfo.contactName,
                match?.operatorName,
                match?.operator,
                match?.maintainerName,
                '当前用户'
            ) || '当前用户';

            const operatorPhone = pickFirstValidValue(
                entryInfo.operatorPhone,
                entryInfo.phone,
                entryInfo.mobile,
                entryInfo.operatorMobile,
                entryInfo.maintainerPhone,
                entryInfo.contactPhone,
                match?.operatorPhone,
                match?.phone,
                match?.mobile,
                match?.operatorMobile,
                '-'
            ) || '-';

            return {
                operatorName,
                operatorPhone
            };
        }

        function resolveCurrentOperationUser() {
            let session = {};
            let profile = {};
            try {
                session = JSON.parse(localStorage.getItem(LOGIN_SESSION_KEY) || '{}');
            } catch (error) {
                session = {};
            }
            try {
                profile = JSON.parse(localStorage.getItem(SIDEBAR_LOGIN_PROFILE_KEY) || '{}');
            } catch (error) {
                profile = {};
            }

            return {
                operatorName: pickFirstValidValue(
                    session.name,
                    session.username,
                    session.operatorName,
                    session.staffName,
                    profile.name,
                    profile.username
                ),
                operatorPhone: pickFirstValidValue(
                    session.phone,
                    session.mobile,
                    session.account,
                    session.operatorPhone,
                    profile.phone,
                    profile.mobile
                )
            };
        }

        function appendMaintenanceRecord(record) {
            let records = [];
            try {
                records = JSON.parse(localStorage.getItem('deviceMaintenanceRecords') || '[]');
            } catch (error) {
                records = [];
            }
            if (!Array.isArray(records)) {
                records = [];
            }
            const targetDeviceId = normalizeDeviceId(record?.deviceId || record?.deviceCode || currentDevice);
            const operator = resolveCurrentOperationUser();
            const fallbackOperator = resolveOperatorByDevice(targetDeviceId);
            const normalizedOperatorName = pickFirstValidValue(
                record?.operatorName,
                record?.operator,
                record?.maintainerName,
                record?.maintenanceOperator,
                operator.operatorName,
                fallbackOperator.operatorName,
                '当前用户'
            ) || '当前用户';
            const normalizedOperatorPhone = pickFirstValidValue(
                record?.operatorPhone,
                record?.phone,
                record?.mobile,
                record?.operatorMobile,
                record?.maintainerPhone,
                operator.operatorPhone,
                fallbackOperator.operatorPhone,
                '-'
            ) || '-';
            const normalizedLocation = pickFirstValidValue(
                record?.deviceLocation,
                record?.deviceAddress,
                record?.address,
                getDeviceLocation(targetDeviceId || currentDevice),
                '未配置点位'
            ) || '未配置点位';
            const normalizedRecord = {
                ...record,
                deviceId: targetDeviceId || currentDevice,
                deviceLocation: normalizedLocation,
                deviceAddress: normalizedLocation,
                operatorName: normalizedOperatorName,
                operatorPhone: normalizedOperatorPhone,
                operator: normalizedOperatorName,
                phone: normalizedOperatorPhone,
                maintainerName: normalizedOperatorName,
                maintainerPhone: normalizedOperatorPhone
            };
            records.unshift(normalizedRecord);
            localStorage.setItem('deviceMaintenanceRecords', JSON.stringify(records.slice(0, 500)));
        }

        function createRefillMaintenanceRecord(material, oldRemaining, nextRemaining) {
            const operator = resolveCurrentOperationUser();
            const fallbackOperator = resolveOperatorByDevice(currentDevice);
            const operatorName = pickFirstValidValue(operator.operatorName, fallbackOperator.operatorName, '当前用户');
            const operatorPhone = pickFirstValidValue(operator.operatorPhone, fallbackOperator.operatorPhone, '-');
            const deviceLocation = getDeviceLocation(currentDevice);
            appendMaintenanceRecord({
                id: `MR${Date.now()}`,
                time: formatDateTimeWithSeconds(),
                type: '补料',
                content: buildRefillRecordContent(material, oldRemaining, nextRemaining),
                deviceId: currentDevice,
                deviceLocation,
                deviceAddress: deviceLocation,
                operatorName,
                operatorPhone,
                operator: operatorName,
                phone: operatorPhone,
                maintainerName: operatorName,
                maintainerPhone: operatorPhone,
                materialCode: material.materialCode || material.materialNumber || material.code
            });
        }

        function confirmRefill() {
            if (!currentRefillCode) {
                showToast('请从物料卡片进入补充设置', 'error');
                return;
            }

            const material = materialsData.find(m => m.code === currentRefillCode);
            if (!material) {
                showToast('物料不存在，无法保存', 'error');
                return;
            }

            const refillDelta = Number(document.getElementById('adjustCurrent').value);
            const nextWarning = Number(document.getElementById('adjustWarning').value);
            const nextCritical = Number(document.getElementById('adjustCritical').value);

            if (![refillDelta, nextWarning, nextCritical].every(Number.isFinite)) {
                showToast('请输入有效数字', 'error');
                return;
            }
            if (!Number.isInteger(refillDelta)) {
                showToast('补充数量仅支持整数', 'error');
                return;
            }
            if (refillDelta < 0 || nextWarning < 0 || nextCritical < 0) {
                showToast('数值不能小于 0', 'error');
                return;
            }
            if (nextWarning < nextCritical) {
                showToast('预警值应大于或等于告警值', 'error');
                return;
            }

            const oldRemaining = material.remaining;
            const nextCurrent = currentRefillResetMode ? 0 : oldRemaining + refillDelta;
            material.remaining = nextCurrent;
            material.warning = nextWarning;
            material.critical = nextCritical;
            material.max = Math.max(material.max, nextCurrent, nextWarning, nextCritical, 1);
            material.status = resolveMaterialDisplayStatus(material).className;
            createRefillMaintenanceRecord(material, oldRemaining, nextCurrent);
            const actionText = currentRefillResetMode ? '已重置为 0' : `补充 ${refillDelta}${material.unit}`;

            renderMaterials();
            closeRefillModal();
            showToast(`已更新 ${material.laneName}：${actionText}，当前量 ${nextCurrent}${material.unit}`, 'success');
        }

        function showToast(message, type = 'normal') {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = type === 'success' ? 'toast success show' : 'toast show';
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => toast.classList.remove("show"), 3000);
        }

        document.addEventListener('click', function(e) {
            const wrap = document.querySelector('.device-search-wrap');
            if (wrap && !wrap.contains(e.target)) {
                hideDeviceDropdown();
            }
        });

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("open");
            document.getElementById("overlay").classList.toggle("show");
        }

        // 点击模态框外部关闭
        document.getElementById('refillModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeRefillModal();
            }
        });

        document.getElementById('laneNameModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeLaneNameModal();
            }
        });

        document.getElementById('laneMaterialModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeLaneMaterialModal();
            }
        });

        renderSidebarLoginProfile();
        resetMaintenanceRecordsForTesting();
        currentDevice = resolveInitialDevice();
        initDeviceSearch();
        document.getElementById('deviceSearchInput').value = getDeviceSearchDisplayLabel(currentDevice);
        applyLaneNameOverrides();
        syncDeviceContext(currentDevice);
        sessionStorage.setItem('currentDevice', currentDevice);
        renderMaterials();
    </script>
</body>
</html>
