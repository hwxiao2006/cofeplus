<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人员管理 - 运营控制台</title>
    <meta name="format-detection" content="telephone=no">
    <style>
        :root {
            --primary: #4ecdc4;
            --primary-dark: #3dbdb4;
            --primary-light: #e8f8f7;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --success: #10b981;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --bg-sidebar: #0b132b;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 10px 18px -4px rgba(15, 23, 42, 0.12);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            --sidebar-header-padding-x: 24px;
            --sidebar-nav-padding-x: 12px;
            --sidebar-section-title-padding-x: 14px;
            width: 240px;
            background: var(--bg-sidebar);
            color: #dbeafe;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
            transition: transform 0.25s ease;
        }

        .sidebar-header {
            padding: 24px var(--sidebar-header-padding-x);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-title {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
        }

        .sidebar-meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
            padding-left: calc(var(--sidebar-nav-padding-x) + var(--sidebar-section-title-padding-x) - var(--sidebar-header-padding-x));
            min-width: 0;
        }

        .brand-version {
            font-size: 12px;
            line-height: 1;
            color: rgba(219, 234, 254, 0.55);
            white-space: nowrap;
        }


        .sidebar-login {
            margin-top: 8px;
            padding-top: 8px;
            padding-left: calc(var(--sidebar-nav-padding-x) + var(--sidebar-section-title-padding-x) - var(--sidebar-header-padding-x));
            border-top: 1px solid rgba(219, 234, 254, 0.12);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            font-size: 11px;
        }

        .sidebar-login-name {
            color: rgba(241, 245, 249, 0.86);
            font-weight: 500;
            line-height: 1.2;
            flex: 0 0 auto;
            font-size: 1em;
        }

        .sidebar-login-phone {
            color: rgba(219, 234, 254, 0.58);
            line-height: 1.2;
            flex: 0 0 auto;
            white-space: nowrap;
            font-size: 1em;
        }

        .sidebar-login-phone::before {
            content: '·';
            color: rgba(219, 234, 254, 0.46);
            margin: 0 6px;
        }
        .sidebar-admin-lang {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            color: rgba(219, 234, 254, 0.62);
            font-size: 11px;
            line-height: 1;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .sidebar-admin-lang::before {
            content: '·';
            color: rgba(219, 234, 254, 0.32);
            margin-right: 2px;
        }

        .sidebar-admin-lang-btn {
            border: 0;
            padding: 0;
            background: transparent;
            color: inherit;
            font: inherit;
            cursor: pointer;
            transition: color 0.15s ease, opacity 0.15s ease;
            opacity: 0.78;
        }

        .sidebar-admin-lang-btn:hover {
            color: #ffffff;
            opacity: 1;
        }

        .sidebar-admin-lang-btn.active {
            color: #ffffff;
            opacity: 1;
            font-weight: 600;
        }

        .sidebar-admin-lang-sep {
            opacity: 0.34;
        }

        .sidebar-nav {
            flex: 1;
            padding: 8px var(--sidebar-nav-padding-x);
            min-height: 0;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 8px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: rgba(186, 230, 253, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px var(--sidebar-section-title-padding-x);
            margin-bottom: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 11px 14px;
            margin-bottom: 2px;
            color: rgba(219, 234, 254, 0.88);
            text-decoration: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .nav-item:hover {
            background: rgba(46, 196, 182, 0.14);
            color: #ffffff;
        }

        .nav-item.active {
            background: linear-gradient(130deg, rgba(46, 196, 182, 0.38), rgba(56, 189, 248, 0.38));
            color: #ffffff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .main {
            flex: 1;
            margin-left: 240px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .mobile-header {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #fff;
            border-bottom: 1px solid var(--border);
        }

        .mobile-header-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header-title-wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .header-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.28);
        }

        .btn-default {
            background: #f8fafc;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .content {
            padding: 24px 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .staff-toolbar {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 14px;
            align-items: center;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: linear-gradient(180deg, #ffffff 0%, #fbfefe 100%);
            box-shadow: var(--shadow);
        }

        .staff-toolbar-stat {
            min-width: 124px;
        }

        .staff-toolbar-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .staff-toolbar-value {
            display: block;
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1;
            margin-top: 4px;
        }

        .staff-toolbar-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .staff-toolbar-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .staff-toolbar-note {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .list-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .manager-list {
            padding: 14px;
            display: grid;
            gap: 12px;
        }

        .manager-item {
            padding: 16px;
            border-radius: 14px;
            border: 1px solid #e8edf1;
            background: linear-gradient(180deg, #ffffff 0%, #fbfefe 100%);
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
            transition: all 0.2s;
        }

        .manager-item:hover {
            border-color: #c6ebe8;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }

        .manager-row {
            display: grid;
            grid-template-columns: minmax(220px, 0.9fr) minmax(260px, 1.2fr) auto;
            gap: 16px;
            align-items: center;
        }

        .manager-identity {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            min-width: 0;
        }

        .manager-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: #e8f8f7;
            color: #0f766e;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            flex: none;
        }

        .manager-summary {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .manager-detail-stack {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        .manager-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-self: center;
        }

        .manager-name {
            font-size: 17px;
            font-weight: 700;
            line-height: 1.2;
        }

        .manager-edit-btn {
            height: 32px;
            border-radius: 10px;
            border: 1px solid #bfe9e6;
            background: #f0fbfa;
            color: #0f766e;
            font-size: 13px;
            font-weight: 600;
            padding: 0 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .manager-edit-btn:hover {
            border-color: #8dd5d1;
            background: #def4f2;
        }

        .manager-toggle-btn {
            height: 32px;
            border-radius: 10px;
            border: 1px solid #d0d7de;
            background: #fff;
            color: #475569;
            font-size: 13px;
            font-weight: 600;
            padding: 0 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .manager-toggle-btn:hover {
            border-color: #b9c4cf;
            background: #f8fafc;
        }

        .manager-toggle-btn.is-danger {
            border-color: #fecaca;
            background: #fff5f5;
            color: #b42318;
        }

        .manager-toggle-btn.is-danger:hover {
            border-color: #fda4af;
            background: #ffeaea;
        }

        .manager-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-weight: 600;
            color: #0f766e;
        }

        .manager-status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #22c55e;
            flex: none;
        }

        .manager-status.is-disabled {
            color: #b42318;
        }

        .manager-status.is-disabled::before {
            background: #ef4444;
        }

        .manager-meta {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .manager-device-summary {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            min-height: 0;
        }

        .manager-device-label {
            font-size: 12px;
            color: #6b7280;
            font-weight: 600;
        }

        .manager-device-text {
            color: var(--text-primary);
            font-size: 13px;
            word-break: break-all;
        }

        .manager-device-toggle {
            border: none;
            background: transparent;
            color: #0f766e;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            padding: 0;
        }

        .manager-device-expanded {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            max-height: 112px;
            overflow: auto;
            padding-top: 6px;
        }

        .manager-device-chip {
            border-radius: 999px;
            border: 1px solid #bfe9e6;
            background: #ecfbf9;
            color: #0f766e;
            font-size: 12px;
            line-height: 24px;
            padding: 0 10px;
        }

        .empty-state {
            padding: 56px 20px;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 34px;
            margin-bottom: 10px;
            opacity: 0.75;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 90;
        }

        .overlay.active {
            display: block;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
            padding: 18px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            width: min(980px, 100%);
            max-height: calc(100vh - 36px);
            background: #fff;
            border-radius: 14px;
            box-shadow: var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            background: #f8fafc;
            color: #374151;
            font-size: 20px;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px 12px;
            background: #f9fafb;
        }

        .section-block {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px;
        }

        .section-block + .section-block {
            margin-top: 12px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: #4b5563;
            margin-bottom: 12px;
        }

        .required {
            color: var(--danger);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px 12px;
        }

        .form-col-full {
            grid-column: 1 / -1;
        }

        .form-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
        }

        .form-input {
            height: 38px;
            border-radius: 8px;
            border: 1px solid var(--border);
            padding: 0 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .auth-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
        }

        .auth-btn {
            height: 38px;
            border: none;
            border-radius: 8px;
            padding: 0 14px;
            background: #dff6f4;
            color: #0f766e;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .option-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 8px;
        }

        .option-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            font-size: 14px;
        }

        .option-item input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary-dark);
            flex: none;
        }

        .permission-section-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .permission-section-note {
            margin: 4px 0 0;
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.4;
        }

        .permission-selection-stats {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 28px;
            padding: 0 12px;
            border-radius: 999px;
            background: #eef9f7;
            color: #17827a;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .permission-tree {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .permission-group-row {
            border: 1px solid #e6edf2;
            border-radius: 12px;
            background: #fff;
            overflow: hidden;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .permission-group-row[data-selected="true"] {
            border-color: #d6ece7;
        }

        .permission-group-row[data-expanded="true"] {
            background: #fcfefe;
            box-shadow: 0 6px 18px rgba(15, 118, 110, 0.05);
        }

        .permission-group-main {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
        }

        .permission-group-head {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 0;
            min-width: 132px;
        }

        .permission-group-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .permission-group-checkbox {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-dark);
            flex: none;
            margin: 0;
        }

        .permission-group-trigger,
        .permission-group-count {
            border: 0;
            background: none;
            padding: 0;
            cursor: pointer;
        }

        .permission-group-trigger {
            min-width: 0;
            text-align: left;
        }

        .permission-group-summary-text {
            display: block;
            font-size: 13px;
            color: #64748b;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .permission-group-row[data-selected="true"] .permission-group-summary-text {
            color: #1f766f;
            font-weight: 600;
        }

        .permission-group-count {
            font-size: 12px;
            font-weight: 700;
            color: #94a3b8;
            white-space: nowrap;
        }

        .permission-group-row[data-selected="true"] .permission-group-count {
            color: #17827a;
        }

        .permission-group-options {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 12px 10px 36px;
            border-top: 1px solid #f1f5f9;
        }

        .permission-group-options[hidden] {
            display: none;
        }

        .permission-inline-option {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 30px;
            padding: 6px 10px;
            border: 1px solid #e5eef5;
            border-radius: 999px;
            background: #fff;
            font-size: 12px;
            color: #475569;
            cursor: pointer;
        }

        .permission-inline-option input {
            width: 14px;
            height: 14px;
            margin: 0;
            accent-color: var(--primary-dark);
            flex: none;
        }

        .device-picker-entry {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }

        .device-picker-btn {
            height: 34px;
            border: 1px solid #bfe9e6;
            border-radius: 8px;
            background: #f0fbfa;
            color: #0f766e;
            font-size: 13px;
            font-weight: 600;
            padding: 0 12px;

            align-items: center;

            padding: 0 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #4b5563;
            white-space: nowrap;
        }

        .device-selected-toggle input {
            width: 16px;
            height: 16px;
            accent-color: var(--primary-dark);
            margin: 0;
        }

        .device-list {
            max-height: 360px;
            overflow-y: auto;
            border: 1px dashed #d1d5db;
            border-radius: 8px;
            padding: 8px;
            background: #fff;
            display: grid;
            gap: 6px;

            padding: 8px 10px;

        .device-option-meta {

            flex-direction: column;

            display: flex;
            justify-content: flex-end;
            gap: 10px;
            background: #fff;

            position: fixed;
            left: 50%;
            bottom: 24px;
            transform: translateX(-50%) translateY(20px);
            background: rgba(15, 23, 42, 0.9);
            color: #fff;
            border-radius: 999px;
            padding: 10px 16px;
            font-size: 13px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s ease;
            z-index: 500;
        }

        .toast.show {

            transform: translateX(-50%) translateY(0);

        function bootstrapStaffManagers() {
            let shouldPersist = false;
            if (!Array.isArray(staffManagersData) || staffManagersData.length === 0) {
                staffManagersData = defaultManagers.map((item) => ({
                    ...item,
                    accountEnabled: item.accountEnabled !== false,
                    permissions: normalizeStaffPermissions(item.permissions)
                }));
                shouldPersist = true;
            } else {
                staffManagersData = staffManagersData.map((item) => {
                    const normalizedPermissions = normalizeStaffPermissions(item.permissions);
                    const normalizedAccountEnabled = item.accountEnabled !== false;
                    if (
                        JSON.stringify(normalizedPermissions) !== JSON.stringify(item.permissions || [])
                        || normalizedAccountEnabled !== item.accountEnabled
                    ) {
                        shouldPersist = true;
                    }
                    return {
                        ...item,
                        accountEnabled: normalizedAccountEnabled,
                        permissions: normalizedPermissions
                    };
                });
            }

            if (shouldPersist) {
                localStorage.setItem('staffManagersData', JSON.stringify(staffManagersData));
            }
        }

        function normalizeStaffPermissions(permissions) {
            const source = Array.isArray(permissions) ? permissions : [];
            const normalizedSet = new Set();

            source.forEach((value) => {
                const key = String(value || '').trim();
                if (!key) return;
                if (legacyPermissionMigrationMap[key]) {
                    legacyPermissionMigrationMap[key].forEach((mappedValue) => normalizedSet.add(mappedValue));
                    return;
                }
                if (allPermissionKeySet.has(key)) {
                    normalizedSet.add(key);
                }
            });

            permissionTreeGroups.forEach((group) => {
                if (group.children.length <= 1) return;
                const primaryValue = group.children[0].value;
                const hasChildPermission = group.children.slice(1).some((child) => normalizedSet.has(child.value));
                if (hasChildPermission) {
                    normalizedSet.add(primaryValue);
                }
            });

            return allPermissionKeys.filter((value) => normalizedSet.has(value));
        }

        function getPermissionGroupConfig(groupKey) {
            return permissionTreeGroups.find((group) => group.key === groupKey) || null;
        }

        function getPermissionChildInputs(groupKey) {

        }

        function getPermissionParentInput(groupKey) {
            return document.querySelector(`[data-permission-parent="${groupKey}"]`);
        }

        function getPermissionGroupRow(groupKey) {
            return document.querySelector(`.permission-group-row[data-permission-group="${groupKey}"]`);

        function getPermissionSummaryNode(groupKey) {

        function syncPermissionParentState(groupKey) {
            const childInputs = getPermissionChildInputs(groupKey);
            const parentInput = getPermissionParentInput(groupKey);
            if (!parentInput || !childInputs.length) return;

            const checkedCount = childInputs.filter((input) => input.checked).length;
            parentInput.checked = checkedCount > 0;
            parentInput.indeterminate = checkedCount > 0 && checkedCount < childInputs.length;
        }

        function handlePermissionParentChange(groupKey, checked) {
            getPermissionChildInputs(groupKey).forEach((input) => {
                input.checked = checked;
            });
            refreshPermissionSelectionUi();
        }

        function handlePermissionChildChange(groupKey) {
            const group = getPermissionGroupConfig(groupKey);
            const childInputs = getPermissionChildInputs(groupKey);
            if (!group || !childInputs.length) {
                refreshPermissionSelectionUi();
                return;
            }

            if (group.children.length > 1) {
                const primaryValue = group.children[0].value;
                const primaryInput = childInputs.find((input) => input.value === primaryValue);
                const hasSecondaryChecked = childInputs.some((input) => input.value !== primaryValue && input.checked);

                if (hasSecondaryChecked && primaryInput && !primaryInput.checked) {
                    primaryInput.checked = true;
                }

                if (primaryInput && !primaryInput.checked) {
                    childInputs.forEach((input) => {
                        if (input !== primaryInput) {
                            input.checked = false;
                        }
                    });
                }
            }

            refreshPermissionSelectionUi();
        }

        function updatePermissionGroupDisplay(groupKey) {
            const group = getPermissionGroupConfig(groupKey);
            const row = getPermissionGroupRow(groupKey);
            const summaryNode = getPermissionSummaryNode(groupKey);
            const countNode = getPermissionCountNode(groupKey);
            const childInputs = getPermissionChildInputs(groupKey);
            if (!group || !row || !summaryNode || !countNode || !childInputs.length) return;

            const checkedValues = childInputs.filter((input) => input.checked).map((input) => input.value);
            const checkedLabels = group.children
                .filter((child) => checkedValues.includes(child.value))
                .map((child) => child.label);

            summaryNode.textContent = checkedLabels.length ? checkedLabels.join(' · ') : '点击选择权限';
            countNode.textContent = `${checkedLabels.length}/${group.children.length}`;
            row.setAttribute('data-selected', checkedLabels.length ? 'true' : 'false');
        }

            const preview = devices.slice(0, 2).join('、');

            const enabledCount = filteredManagers.filter((item) => item.accountEnabled !== false).length;

            document.getElementById('staffEnabledCount').textContent = enabledCount;
            document.getElementById('listHint').textContent = `共 ${filteredManagers.length} 位管理人员`;
        }

        function openStaffModal() {
            if (!selectedMerchantId) {
                showToast('请先选择商户');
                return;
            }
            closeDeviceSelector();
            editingStaffId = null;
            updateStaffModalState();
            resetStaffForm();
            renderDevicePicker(selectedMerchantId, []);
            document.getElementById('staffModal').classList.add('active');
        }

        function closeStaffModal() {
            closeDeviceSelector();
            document.getElementById('staffModal').classList.remove('active');
        }

        function editStaff(staffId) {
            const targetStaff = staffManagersData.find((item) => item.id === staffId);
            if (!targetStaff) {
                showToast('未找到可编辑人员');
                return;
            }
            selectedMerchantId = targetStaff.merchantId || selectedMerchantId;
            editingStaffId = staffId;
            updateStaffModalState();
            fillStaffForm(targetStaff);
            renderDevicePicker(selectedMerchantId, targetStaff.devices || []);
            closeDeviceSelector();
            document.getElementById('staffModal').classList.add('active');
        }

        function toggleStaffLoginStatus(staffId) {
            const staffIndex = staffManagersData.findIndex((item) => item.id === staffId);
            if (staffIndex === -1) {
                showToast('未找到可操作人员');
                return;
            }

            const currentStaff = staffManagersData[staffIndex];
            const nextEnabled = currentStaff.accountEnabled === false;
            const confirmText = nextEnabled
                ? `确认启用 ${currentStaff.username} 的账号吗？`
                : `确认停用 ${currentStaff.username} 的账号吗？停用后该人员将无法登录。`;

            if (!window.confirm(confirmText)) {
                return;
            }

            staffManagersData[staffIndex] = {
                ...currentStaff,
                accountEnabled: nextEnabled
            };
            localStorage.setItem('staffManagersData', JSON.stringify(staffManagersData));
            renderManagers();
            updateStats();
            showToast(nextEnabled ? '账号已启用' : '账号已停用');
        }

        function updateStaffModalState() {
            const title = document.getElementById('staffModalTitle');
            const submitBtn = document.getElementById('staffSubmitBtn');
            const isEditing = !!editingStaffId;
            if (title) {
                title.textContent = isEditing ? '编辑员工' : '添加员工';
            }
            if (submitBtn) {
                submitBtn.textContent = isEditing ? '保存修改' : '确认新增';
            }
        }

        function resetStaffForm() {
            document.getElementById('staffUsername').value = '';
            document.getElementById('staffPhone').value = '';

            document.querySelectorAll('input[name="permission"]').forEach((input) => {
                input.checked = false;
            });

            expandedPermissionGroups.clear();
            renderPermissionTree();
        }

        function fillStaffForm(targetStaff) {
            document.getElementById('staffUsername').value = targetStaff.username || '';
            document.getElementById('staffPhone').value = targetStaff.phone || '';

            const permissionSet = new Set(normalizeStaffPermissions(targetStaff.permissions));
            document.querySelectorAll('input[name="permission"]').forEach((input) => {
                input.checked = permissionSet.has(input.value);
            });
            expandedPermissionGroups.clear();
            renderPermissionTree();
        }

        function buildMerchantAliases(merchantId) {
            const aliases = [merchantId, String(merchantId).toLowerCase()];
            const digitsMatch = String(merchantId).match(/\d+/);
            if (digitsMatch) {
                aliases.push(`mer${digitsMatch[0]}`);
                aliases.push(`c${digitsMatch[0]}`);
            }
            return aliases.map((item) => String(item).toLowerCase());
        }

        function buildLocationLookup() {
            const locationMap = {};
            const locationsData = JSON.parse(localStorage.getItem('locationsData') || '[]');
            const source = Array.isArray(locationsData) && locationsData.length ? locationsData : defaultLocationOptions;
            source.forEach((location) => {
                const code = String(location.code || location.id || '').trim();
                if (!code) return;
                const key = code.toLowerCase();
                locationMap[key] = {
                    code,
                    name: location.name || location.address || code
                };
            });
            return locationMap;
        }

        function normalizeLocationMeta(rawCode, rawName, locationLookup) {
            const codeText = String(rawCode || '').trim();
            const lookupMeta = codeText ? locationLookup[codeText.toLowerCase()] : null;
            const locationCode = lookupMeta?.code || codeText;
            const locationName = lookupMeta?.name || String(rawName || '').trim();
            return {
                locationCode,
                locationName
            };
        }

        function buildLocationLabel(locationName, locationCode) {
            const labelParts = [];
            if (locationName) {
                labelParts.push(locationName);
            }
            if (locationCode) {
                labelParts.push(locationCode);
            }
            return labelParts.join(' · ') || '未配置点位';
        }

        function getDeviceOptionsByMerchant(merchantId) {
            const locationLookup = buildLocationLookup();
            const devicesData = JSON.parse(localStorage.getItem('devicesData') || '[]');
            if (Array.isArray(devicesData) && devicesData.length) {
                const merchantAliases = buildMerchantAliases(merchantId);
                const matched = devicesData
                    .filter((device) => {
                        const merchantKey = device.merchant || device.merchantId || device.customerId || '';
                        return merchantAliases.includes(String(merchantKey).toLowerCase());
                    })
                    .map((device) => {
                        const deviceId = device.id || '';
                        if (!deviceId) return null;
                        const rawLocationCode = device.locationCode || device.location || '';
                        const rawLocationName = device.locationName || '';
                        const locationMeta = normalizeLocationMeta(rawLocationCode, rawLocationName, locationLookup);
                        return {
                            id: deviceId,
                            locationCode: locationMeta.locationCode,
                            locationName: locationMeta.locationName,
                            locationLabel: buildLocationLabel(locationMeta.locationName, locationMeta.locationCode)
                        };
                    })
                    .filter(Boolean);

                if (matched.length) {
                    return Array.from(new Map(matched.map((item) => [item.id, item])).values());
                }
            }

            return (defaultDeviceMap[merchantId] || []).map((deviceId) => {
                const locationMeta = defaultDeviceLocationMap[deviceId] || {};
                return {
                    id: deviceId,
                    locationCode: locationMeta.locationCode || '',
                    locationName: locationMeta.locationName || '',
                    locationLabel: buildLocationLabel(locationMeta.locationName || '', locationMeta.locationCode || '')
                };
            });
        }

        function renderDevicePicker(merchantId, selectedDevices = []) {
            currentDeviceOptions = getDeviceOptionsByMerchant(merchantId);
            deviceSelectionSet = new Set(selectedDevices);
            deviceSearchKeyword = '';
            showOnlySelectedDevices = false;

            const searchInput = document.getElementById('deviceSearchInput');
            const onlySelectedInput = document.getElementById('deviceSelectedOnly');
            if (searchInput) {
                searchInput.value = '';
            }
            if (onlySelectedInput) {
                onlySelectedInput.checked = false;
            }
            renderDevicePickerList();
        }

        function openDeviceSelector() {
            document.getElementById('deviceSelectorModal').classList.add('active');
            renderDevicePickerList();
        }

        function closeDeviceSelector() {
            document.getElementById('deviceSelectorModal').classList.remove('active');
            renderDeviceSelectionSummary();
        }

        function renderDevicePickerList() {
            const picker = document.getElementById('devicePicker');
            if (!picker) return;

            if (!currentDeviceOptions.length) {
                picker.innerHTML = '<div class="device-empty">当前商户暂无设备，请先在设备管理中录入</div>';
                renderDeviceSelectionSummary();
                return;
            }

            const filteredDevices = currentDeviceOptions.filter((device) => {
                const searchableText = `${device.id} ${device.locationLabel}`.toLowerCase();
                const matchedKeyword = !deviceSearchKeyword || searchableText.includes(deviceSearchKeyword);
                const matchedSelected = !showOnlySelectedDevices || deviceSelectionSet.has(device.id);
                return matchedKeyword && matchedSelected;
            });

            if (!filteredDevices.length) {
                picker.innerHTML = '<div class="device-empty">没有匹配的设备，请调整筛选条件</div>';
                renderDeviceSelectionSummary();
                return;
            }

            picker.innerHTML = filteredDevices.map((device) => `
                <label class="option-item device-option-item">
                    <span class="device-option-meta">
                        <span class="device-code">${device.id}</span>
                        <span class="device-location">${device.locationLabel}</span>
                    </span>
                    <input type="checkbox" name="device" value="${device.id}" ${deviceSelectionSet.has(device.id) ? 'checked' : ''} onchange="handleDeviceSelectionChange('${device.id}', this.checked)">
                </label>
            `).join('');
            renderDeviceSelectionSummary();
        }

        function handleDeviceSearch(keyword) {
            deviceSearchKeyword = String(keyword || '').trim().toLowerCase();
            renderDevicePickerList();
        }

        function toggleDeviceSelectedOnly(checked) {
            showOnlySelectedDevices = checked;
            renderDevicePickerList();
        }

        function handleDeviceSelectionChange(deviceId, checked) {
            if (checked) {
                deviceSelectionSet.add(deviceId);
            } else {
                deviceSelectionSet.delete(deviceId);
            }
            if (showOnlySelectedDevices && !checked) {
                renderDevicePickerList();
                return;
            }
            renderDeviceSelectionSummary();
        }

        function removeSelectedDevice(deviceId) {
            deviceSelectionSet.delete(deviceId);
            renderDevicePickerList();
        }

        function renderDeviceSelectionSummary() {
            const summary = document.getElementById('selectedDeviceSummary');
            const stats = document.getElementById('deviceSelectionStats');
            if (stats) {
                stats.textContent = `已选 ${deviceSelectionSet.size} / 共 ${currentDeviceOptions.length}`;
            }
            if (!summary) return;

            const selectedDevices = currentDeviceOptions.filter((device) => deviceSelectionSet.has(device.id));
            if (!selectedDevices.length) {
                summary.innerHTML = '<span class="summary-empty">暂未选择设备</span>';
                return;
            }

            const maxVisible = 10;
            const chips = selectedDevices.slice(0, maxVisible).map((device) => {
                return `<button type="button" class="selected-chip" onclick="removeSelectedDevice('${device.id}')">${device.id}</button>`;
            }).join('');
            const moreText = selectedDevices.length > maxVisible ? `<span class="selected-more">+${selectedDevices.length - maxVisible}台</span>` : '';
            summary.innerHTML = chips + moreText;
        }

        function saveStaff() {
            const username = document.getElementById('staffUsername').value.trim();
            const phone = document.getElementById('staffPhone').value.trim();
            const selectedPermissions = getSelectedPermissionValues();
            const selectedDevices = Array.from(deviceSelectionSet);

            if (!username || !phone) {
                showToast('请填写用户名和手机号');
                return;
            }

            if (!/^1\d{10}$/.test(phone)) {
                showToast('请输入正确的手机号');
                return;
            }

            if (!selectedPermissions.length) {
                showToast('请至少选择一个权限');
                return;
            }

            if (!selectedDevices.length) {
                showToast('请至少选择一个负责设备号');
                return;
            }

            const merchantName = merchantOptions.find((item) => item.id === selectedMerchantId)?.name || '';
            const staffPayload = {
                merchantId: selectedMerchantId,
                merchantName,
                username,
                phone,
                permissions: selectedPermissions,
                devices: selectedDevices
            };

            if (editingStaffId) {
                const staffIndex = staffManagersData.findIndex((item) => item.id === editingStaffId);
                if (staffIndex === -1) {
                    showToast('未找到可编辑人员');
                    return;
                }
                staffManagersData[staffIndex] = {
                    ...staffManagersData[staffIndex],
                    ...staffPayload,
                    devices: selectedDevices
                };
            } else {
                const newStaff = {
                    id: createStaffId(),
                    ...staffPayload,
                    accountEnabled: true,
                    createdAt: new Date().toISOString().slice(0, 10)
                };
                staffManagersData.unshift(newStaff);
            }
            localStorage.setItem('staffManagersData', JSON.stringify(staffManagersData));
            closeStaffModal();
            renderManagers();
            updateStats();
            showToast(editingStaffId ? '人员信息已更新' : '人员新增成功');
            editingStaffId = null;
            updateStaffModalState();
        }

        function createStaffId() {
            const currentMax = staffManagersData
                .map((item) => Number(String(item.id || '').replace('S', '')))
                .filter((num) => Number.isFinite(num))
                .reduce((max, num) => Math.max(max, num), 0);
            return `S${String(currentMax + 1).padStart(3, '0')}`;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('show');
            overlay.classList.toggle('active');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => {
                toast.classList.remove('show');
            }, 2200);
        }

        document.getElementById('staffModal').addEventListener('click', (event) => {
            if (event.target.id === 'staffModal') {
                closeStaffModal();
            }
        });

        document.getElementById('deviceSelectorModal').addEventListener('click', (event) => {
            if (event.target.id === 'deviceSelectorModal') {
                closeDeviceSelector();
            }
        });

        init();
    </script>
</body>
</html>
