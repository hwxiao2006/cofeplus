<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备入场</title>
    <style>
        :root {
            --primary: #4ecdc4;
            --primary-dark: #2f8f89;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --bg-page: #f5f7fa;
            --bg-card: #ffffff;
            --border: #e5e7eb;
            --section-bg: #f1f3f5;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-page);
            color: var(--text-primary);
        }

        .page {
            max-width: 1360px;
            margin: 0 auto;
            min-height: 100vh;
            padding: 18px 20px 24px;
        }

        .header {
            height: 58px;
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: sticky;
            top: 10px;
            background: var(--bg-card);
            z-index: 10;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
        }

        .back-btn {
            position: absolute;
            left: 12px;
            top: 10px;
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 20px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .title {
            font-size: 17px;
            font-weight: 700;
        }

        .content-shell {
            margin-top: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: minmax(0, 1.25fr) minmax(360px, 0.75fr);
            gap: 16px;
            align-items: start;
        }

        .form-column {
            display: flex;
            flex-direction: column;
            gap: 14px;
            min-width: 0;
        }

        .form-section {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.03);
        }

        .section-title {
            min-height: 40px;
            background: var(--section-bg);
            color: #8f99a6;
            font-size: 12px;
            display: flex;
            align-items: center;
            padding: 8px 14px;
            font-weight: 600;
        }

        .rows {
            background: var(--bg-card);
        }

        .row {
            min-height: 52px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            gap: 12px;
        }

        .row:last-child {
            border-bottom: none;
        }

        .row.hidden {
            display: none;
        }

        .label {
            min-width: 132px;
            font-size: 13px;
            color: var(--text-primary);
            white-space: nowrap;
            font-weight: 500;
        }

        .label small {
            color: var(--danger);
            font-size: 12px;
            margin-left: 4px;
        }

        .value {
            flex: 1;
            min-width: 0;
            text-align: right;
            display: flex;
            justify-content: flex-end;
        }

        .value input,
        .value select {
            width: min(380px, 100%);
            border: 1px solid transparent;
            background: #f8fafc;
            text-align: right;
            color: var(--text-secondary);
            font-size: 13px;
            outline: none;
            border-radius: 8px;
            padding: 7px 10px;
        }

        .value input:focus,
        .value select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.14);
            background: #fff;
        }

        .device-search-input {
            width: min(380px, 100%);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            margin-bottom: 0;
            text-align: left;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            background: #fff;
        }

        .device-search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.14);
        }

        .device-search-wrap {
            position: relative;
            display: inline-block;
            width: min(380px, 100%);
        }

        .device-dropdown {
            display: none;
            position: absolute;
            top: calc(100% - 1px);
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            max-height: 220px;
            overflow-y: auto;
            z-index: 30;
        }

        .device-dropdown.show {
            display: block;
        }

        .device-option {
            padding: 9px 10px;
            text-align: left;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .device-option:hover {
            background: #ecfbfa;
            color: var(--primary-dark);
        }

        .device-option.empty {
            color: #9ca3af;
            cursor: default;
        }

        .value input::placeholder {
            color: #b7c0ca;
        }

        .link {
            color: #7dd3d0;
            cursor: pointer;
            font-weight: 500;
        }

        .switch-group {
            display: inline-flex;
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .switch-item {
            border: none;
            background: #f3f4f6;
            color: var(--text-secondary);
            font-size: 12px;
            padding: 3px 10px;
            cursor: pointer;
        }

        .switch-item.active {
            background: #9fe4df;
            color: var(--primary-dark);
            font-weight: 600;
        }

        .pay-item {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            justify-content: flex-end;
        }

        .pay-item input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
        }

        .upload-grid {
            display: flex;
            gap: 12px;
            padding: 14px;
            flex-wrap: wrap;
        }

        .upload-box {
            width: 128px;
            height: 94px;
            border: 1px dashed #d1d5db;
            border-radius: 10px;
            color: #9ca3af;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            gap: 6px;
            cursor: pointer;
            background: #fafafa;
            flex-shrink: 0;
        }

        .camera {
            font-size: 24px;
            line-height: 1;
        }

        .actions {
            display: flex;
            gap: 10px;
            padding: 16px 14px;
            background: var(--bg-card);
        }

        .btn {
            flex: 1;
            height: 42px;
            border-radius: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-primary {
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
        }

        .readonly {
            color: #9ca3af;
            font-size: 13px;
        }

        .location-select-wrap {
            width: min(380px, 100%);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .location-select-wrap select {
            flex: 1;
            min-width: 0;
        }

        .quick-link-btn {
            border: 1px solid var(--primary);
            background: #ecfbfa;
            color: var(--primary-dark);
            border-radius: 8px;
            padding: 0 10px;
            height: 34px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .quick-link-btn:hover {
            background: #d9f7f5;
        }

        .quick-location-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.42);
            z-index: 120;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .quick-location-modal-overlay.show {
            display: flex;
        }

        .quick-location-modal {
            width: min(640px, 100%);
            background: #fff;
            border-radius: 14px;
            border: 1px solid var(--border);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.16);
            overflow: hidden;
        }

        .quick-location-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            background: #f8fafc;
        }

        .quick-location-modal-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .quick-location-modal-close {
            border: none;
            background: transparent;
            font-size: 22px;
            color: var(--text-secondary);
            cursor: pointer;
            line-height: 1;
            padding: 0;
        }

        .quick-location-modal-body {
            padding: 14px 16px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .quick-location-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .quick-location-field.full {
            grid-column: 1 / -1;
        }

        .quick-location-code-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .quick-location-code-row input {
            flex: 1;
        }

        .quick-code-regenerate-btn {
            border: 1px solid var(--border);
            background: #f8fafc;
            color: var(--text-secondary);
            border-radius: 8px;
            height: 36px;
            padding: 0 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .quick-code-regenerate-btn:hover {
            border-color: var(--primary);
            color: var(--primary-dark);
            background: #ecfbfa;
        }

        .quick-location-field input,
        .quick-location-field select,
        .quick-location-field textarea {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 13px;
            color: var(--text-primary);
            outline: none;
            background: #fff;
        }

        .quick-location-field textarea {
            min-height: 74px;
            resize: vertical;
        }

        .quick-location-field input:focus,
        .quick-location-field select:focus,
        .quick-location-field textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.14);
        }

        .quick-location-modal-footer {
            padding: 12px 16px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .quick-location-modal-footer .btn {
            flex: none;
            min-width: 112px;
            height: 38px;
            padding: 0 14px;
        }

        @media (max-width: 1023px) {
            .page {
                padding: 12px 12px 18px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .page {
                padding: 0;
            }

            .header {
                top: 0;
                border-radius: 0;
                border-left: none;
                border-right: none;
                border-top: none;
                box-shadow: none;
                height: 52px;
            }

            .title {
                font-size: 16px;
            }

            .content-shell {
                margin-top: 0;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .form-column {
                gap: 10px;
            }

            .form-section {
                border-radius: 0;
                border-left: none;
                border-right: none;
            }

            .section-title {
                min-height: 36px;
                padding: 6px 12px;
            }

            .row {
                min-height: auto;
                padding: 10px 12px;
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .label {
                min-width: 0;
            }

            .value {
                text-align: left;
                justify-content: flex-start;
            }

            .value input,
            .value select {
                width: 100%;
                text-align: left;
            }

            .device-search-wrap,
            .device-search-input {
                width: 100%;
            }

            .upload-grid {
                overflow-x: auto;
                flex-wrap: nowrap;
                padding: 12px;
            }

            .upload-box {
                width: 118px;
                min-width: 118px;
                height: 90px;
            }

            .location-select-wrap {
                width: 100%;
                flex-direction: column;
                align-items: stretch;
            }

            .quick-link-btn {
                width: 100%;
                height: 36px;
            }

            .quick-location-modal-overlay {
                padding: 0;
                align-items: flex-end;
            }

            .quick-location-modal {
                width: 100%;
                border-radius: 14px 14px 0 0;
                border-left: none;
                border-right: none;
                border-bottom: none;
                max-height: 86vh;
                overflow-y: auto;
            }

            .quick-location-modal-body {
                grid-template-columns: 1fr;
            }

            .quick-location-modal-footer {
                padding-bottom: 20px;
            }

            .quick-location-modal-footer .btn {
                flex: 1;
            }

            .quick-location-code-row {
                flex-direction: column;
                align-items: stretch;
            }

            .quick-code-regenerate-btn {
                width: 100%;
            }

            .actions {
                padding: 12px;
            }

            .btn {
                height: 44px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <header class="header">
            <button class="back-btn" onclick="window.location.href='devices.html'">‹</button>
            <div class="title">设备入场</div>
        </header>

        <div class="content-shell">
            <div class="form-grid">
                <div class="form-column left-column">
                    <section class="form-section">
                        <div class="section-title">基本信息</div>
                        <div class="rows">
                            <div class="row">
                                <div class="label">选择设备</div>
                                <div class="value">
                                    <div class="device-search-wrap">
                                        <input type="text" id="deviceSearchInput" class="device-search-input" placeholder="输入设备编号..." onfocus="showDeviceDropdown()" oninput="onDeviceInputChange()" onchange="onDeviceChangeByInput()" onkeydown="handleDeviceInputEnter(event)">
                                        <div id="deviceDropdown" class="device-dropdown"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="label">所属客户</div>
                                <div class="value"><span id="merchantName" class="readonly">自动带出</span></div>
                            </div>
                            <div class="row">
                                <div class="label">点位名称</div>
                                <div class="value">
                                    <div class="location-select-wrap">
                                        <select id="locationSelect" onchange="onLocationChange()">
                                            <option value="">请选择</option>
                                        </select>
                                        <button type="button" class="quick-link-btn" onclick="openQuickCreateLocationModal()">+ 新增点位</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
                        <div class="section-title">运维人员<small style="color:#ef4444;margin-left:4px;">（至少选择一个）</small></div>
                        <div class="rows">
                            <div class="row">
                                <div class="label">选择员工</div>
                                <div class="value"><span id="operatorNameDisplay" class="link">请选择 ›</span></div>
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
                        <div class="section-title">定位设置</div>
                        <div class="rows">
                            <div class="row">
                                <div class="label">选择GPS定位</div>
                                <div class="value"><span id="gpsActionDisplay" class="link">获取当前位置 ›</span></div>
                            </div>
                            <div class="row">
                                <div class="label">经度</div>
                                <div class="value"><span id="longitudeDisplay" style="color:#9ca3af;">手动输入</span></div>
                            </div>
                            <div class="row">
                                <div class="label">纬度</div>
                                <div class="value"><span id="latitudeDisplay" style="color:#9ca3af;">手动输入</span></div>
                            </div>
                            <div class="row">
                                <div class="label">点位地址</div>
                                <div class="value"><input id="locationAddressInput" placeholder="请输入地址"></div>
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
                        <div class="section-title">其他设置</div>
                        <div class="rows">
                            <div class="row">
                                <div class="label">节能模式</div>
                                <div class="value">
                                    <div class="switch-group" id="energyModeGroup">
                                        <button type="button" class="switch-item active" data-value="开启">开启</button>
                                        <button type="button" class="switch-item" data-value="关闭">关闭</button>
                                    </div>
                                </div>
                            </div>
                            <div class="row" data-energy-time-row>
                                <div class="label">开启节能模式</div>
                                <div class="value"><input type="time" id="energyStartInput" value="18:00"></div>
                            </div>
                            <div class="row" data-energy-time-row>
                                <div class="label">关闭节能模式</div>
                                <div class="value"><input type="time" id="energyEndInput" value="08:00"></div>
                            </div>
                            <div class="row">
                                <div class="label">设备开始日期</div>
                                <div class="value"><input type="date" id="deviceStartDateInput"></div>
                            </div>
                            <div class="row">
                                <div class="label">设备结束日期</div>
                                <div class="value"><input type="date" id="deviceEndDateInput"></div>
                            </div>
                            <div class="row">
                                <div class="label">第五代终端</div>
                                <div class="value">
                                    <div class="switch-group" id="terminalGenerationGroup">
                                        <button type="button" class="switch-item active" data-value="开启">开启</button>
                                        <button type="button" class="switch-item" data-value="关闭">关闭</button>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="label">订单并行制作</div>
                                <div class="value">
                                    <div class="switch-group" id="parallelProductionGroup">
                                        <button type="button" class="switch-item active" data-value="开启">开启</button>
                                        <button type="button" class="switch-item" data-value="关闭">关闭</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>
                </div>

                <div class="form-column right-column">
                    <section class="form-section">
                        <div class="section-title">支付方式选择<small style="color:#ef4444;margin-left:4px;">（至少选择一个）</small></div>
                        <div class="rows">
                            <div class="row">
                                <div class="label">微信/支付宝扫码支付</div>
                                <div class="value">
                                    <div class="pay-item">
                                        <span style="color:#9ca3af;">˄ ˅</span>
                                        <input id="payQrCheckbox" type="checkbox" checked>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="label">数字人民币支付</div>
                                <div class="value">
                                    <div class="pay-item">
                                        <span style="color:#9ca3af;">˄ ˅</span>
                                        <input id="payDigitalRmbCheckbox" type="checkbox">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
                        <div class="section-title">显示器画面</div>
                        <div class="rows">
                            <div class="upload-grid">
                                <div class="upload-box">
                                    <div class="camera">📷</div>
                                    <div>上传机内画面</div>
                                </div>
                                <div class="upload-box">
                                    <div class="camera">📷</div>
                                    <div>上传机外画面</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="form-section">
                        <div class="section-title">点位照片</div>
                        <div class="rows">
                            <div class="upload-grid">
                                <div class="upload-box">
                                    <div class="camera">📷</div>
                                    <div>拍摄照片</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="form-section actions-section">
                        <div class="actions">
                            <button class="btn" onclick="window.location.href='devices.html'">取消</button>
                            <button class="btn btn-primary" onclick="submitEntry()">提交入场</button>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <div class="quick-location-modal-overlay" id="quickCreateLocationModal">
        <div class="quick-location-modal">
            <div class="quick-location-modal-header">
                <h3 class="quick-location-modal-title">快速新增点位</h3>
                <button type="button" class="quick-location-modal-close" onclick="closeQuickCreateLocationModal()">×</button>
            </div>
            <div class="quick-location-modal-body">
                <label class="quick-location-field">
                    <span>点位名称 *</span>
                    <input id="quickLocationName" placeholder="请输入点位名称">
                </label>
                <label class="quick-location-field">
                    <span>点位编码 *</span>
                    <div class="quick-location-code-row">
                        <input id="quickLocationCode" placeholder="自动生成，可手动修改">
                        <button type="button" class="quick-code-regenerate-btn" id="quickLocationCodeRegenerate" onclick="regenerateQuickLocationCode()">重新生成</button>
                    </div>
                </label>
                <label class="quick-location-field">
                    <span>点位分类 *</span>
                    <select id="quickLocationCategory">
                        <option value="exhibition">展会点位</option>
                        <option value="operation">运营点位</option>
                    </select>
                </label>
                <label class="quick-location-field">
                    <span>点位状态</span>
                    <select id="quickLocationStatus">
                        <option value="operational">运营中</option>
                        <option value="closed">暂停运营</option>
                    </select>
                </label>
                <label class="quick-location-field">
                    <span>所属商户（可选）</span>
                    <select id="quickLocationCustomer">
                        <option value="">不关联商户</option>
                    </select>
                </label>
                <label class="quick-location-field">
                    <span>负责人（可选）</span>
                    <input id="quickLocationManager" placeholder="请输入负责人">
                </label>
                <label class="quick-location-field">
                    <span>联系电话（可选）</span>
                    <input id="quickLocationPhone" placeholder="请输入联系电话">
                </label>
                <label class="quick-location-field full">
                    <span>详细地址 *</span>
                    <input id="quickLocationAddress" placeholder="请输入详细地址">
                </label>
                <label class="quick-location-field full">
                    <span>备注（可选）</span>
                    <textarea id="quickLocationRemark" placeholder="可填写补充说明"></textarea>
                </label>
            </div>
            <div class="quick-location-modal-footer">
                <button type="button" class="btn" onclick="closeQuickCreateLocationModal()">取消</button>
                <button type="button" class="btn btn-primary" onclick="createLocationFromEntry()">保存并选中</button>
            </div>
        </div>
    </div>

    <script>
        const merchantMap = {
            'mer001': '星巴克咖啡',
            'mer002': '瑞幸咖啡',
            'mer003': '太平洋咖啡',
            'mer004': 'Costa咖啡'
        };

        const POINT_CATEGORY_OPTIONS = ['exhibition', 'operation'];

        let devicesData = [];
        let locationsData = [];
        let customersData = [];
        let selectedDevice = null;
        let unenteredDeviceOptions = [];

        function initPage() {
            devicesData = JSON.parse(localStorage.getItem('devicesData') || '[]');
            locationsData = JSON.parse(localStorage.getItem('locationsData') || '[]');
            customersData = JSON.parse(localStorage.getItem('customersData') || '[]');
            renderDeviceOptions();
            renderLocationOptions();
            renderQuickLocationCustomerOptions();
            initSwitchGroups();
            setTodayAsDefaultDeviceStartDate();
            toggleEnergyTimeRowsVisibility();
            document.getElementById('gpsActionDisplay').addEventListener('click', requestCurrentLocation);
            document.getElementById('quickCreateLocationModal').addEventListener('click', function(event) {
                if (event.target === this) {
                    closeQuickCreateLocationModal();
                }
            });
        }

        function renderDeviceOptions() {
            unenteredDeviceOptions = devicesData
                .filter(d => d.entered === false || !d.location)
                .map(d => ({ value: d.id, label: d.id }));
            renderDeviceDropdown('');
        }

        function matchDeviceByInput(raw) {
            const keyword = raw.trim().toLowerCase();
            if (!keyword) return null;
            const exact = unenteredDeviceOptions.find(option => option.value.toLowerCase() === keyword);
            if (exact) return exact.value;
            const fuzzy = unenteredDeviceOptions.filter(option => option.value.toLowerCase().includes(keyword));
            return fuzzy.length === 1 ? fuzzy[0].value : null;
        }

        function renderLocationOptions() {
            const select = document.getElementById('locationSelect');
            let html = '<option value="">请选择</option>';
            locationsData.forEach(l => {
                html += `<option value="${l.code}" data-address="${l.address || ''}">${l.name}（${l.code}）</option>`;
            });
            select.innerHTML = html;
        }

        function normalizePointCategory(value) {
            const normalized = String(value || '').trim();
            if (POINT_CATEGORY_OPTIONS.includes(normalized)) return normalized;
            return 'operation';
        }

        function extractLocationCodeNumber(code) {
            const matched = String(code || '').trim().match(/^k(\d+)$/i);
            if (!matched) return null;
            const parsed = Number(matched[1]);
            return Number.isFinite(parsed) ? parsed : null;
        }

        function generateNextLocationCodeForEntry() {
            const used = new Set();
            let maxCodeNumber = 999;
            locationsData.forEach(item => {
                const rawCode = String(item?.code || '').trim();
                if (!rawCode) return;
                used.add(rawCode.toLowerCase());
                const codeNumber = extractLocationCodeNumber(rawCode);
                if (Number.isFinite(codeNumber)) {
                    maxCodeNumber = Math.max(maxCodeNumber, codeNumber);
                }
            });
            let next = maxCodeNumber + 1;
            let candidate = `k${next}`;
            while (used.has(candidate.toLowerCase())) {
                next += 1;
                candidate = `k${next}`;
            }
            return candidate;
        }

        function regenerateQuickLocationCode() {
            document.getElementById('quickLocationCode').value = generateNextLocationCodeForEntry();
        }

        function renderQuickLocationCustomerOptions() {
            const select = document.getElementById('quickLocationCustomer');
            if (!select) return;
            let html = '<option value="">不关联商户</option>';
            customersData.forEach(customer => {
                if (customer?.status === 'active') {
                    html += `<option value="${customer.id}">${customer.name}</option>`;
                }
            });
            select.innerHTML = html;
        }

        function openQuickCreateLocationModal() {
            resetQuickCreateLocationForm();
            document.getElementById('quickLocationCode').value = generateNextLocationCodeForEntry();
            renderQuickLocationCustomerOptions();
            document.getElementById('quickCreateLocationModal').classList.add('show');
        }

        function closeQuickCreateLocationModal() {
            document.getElementById('quickCreateLocationModal').classList.remove('show');
        }

        function resetQuickCreateLocationForm() {
            document.getElementById('quickLocationName').value = '';
            document.getElementById('quickLocationCode').value = generateNextLocationCodeForEntry();
            document.getElementById('quickLocationCategory').value = 'operation';
            document.getElementById('quickLocationStatus').value = 'operational';
            document.getElementById('quickLocationCustomer').value = '';
            document.getElementById('quickLocationManager').value = '';
            document.getElementById('quickLocationPhone').value = '';
            document.getElementById('quickLocationAddress').value = '';
            document.getElementById('quickLocationRemark').value = '';
        }

        function buildNextLocationId() {
            const maxId = locationsData.reduce((max, location) => {
                const raw = String(location?.id || '').replace(/^L/i, '');
                const num = Number(raw);
                if (!Number.isFinite(num)) return max;
                return Math.max(max, num);
            }, 0);
            return `L${String(maxId + 1).padStart(3, '0')}`;
        }

        function buildLocationPayloadForEntry() {
            const customerId = document.getElementById('quickLocationCustomer').value;
            const customer = customersData.find(item => item.id === customerId);
            return {
                id: buildNextLocationId(),
                name: document.getElementById('quickLocationName').value.trim(),
                code: document.getElementById('quickLocationCode').value.trim(),
                pointCategory: normalizePointCategory(document.getElementById('quickLocationCategory').value),
                status: document.getElementById('quickLocationStatus').value || 'operational',
                customerId,
                customerName: customer?.name || '',
                manager: document.getElementById('quickLocationManager').value.trim(),
                phone: document.getElementById('quickLocationPhone').value.trim(),
                address: document.getElementById('quickLocationAddress').value.trim(),
                remark: document.getElementById('quickLocationRemark').value.trim(),
                createTime: new Date().toISOString().split('T')[0]
            };
        }

        function validateQuickCreateLocation(location) {
            if (!location.name || !location.code || !location.address) {
                return '请填写点位名称、编码和地址';
            }
            const normalizedCode = String(location.code || '').trim();
            const duplicated = locationsData.some(existing =>
                String(existing?.code || '').trim().toLowerCase() === normalizedCode.toLowerCase()
            );
            if (duplicated) {
                return '点位编码已存在';
            }
            return '';
        }

        function createLocationFromEntry() {
            const location = buildLocationPayloadForEntry();
            const message = validateQuickCreateLocation(location);
            if (message) {
                alert(message);
                return;
            }
            locationsData.push(location);
            localStorage.setItem('locationsData', JSON.stringify(locationsData));
            renderLocationOptions();
            document.getElementById('locationSelect').value = location.code;
            onLocationChange();
            closeQuickCreateLocationModal();
            alert(`点位 ${location.name} 已创建并选中`);
        }

        function onDeviceInput() {
            selectedDevice = null;
            document.getElementById('merchantName').textContent = '自动带出';
        }

        function renderDeviceDropdown(keyword = '') {
            const dropdown = document.getElementById('deviceDropdown');
            const k = keyword.trim().toLowerCase();
            const list = !k ? unenteredDeviceOptions : unenteredDeviceOptions.filter(option => option.value.toLowerCase().includes(k) || option.label.toLowerCase().includes(k));
            if (!list.length) {
                dropdown.innerHTML = '<div class="device-option empty">无匹配设备</div>';
                return;
            }
            dropdown.innerHTML = list.map(option => `<div class="device-option" onmousedown="selectDeviceFromDropdown('${option.value}')">${option.label}</div>`).join('');
        }

        function showDeviceDropdown() {
            renderDeviceDropdown(document.getElementById('deviceSearchInput').value);
            document.getElementById('deviceDropdown').classList.add('show');
        }

        function hideDeviceDropdown() {
            document.getElementById('deviceDropdown').classList.remove('show');
        }

        function onDeviceInputChange() {
            onDeviceInput();
            renderDeviceDropdown(document.getElementById('deviceSearchInput').value);
            showDeviceDropdown();
        }

        function selectDeviceFromDropdown(deviceId) {
            const input = document.getElementById('deviceSearchInput');
            input.value = deviceId;
            onDeviceChangeByInput();
            input.dataset.skipChange = '1';
            hideDeviceDropdown();
        }

        function handleDeviceInputEnter(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                onDeviceChangeByInput();
                hideDeviceDropdown();
            }
        }

        function onDeviceChangeByInput() {
            const input = document.getElementById('deviceSearchInput');
            if (input.dataset.skipChange === '1') {
                input.dataset.skipChange = '0';
                return;
            }
            const id = matchDeviceByInput(input.value);
            if (!id) {
                selectedDevice = null;
                document.getElementById('merchantName').textContent = '自动带出';
                return;
            }
            input.value = id;
            selectedDevice = devicesData.find(d => d.id === id) || null;
            const merchant = selectedDevice ? (merchantMap[selectedDevice.merchant] || selectedDevice.merchant || '未设置') : '自动带出';
            document.getElementById('merchantName').textContent = merchant;
        }

        function onLocationChange() {
            const select = document.getElementById('locationSelect');
            const option = select.options[select.selectedIndex];
            const address = option ? (option.dataset.address || '') : '';
            document.getElementById('locationAddressInput').value = address;
        }

        function initSwitchGroups() {
            document.querySelectorAll('.switch-group').forEach(group => {
                group.addEventListener('click', function(event) {
                    const target = event.target.closest('.switch-item');
                    if (!target || !group.contains(target)) return;
                    event.preventDefault();
                    group.querySelectorAll('.switch-item').forEach(item => item.classList.remove('active'));
                    target.classList.add('active');
                    if (group.id === 'energyModeGroup') {
                        toggleEnergyTimeRowsVisibility();
                    }
                });
            });
        }

        function isEnergyModeEnabled(mode) {
            return String(mode || '').trim() === '开启';
        }

        function toggleEnergyTimeRowsVisibility() {
            const isEnabled = isEnergyModeEnabled(getSwitchGroupValue('energyModeGroup', '开启'));
            document.querySelectorAll('[data-energy-time-row]').forEach(row => {
                row.classList.toggle('hidden', !isEnabled);
            });
        }

        function setCoordinateDisplay(id, value) {
            const el = document.getElementById(id);
            if (!el) return;
            const text = String(value || '').trim();
            if (!text) {
                el.textContent = '手动输入';
                el.style.color = '#9ca3af';
                return;
            }
            el.textContent = text;
            el.style.color = '#1f2937';
        }

        function getLocationErrorMessage(error) {
            if (!error) return '定位失败，请稍后重试';
            if (error.code === 1) return '定位权限被拒绝，请允许定位权限后重试';
            if (error.code === 2) return '无法获取当前位置，请确认定位服务已开启';
            if (error.code === 3) return '定位超时，请稍后重试';
            return '定位失败，请稍后重试';
        }

        function setTodayAsDefaultDeviceStartDate() {
            const input = document.getElementById('deviceStartDateInput');
            if (!input || input.value) return;
            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            input.value = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
        }

        async function resolveAddressByCoordinates(latitude, longitude) {
            const fallback = `当前位置（经度${longitude}，纬度${latitude}）`;
            try {
                const params = new URLSearchParams({
                    latitude: String(latitude),
                    longitude: String(longitude),
                    localityLanguage: 'zh'
                });
                const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?${params.toString()}`);
                if (!response.ok) return fallback;
                const data = await response.json();
                const parts = [
                    data.countryName,
                    data.principalSubdivision,
                    data.city || data.locality,
                    data.locality,
                    data.streetName,
                    data.street
                ].map(item => String(item || '').trim()).filter(Boolean);
                const deduped = parts.filter((item, index) => parts.indexOf(item) === index);
                return deduped.join('') || fallback;
            } catch (error) {
                return fallback;
            }
        }

        async function requestCurrentLocation() {
            const actionEl = document.getElementById('gpsActionDisplay');
            if (!actionEl) return;
            if (!navigator.geolocation) {
                alert('当前浏览器不支持定位功能');
                return;
            }
            if (actionEl.dataset.locating === '1') return;
            actionEl.dataset.locating = '1';
            actionEl.textContent = '定位中...';
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 60000
                    });
                });
                const longitude = Number(position.coords.longitude).toFixed(6);
                const latitude = Number(position.coords.latitude).toFixed(6);
                setCoordinateDisplay('longitudeDisplay', longitude);
                setCoordinateDisplay('latitudeDisplay', latitude);
                document.getElementById('locationAddressInput').value = await resolveAddressByCoordinates(latitude, longitude);
            } catch (error) {
                alert(getLocationErrorMessage(error));
            } finally {
                actionEl.dataset.locating = '0';
                actionEl.textContent = '获取当前位置 ›';
            }
        }

        function getTextValue(id, fallback = '-') {
            const el = document.getElementById(id);
            if (!el) return fallback;
            const text = el.textContent.replace('›', '').trim();
            return text || fallback;
        }

        function getInputValue(id, fallback = '-') {
            const el = document.getElementById(id);
            if (!el) return fallback;
            const value = (el.value || '').trim();
            return value || fallback;
        }

        function getSwitchGroupValue(id, fallback = '-') {
            const group = document.getElementById(id);
            if (!group) return fallback;
            const active = group.querySelector('.switch-item.active');
            if (!active) return fallback;
            return (active.dataset.value || active.textContent || '').trim() || fallback;
        }

        function formatEntryTime() {
            const now = new Date();
            const pad = n => String(n).padStart(2, '0');
            return `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        }

        function getSelectedLocationName() {
            const select = document.getElementById('locationSelect');
            if (!select || !select.value) return '-';
            const option = select.options[select.selectedIndex];
            if (!option) return '-';
            const raw = option.textContent.replace(/（.*?）/, '').trim();
            return raw || '-';
        }

        function getPaymentMethods() {
            const list = [];
            if (document.getElementById('payQrCheckbox')?.checked) {
                list.push('微信/支付宝扫码支付');
            }
            if (document.getElementById('payDigitalRmbCheckbox')?.checked) {
                list.push('数字人民币支付');
            }
            return list.length ? list.join('、') : '未选择';
        }

        function buildEntryInfoPayload() {
            const energyMode = getSwitchGroupValue('energyModeGroup', '开启');
            const energyModeEnabled = isEnergyModeEnabled(energyMode);
            return {
                entryAt: formatEntryTime(),
                locationName: getSelectedLocationName(),
                locationAddress: getInputValue('locationAddressInput'),
                operatorName: getTextValue('operatorNameDisplay', '未选择'),
                gpsAction: getTextValue('gpsActionDisplay', '未获取'),
                longitude: getTextValue('longitudeDisplay', '手动输入'),
                latitude: getTextValue('latitudeDisplay', '手动输入'),
                energyMode,
                energyStartTime: energyModeEnabled ? getInputValue('energyStartInput') : '-',
                energyEndTime: energyModeEnabled ? getInputValue('energyEndInput') : '-',
                deviceStartDate: getInputValue('deviceStartDateInput'),
                deviceEndDate: getInputValue('deviceEndDateInput'),
                terminalGeneration5: getSwitchGroupValue('terminalGenerationGroup', '开启'),
                parallelProduction: getSwitchGroupValue('parallelProductionGroup', '开启'),
                payQr: !!document.getElementById('payQrCheckbox')?.checked,
                payDigitalRmb: !!document.getElementById('payDigitalRmbCheckbox')?.checked,
                paymentMethods: getPaymentMethods(),
                displayImages: '待上传',
                locationImages: '待上传'
            };
        }

        function submitEntry() {
            const deviceInput = document.getElementById('deviceSearchInput').value;
            const deviceId = matchDeviceByInput(deviceInput);
            const locationCode = document.getElementById('locationSelect').value;
            if (!deviceId) {
                alert('请选择设备');
                return;
            }
            if (!locationCode) {
                alert('请选择点位');
                return;
            }

            const device = devicesData.find(d => d.id === deviceId);
            if (!device) {
                alert('设备不存在');
                return;
            }

            device.location = locationCode;
            device.entered = true;
            device.entryInfo = buildEntryInfoPayload();
            if (device.sales !== 'enabled') {
                device.sales = 'enabled';
            }
            if (!device.heartbeat || device.heartbeat === '-') {
                device.heartbeat = '刚刚';
            }

            localStorage.setItem('devicesData', JSON.stringify(devicesData));
            alert(`设备 ${deviceId} 已完成入场`);
            window.location.href = 'devices.html';
        }

        document.addEventListener('click', function(e) {
            const wrap = document.querySelector('.device-search-wrap');
            if (wrap && !wrap.contains(e.target)) {
                hideDeviceDropdown();
            }
        });

        initPage();
    </script>
</body>
</html>
