<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>故障列表 - 运营控制台</title>
    <meta name="format-detection" content="telephone=no">
    <style>
        :root {
            --primary: #4ECDC4;
            --primary-light: #e8f8f7;
            --primary-dark: #3dbdb4;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --bg-sidebar: #0b132b;
            --border: #e5e7eb;
            --border-light: #f3f4f6;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-body);
            min-height: 100vh;
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: var(--bg-sidebar);
            color: #dbeafe;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-title {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
        }

        .brand-version {
            font-size: 12px;
            color: rgba(219, 234, 254, 0.55);
            padding-left: 52px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 8px 12px;
            min-height: 0;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 8px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: rgba(186, 230, 253, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 14px;
            margin-bottom: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 11px 14px;
            margin-bottom: 2px;
            color: rgba(219, 234, 254, 0.88);
            text-decoration: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .nav-item:hover {
            background: rgba(46, 196, 182, 0.14);
            color: #ffffff;
        }

        .nav-item.active {
            background: linear-gradient(130deg, rgba(46, 196, 182, 0.38), rgba(56, 189, 248, 0.38));
            color: #ffffff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .main {
            flex: 1;
            margin-left: 240px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-title {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            line-height: 1;
        }

        .header-desc {
            margin-top: 6px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text-secondary);
            height: 40px;
            border-radius: 12px;
            padding: 0 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-icon:hover {
            border-color: var(--primary);
            color: var(--primary-dark);
            background: var(--primary-light);
        }

        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .tabs-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 12px;
            box-shadow: var(--shadow);
        }

        .search-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 460px;
        }

        .search-input {
            width: 100%;
            height: 44px;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0 14px 0 40px;
            font-size: 14px;
            color: var(--text-primary);
            background: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: nowrap;
        }

        .tab {
            border: 1px solid var(--border);
            background: #fff;
            border-radius: 12px;
            padding: 9px 18px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 600;
        }

        .tab.active {
            border-color: var(--primary);
            color: var(--primary-dark);
            background: var(--primary-light);
            font-weight: 600;
        }

        .summary {
            margin-top: 10px;
            padding: 0 4px;
            font-size: 13px;
            color: var(--text-tertiary);
            text-align: right;
        }

        .list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(560px, 1fr));
            gap: 16px;
        }

        .fault-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow);
            overflow: hidden;
            padding: 14px 16px 12px;
        }

        .abnormal-record-list {
            display: grid;
            gap: 12px;
        }

        .abnormal-record-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: var(--shadow);
            padding: 14px 16px 12px;
            display: grid;
            gap: 10px;
        }

        .abnormal-record-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .abnormal-record-desc {
            margin-top: 4px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .abnormal-record-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .abnormal-filter-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 2px;
        }

        .abnormal-filter-btn {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text-secondary);
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .abnormal-filter-btn.active {
            border-color: var(--primary);
            color: var(--primary-dark);
            background: var(--primary-light);
        }

        .fault-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0 24px;
        }

        .fault-row {
            display: grid;
            grid-template-columns: 110px 1fr;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-light);
            align-items: start;
        }

        .fault-row:last-of-type {
            border-bottom: none;
        }

        .fault-label {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
        }

        .fault-value {
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.45;
            text-align: left;
            word-break: break-word;
        }

        .org-status {
            margin-top: 12px;
            padding: 12px 0 2px;
            border-top: 1px solid var(--border-light);
        }

        .org-title {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .org-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .org-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: #f8fafc;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .org-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #9ca3af;
        }

        .org-chip.normal .org-dot {
            background: #2ec4b6;
        }

        .org-chip.lost .org-dot {
            background: #cbd5e1;
        }

        .org-chip.fault .org-dot {
            background: #ef4444;
        }

        .fault-actions {
            margin: 12px -16px -12px;
            border-top: 1px solid var(--border-light);
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            background: #fff;
        }

        .fault-action-btn {
            height: 52px;
            border: none;
            border-right: 1px solid var(--border-light);
            background: #fff;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
        }

        .fault-action-btn:last-child {
            border-right: none;
        }

        .fault-action-btn:hover {
            background: #f8fafc;
        }

        .fault-action-btn:active {
            background: #eef2f7;
        }

        .fault-sheet-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1200;
        }

        .fault-sheet-overlay.active {
            display: block;
        }

        .fault-sheet-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .fault-sheet-panel {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            background: #fff;
            border-radius: 24px 24px 0 0;
            overflow: hidden;
            box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.2);
        }

        .fault-sheet-option {
            width: 100%;
            height: 88px;
            border: none;
            border-top: 1px solid var(--border-light);
            background: #fff;
            color: #111827;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
        }

        .fault-sheet-option:first-child {
            border-top: none;
        }

        .fault-sheet-option:hover {
            background: #f8fafc;
        }

        .fault-sheet-overlay.desktop-mode .fault-sheet-backdrop {
            background: rgba(15, 23, 42, 0.4);
        }

        .fault-desktop-dialog {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(460px, calc(100vw - 48px));
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 24px 56px rgba(15, 23, 42, 0.25);
            overflow: hidden;
        }

        .fault-desktop-title {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .fault-desktop-option {
            width: 100%;
            height: 52px;
            border: none;
            border-top: 1px solid var(--border-light);
            background: #fff;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 600;
            text-align: left;
            padding: 0 20px;
            cursor: pointer;
        }

        .fault-desktop-option:hover {
            background: #f8fafc;
        }

        .status-page-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1250;
            background: #f3f4f6;
            overflow-y: auto;
        }

        .status-page-overlay.active {
            display: block;
        }

        .status-page-overlay.desktop-mode.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.4);
        }

        .status-page-shell {
            width: min(860px, calc(100vw - 56px));
            max-height: calc(100vh - 64px);
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 24px 56px rgba(15, 23, 42, 0.25);
            overflow: auto;
        }

        .status-page-overlay.desktop-mode .status-page-header {
            position: sticky;
            top: 0;
            height: 64px;
        }

        .status-page-overlay.desktop-mode .status-page-title {
            font-size: 26px;
            letter-spacing: 0;
        }

        .status-page-overlay.desktop-mode .status-record-list {
            margin-top: 0;
            border-top: none;
        }

        .status-page-overlay.desktop-mode .status-record-item {
            font-size: 16px;
            padding: 18px 20px;
        }

        .status-page-overlay.desktop-mode .abnormal-list {
            padding: 16px;
            background: #f8fafc;
        }

        .status-page-overlay.desktop-mode .abnormal-time {
            font-size: 16px;
        }

        .status-page-overlay.desktop-mode .abnormal-code {
            font-size: 14px;
        }

        .status-page-overlay.desktop-mode .abnormal-message {
            font-size: 18px;
        }

        .status-page-header {
            position: sticky;
            top: 0;
            z-index: 2;
            height: 88px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-bottom: 1px solid var(--border-light);
        }

        .status-page-back {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: #111827;
            font-size: 24px;
            cursor: pointer;
        }

        .status-page-title {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #111827;
            line-height: 1;
        }

        .status-record-list {
            margin-top: 16px;
            background: #fff;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }

        .status-record-item {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--border-light);
            background: #fff;
            padding: 24px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 20px;
            color: #111827;
            cursor: pointer;
        }

        .status-record-item:last-child {
            border-bottom: none;
        }

        .status-record-arrow {
            color: #9ca3af;
            font-size: 24px;
            line-height: 1;
        }

        .abnormal-list {
            padding: 14px;
            display: grid;
            gap: 12px;
        }

        .abnormal-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 14px;
        }

        .abnormal-time {
            font-size: 20px;
            color: #6b7280;
            margin-bottom: 10px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 10px;
        }

        .abnormal-code {
            font-size: 18px;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .abnormal-message {
            font-size: 22px;
            color: #6b7280;
            line-height: 1.35;
            word-break: break-word;
        }

        .btn {
            flex: 1;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-ghost {
            background: #fff;
            border-color: #bce9e5;
            color: #49b8b1;
        }

        .empty {
            grid-column: 1 / -1;
            background: #fff;
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            color: var(--text-tertiary);
            text-align: center;
            padding: 48px 16px;
        }

        .mobile-header {
            display: none;
            background: #fff;
            height: 56px;
            padding: 0 16px;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .menu-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 99;
        }

        .overlay.show {
            display: block;
        }

        @media (max-width: 1024px) {
            .header-title {
                font-size: 32px;
            }

            .list {
                grid-template-columns: 1fr;
            }

            .fault-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
            }

            .mobile-header {
                display: flex;
            }

            .header {
                position: static;
                padding: 14px 16px;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .header-title {
                font-size: 30px;
            }

            .header-desc {
                margin-top: 4px;
                font-size: 14px;
            }

            .header-right {
                width: 100%;
            }

            .btn-icon {
                width: 100%;
            }

            .content {
                padding: 14px;
                gap: 12px;
            }

            .tabs {
                display: grid;
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .search-row {
                margin-bottom: 8px;
            }

            .search-input {
                width: 100%;
            }

            .tab {
                text-align: center;
            }

            .fault-row {
                grid-template-columns: 86px 1fr;
                gap: 8px;
                padding: 10px 12px;
            }

            .fault-label,
            .fault-value {
                font-size: 12px;
            }

            .fault-action-btn {
                height: 44px;
                font-size: 14px;
            }

            .fault-sheet-option {
                height: 64px;
                font-size: 16px;
            }

            .status-page-header {
                height: 60px;
            }

            .status-page-title {
                font-size: 18px;
            }

            .status-record-item {
                padding: 16px;
                font-size: 15px;
            }

            .abnormal-time {
                font-size: 14px;
            }

            .abnormal-code {
                font-size: 14px;
            }

            .abnormal-message {
                font-size: 16px;
            }

        }

        @media (min-width: 769px) {
            .mobile-header,
            .overlay {
                display: none !important;
            }
        }
        /* 跨页统一优化（桌面 + 移动） */
        .content {
            width: 100%;
            max-width: 1480px;
            margin: 0 auto;
        }

        .header {
            padding: 18px 28px;
        }

        @media (max-width: 768px) {
            .header {
                padding: 14px 14px 12px;
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }

            .header-title {
                font-size: 30px;
                line-height: 1;
            }

            .content {
                padding: 14px;
            }

            .fault-card,
            .fault-list,
            .filter-section,
            .stats-bar {
                border-radius: 14px;
                box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand">
                    <div class="brand-icon"><img src="logo.png" alt="COFE+"></div>
                    <div class="brand-title">运营控制台</div>
                </div>
                <div class="brand-version">Prototype v0</div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <div class="nav-section-title">运营管理</div>
                    <a href="overview.html" class="nav-item"><span class="nav-icon">📊</span><span>总览</span></a>
                    <a href="devices.html" class="nav-item"><span class="nav-icon">⚙️</span><span>设备</span></a>
                    <a href="menu-management.html" class="nav-item"><span class="nav-icon">📋</span><span>商品管理</span></a>

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function renderTabs() {
            const tabWrap = document.getElementById('tabs');
            tabWrap.innerHTML = tabConfig.map(tab => (
                `<button class="tab ${tab.key === currentTab ? 'active' : ''}" onclick="switchTab('${tab.key}')">${tab.label}</button>`
            )).join('');
        }

        function getFilteredFaults() {
            const keyword = searchKeyword.trim().toLowerCase();
            return faults.filter(item => {
                if (item.status !== currentTab) return false;
                if (!keyword) return true;
                return item.id.toLowerCase().includes(keyword) || item.siteName.toLowerCase().includes(keyword);
            });
        }

        function handleSearch() {
            searchKeyword = document.getElementById('deviceSearch').value || '';
            renderSummary();
            renderList();
        }

        function getFilteredAbnormalRecords() {
            const keyword = searchKeyword.trim().toLowerCase();
            return abnormalRecords
                .filter(item => {
                    const statusMatched = abnormalStatusFilter === 'all' || item.status === abnormalStatusFilter;
                    if (!statusMatched) return false;
                    if (!keyword) return true;
                    const values = [item.deviceId, item.siteName, item.message];
                    return values.some(value => String(value || '').toLowerCase().includes(keyword));
                })
                .slice()
                .sort((a, b) => String(b.startedAt).localeCompare(String(a.startedAt)));
        }

        function getAbnormalTypeLabel(type) {
            if (type === 'fault') return '故障';
            if (type === 'lost') return '失联';
            if (type === 'shortage') return '缺料';
            if (type === 'manual') return '人工操作';
            return '异常';
        }

        function getAbnormalStatusLabel(status) {
            return status === 'open' ? '未恢复' : '已恢复';
        }

        function renderAbnormalRecordList(records) {
            const filterControls = `
                <div class="abnormal-filter-row">
                    <button
                        type="button"
                        class="abnormal-filter-btn ${abnormalStatusFilter === 'all' ? 'active' : ''}"
                        onclick="switchAbnormalStatusFilter('all')"
                    >全部</button>
                    <button
                        type="button"
                        class="abnormal-filter-btn ${abnormalStatusFilter === 'open' ? 'active' : ''}"
                        onclick="switchAbnormalStatusFilter('open')"
                    >未恢复</button>
                    <button
                        type="button"
                        class="abnormal-filter-btn ${abnormalStatusFilter === 'recovered' ? 'active' : ''}"
                        onclick="switchAbnormalStatusFilter('recovered')"
                    >已恢复</button>
                </div>
            `;

            if (!records.length) {
                return `${filterControls}<div class="empty">当前筛选下暂无异常记录</div>`;
            }

            return `
                ${filterControls}
                <div class="abnormal-record-list">
                    ${records.map(item => `
                        <article class="abnormal-record-item">
                            <div class="abnormal-record-main">
                                <div class="abnormal-record-title">${escapeText(item.deviceId)} · ${escapeText(item.siteName)}</div>
                                <div class="abnormal-record-desc">${escapeText(item.message || '-')}</div>
                            </div>
                            <div class="abnormal-record-meta">
                                <span>${escapeText(getAbnormalTypeLabel(item.type))}</span>
                                <span>${escapeText(item.code || '-')}</span>
                                <span>${escapeText(getAbnormalStatusLabel(item.status))}</span>
                                <span>${escapeText(item.startedAt || '-')}</span>
                            </div>
                        </article>
                    `).join('')}
                </div>
            `;
        }

        function switchAbnormalStatusFilter(nextStatus) {
            abnormalStatusFilter = nextStatus;
            renderSummary();
            renderList();
        }

        function getSummaryText() {
            if (currentTab === 'abnormal') {
                const records = getFilteredAbnormalRecords();
                const openCount = records.filter(item => item.status === 'open').length;
                return `总计 ${records.length} 条异常（未恢复 ${openCount} 条）`;
            }
            const list = getFilteredFaults();
            return `总计 ${list.length} 台设备`;
        }

        function renderSummary() {
            document.getElementById('summary').textContent = getSummaryText();
        }

        function isDesktopInteractionMode() {
            const width = Number(window?.innerWidth || 0);
            return width >= 1024;
        }

        function wrapStatusPage(content, isDesktop) {
            if (!isDesktop) return content;
            return `<div class="status-page-shell">${content}</div>`;
        }

        function escapeText(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function openRemoteActions(deviceId) {
            activeFaultDeviceId = deviceId;
            const panel = document.getElementById('remoteActionSheet');
            if (!panel) return;
            const isDesktop = isDesktopInteractionMode();
            panel.classList.toggle('desktop-mode', isDesktop);
            panel.innerHTML = isDesktop
                ? `
                    <div class="fault-sheet-backdrop" onclick="closeRemoteActions()"></div>
                    <div class="fault-desktop-dialog">
                        <div class="fault-desktop-title">远程操作 · ${escapeText(deviceId)}</div>
                        <button type="button" class="fault-desktop-option" onclick="handleRemoteAction('机构重启')">机构重启</button>
                        <button type="button" class="fault-desktop-option" onclick="handleRemoteAction('设备开门')">设备开门</button>
                        <button type="button" class="fault-desktop-option" onclick="handleRemoteAction('更新配方')">更新配方</button>
                        <button type="button" class="fault-desktop-option" onclick="handleRemoteAction('设备停售')">设备停售</button>
                        <button type="button" class="fault-desktop-option" onclick="handleRemoteAction('音量调节')">音量调节</button>
                    </div>
                `
                : `
                    <div class="fault-sheet-backdrop" onclick="closeRemoteActions()"></div>
                    <div class="fault-sheet-panel">
                        <button type="button" class="fault-sheet-option" onclick="handleRemoteAction('机构重启')">机构重启</button>
                        <button type="button" class="fault-sheet-option" onclick="handleRemoteAction('设备开门')">设备开门</button>
                        <button type="button" class="fault-sheet-option" onclick="handleRemoteAction('更新配方')">更新配方</button>
                        <button type="button" class="fault-sheet-option" onclick="handleRemoteAction('设备停售')">设备停售</button>
                        <button type="button" class="fault-sheet-option" onclick="handleRemoteAction('音量调节')">音量调节</button>
                    </div>
                `;
            panel.classList.add('active');
        }

        function closeRemoteActions() {
            const panel = document.getElementById('remoteActionSheet');
            if (!panel) return;
            panel.classList.remove('active');
            panel.classList.remove('desktop-mode');
        }

        function handleRemoteAction(actionName) {
            closeRemoteActions();
            alert(`已向设备 ${activeFaultDeviceId || '-'} 下发指令：${actionName}`);
        }

            activeFaultDeviceId = deviceId;

            const isDesktop = isDesktopInteractionMode();

                        <button type="button" class="fault-desktop-option" onclick="applyDeviceStatus('shortage')">缺料</button>
                    </div>
                `
                : `
                    <div class="fault-sheet-backdrop" onclick="closeEditStatus()"></div>
                    <div class="fault-sheet-panel">
                        <button type="button" class="fault-sheet-option" onclick="applyDeviceStatus('normal')">正常</button>

                        <button type="button" class="fault-sheet-option" onclick="applyDeviceStatus('shortage')">缺料</button>
                    </div>
                `;
            panel.classList.add('active');
        }

        function closeEditStatus() {
            const panel = document.getElementById('editStatusSheet');
            if (!panel) return;
            panel.classList.remove('active');
            panel.classList.remove('desktop-mode');
        }

        function applyDeviceStatus(statusKey) {
            const target = faults.find(item => item.id === activeFaultDeviceId);
            if (target) {
                target.status = statusKey;
                if (statusKey !== 'fault') {
                    target.deviceStatus = '在线';
                }
            }
            closeEditStatus();
            renderTabs();
            renderSummary();
            renderList();
        }

        function getAbnormalRecords(deviceId) {
            return abnormalRecords
                .filter(item => item.deviceId === deviceId)
                .slice()
                .sort((a, b) => String(b.startedAt).localeCompare(String(a.startedAt)))
                .map(item => ({
                    time: item.startedAt || '-',
                    code: item.code || '',
                    message: item.message || '-'
                }));
        }

        function openStatusRecords(deviceId) {
            activeFaultDeviceId = deviceId;
            const page = document.getElementById('statusRecordPage');
            if (!page) return;
            const isDesktop = isDesktopInteractionMode();
            page.classList.toggle('desktop-mode', isDesktop);
            if (isDesktop) {
                page.onclick = function(event) {
                    if (event.target === page) closeStatusRecords();
                };
            } else {
                page.onclick = null;
            }
            const content = `
                <header class="status-page-header">
                    <button type="button" class="status-page-back" onclick="closeStatusRecords()">‹</button>
                    <div class="status-page-title">状态</div>
                </header>

                    <button type="button" class="status-record-item" onclick="openAbnormalRecords()">
                        <span>异常记录</span>
                        <span class="status-record-arrow">›</span>
                    </button>
                    <button type="button" class="status-record-item" onclick="alert('运维记录开发中')">
                        <span>运维记录</span>
                        <span class="status-record-arrow">›</span>
                    </button>
                    <button type="button" class="status-record-item" onclick="alert('废料记录开发中')">
                        <span>废料记录</span>
                        <span class="status-record-arrow">›</span>
                    </button>
                </div>
            `;
            page.innerHTML = wrapStatusPage(content, isDesktop);
            page.classList.add('active');
        }

        function closeStatusRecords() {
            const page = document.getElementById('statusRecordPage');
            if (!page) return;
            page.classList.remove('active');
            page.classList.remove('desktop-mode');
            page.onclick = null;
        }

        function openAbnormalRecords() {
            const page = document.getElementById('abnormalRecordPage');
            if (!page) return;
            const statusPage = document.getElementById('statusRecordPage');
            if (statusPage) statusPage.classList.remove('active');
            const deviceId = activeFaultDeviceId || '-';
            const records = getAbnormalRecords(deviceId);
            const isDesktop = isDesktopInteractionMode();
            page.classList.toggle('desktop-mode', isDesktop);
            if (isDesktop) {
                page.onclick = function(event) {
                    if (event.target === page) closeAbnormalRecords();
                };
            } else {
                page.onclick = null;
            }
            const content = `
                <header class="status-page-header">
                    <button type="button" class="status-page-back" onclick="closeAbnormalRecords()">‹</button>
                    <div class="status-page-title">${escapeText(deviceId)}-异常记录</div>
                </header>
                <div class="abnormal-list">
                    ${records.map(item => `
                        <article class="abnormal-card">
                            <div class="abnormal-time">${escapeText(item.time)}</div>
                            <div class="abnormal-code">故障码：${escapeText(item.code || '')}</div>
                            <div class="abnormal-message">${escapeText(item.message)}</div>
                        </article>
                    `).join('')}
                </div>
            `;
            page.innerHTML = wrapStatusPage(content, isDesktop);
            page.classList.add('active');
        }

        function closeAbnormalRecords() {
            const page = document.getElementById('abnormalRecordPage');
            if (!page) return;
            page.classList.remove('active');
            page.classList.remove('desktop-mode');
            page.onclick = null;
            openStatusRecords(activeFaultDeviceId);
        }

        function goToDeviceMaterials(deviceId) {
            try {
                sessionStorage.setItem('currentDevice', deviceId);
            } catch (error) {
                // ignore storage failures and continue navigation
            }
            window.location.href = `materials.html?device=${encodeURIComponent(deviceId)}`;
        }

        function shouldShowFaultActions(item) {
            const deviceStatusText = String(item?.deviceStatus || '').trim().toLowerCase();
            return item?.status === 'fault' || deviceStatusText === '故障' || deviceStatusText === 'fault';
        }

        function renderFaultActions(item) {
            if (!shouldShowFaultActions(item)) return '';
            return `
                <div class="fault-actions">
                    <button type="button" class="fault-action-btn" onclick="openRemoteActions('${item.id}')">远程操作</button>
                    <button type="button" class="fault-action-btn" onclick="openEditStatus('${item.id}')">编辑状态</button>
                    <button type="button" class="fault-action-btn" onclick="goToDeviceMaterials('${item.id}')">物料</button>
                    <button type="button" class="fault-action-btn" onclick="openStatusRecords('${item.id}')">状态记录</button>
                </div>
            `;
        }

        function renderList() {
            const container = document.getElementById('list');
            if (currentTab === 'abnormal') {
                const records = getFilteredAbnormalRecords();
                container.innerHTML = renderAbnormalRecordList(records);
                return;
            }
            const data = getFilteredFaults();
            if (!data.length) {
                container.innerHTML = '<div class="empty">当前状态下暂无故障单</div>';
                return;
            }

            container.innerHTML = data.map(item => `
                <article class="fault-card">
                    <div class="fault-grid">
                        <div class="fault-row"><div class="fault-label">设备编号</div><div class="fault-value">${item.id}</div></div>
                        <div class="fault-row"><div class="fault-label">点位名称</div><div class="fault-value">${item.siteName}</div></div>
                        <div class="fault-row"><div class="fault-label">设备状态</div><div class="fault-value">${item.deviceStatus}</div></div>
                        <div class="fault-row"><div class="fault-label">停售状态</div><div class="fault-value">${item.sellStatus}</div></div>
                        <div class="fault-row"><div class="fault-label">冰箱温度</div><div class="fault-value">${item.fridgeTemp}</div></div>
                        <div class="fault-row"><div class="fault-label">豆仓温度</div><div class="fault-value">${item.beanTemp}</div></div>
                        <div class="fault-row"><div class="fault-label">制作仓温度</div><div class="fault-value">${item.craftTemp}</div></div>
                        <div class="fault-row"><div class="fault-label">豆仓湿度</div><div class="fault-value">${item.beanHumidity}</div></div>
                        <div class="fault-row"><div class="fault-label">更新时间</div><div class="fault-value">${item.updatedAt}</div></div>
                        <div class="fault-row"><div class="fault-label">上位机软件</div><div class="fault-value">${item.upperSoftware}</div></div>
                        <div class="fault-row"><div class="fault-label">点单屏软件</div><div class="fault-value">${item.orderSoftware}</div></div>
                        <div class="fault-row"><div class="fault-label">点单屏系统</div><div class="fault-value">${item.orderSystem}</div></div>
                        <div class="fault-row"><div class="fault-label">点单屏内核</div><div class="fault-value">${item.orderKernel}</div></div>
                        <div class="fault-row"><div class="fault-label">广告屏版本</div><div class="fault-value">${item.adVersion}</div></div>
                        <div class="fault-row"><div class="fault-label">固件版本</div><div class="fault-value">${item.firmwareVersion}</div></div>
                    </div>
                    <div class="org-status">
                        <div class="org-title">机构状态</div>
                        <div class="org-grid">
                            ${(item.orgStatus || []).map(part => `
                                <span class="org-chip ${part.status}">
                                    <span class="org-dot"></span>
                                    <span>${part.label} ${part.name}</span>
                                </span>
                            `).join('')}
                        </div>
                    </div>
                    ${renderFaultActions(item)}
                </article>
            `).join('');
        }

        function switchTab(tab) {
            currentTab = tab;
            renderTabs();
            renderSummary();
            renderList();
        }

        function viewFault(id) {
            const target = faults.find(item => item.id === id);
            if (!target) return;
            alert(`设备 ${target.id}\n点位: ${target.siteName}\n状态: ${tabConfig.find(t => t.key === target.status).label}`);
        }

        renderTabs();
        renderSummary();
        renderList();
    </script>
</body>
</html>
