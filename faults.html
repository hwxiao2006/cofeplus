<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>故障列表 - 运营控制台</title>
    <meta name="format-detection" content="telephone=no">
    <style>
        :root {
            --primary: #4ECDC4;
            --primary-light: #e8f8f7;
            --primary-dark: #3dbdb4;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --bg-sidebar: #0b132b;
            --border: #e5e7eb;
            --border-light: #f3f4f6;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.08);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-body);
            min-height: 100vh;
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            --sidebar-header-padding-x: 24px;
            --sidebar-nav-padding-x: 12px;
            --sidebar-section-title-padding-x: 14px;
            width: 240px;
            background: var(--bg-sidebar);
            color: #dbeafe;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            z-index: 100;
        }

        .sidebar-header {
            padding: 24px var(--sidebar-header-padding-x);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
        }

        .brand-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .brand-title {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
        }

        .sidebar-meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
            padding-left: calc(var(--sidebar-nav-padding-x) + var(--sidebar-section-title-padding-x) - var(--sidebar-header-padding-x));
            min-width: 0;
        }

        .brand-version {
            font-size: 12px;
            line-height: 1;
            color: rgba(219, 234, 254, 0.55);
            white-space: nowrap;
        }


        .sidebar-login {
            margin-top: 8px;
            padding-top: 8px;
            padding-left: calc(var(--sidebar-nav-padding-x) + var(--sidebar-section-title-padding-x) - var(--sidebar-header-padding-x));
            border-top: 1px solid rgba(219, 234, 254, 0.12);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 6px;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            font-size: 11px;
        }

        .sidebar-login-name {
            color: rgba(241, 245, 249, 0.86);
            font-weight: 500;
            line-height: 1.2;
            flex: 0 0 auto;
            font-size: 1em;
        }

        .sidebar-login-phone {
            color: rgba(219, 234, 254, 0.58);
            line-height: 1.2;
            flex: 0 0 auto;
            white-space: nowrap;
            font-size: 1em;
        }

        .sidebar-login-phone::before {
            content: '·';
            color: rgba(219, 234, 254, 0.46);
            margin: 0 6px;
        }
        .sidebar-admin-lang {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            color: rgba(219, 234, 254, 0.62);
            font-size: 11px;
            line-height: 1;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        .sidebar-admin-lang::before {
            content: '·';
            color: rgba(219, 234, 254, 0.32);
            margin-right: 2px;
        }

        .sidebar-admin-lang-btn {
            border: 0;
            padding: 0;
            background: transparent;
            color: inherit;
            font: inherit;
            cursor: pointer;
            transition: color 0.15s ease, opacity 0.15s ease;
            opacity: 0.78;
        }

        .sidebar-admin-lang-btn:hover {
            color: #ffffff;
            opacity: 1;
        }

        .sidebar-admin-lang-btn.active {
            color: #ffffff;
            opacity: 1;
            font-weight: 600;
        }

        .sidebar-admin-lang-sep {
            opacity: 0.34;
        }

        .sidebar-nav {
            flex: 1;
            padding: 8px var(--sidebar-nav-padding-x);
            min-height: 0;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 8px;
        }

        .nav-section-title {
            font-size: 11px;
            font-weight: 600;
            color: rgba(186, 230, 253, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px var(--sidebar-section-title-padding-x);
            margin-bottom: 4px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 11px 14px;
            margin-bottom: 2px;
            color: rgba(219, 234, 254, 0.88);
            text-decoration: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            transition: all 0.15s;
        }

        .nav-item:hover {
            background: rgba(46, 196, 182, 0.14);
            color: #ffffff;
        }

        .nav-item.active {
            background: linear-gradient(130deg, rgba(46, 196, 182, 0.38), rgba(56, 189, 248, 0.38));
            color: #ffffff;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .nav-icon {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .main {
            flex: 1;
            margin-left: 240px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header-title {
            font-size: 30px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            line-height: 1;
        }

        .header-desc {
            margin-top: 6px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .header-right {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text-secondary);
            height: 40px;
            border-radius: 12px;
            padding: 0 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-icon:hover {
            border-color: var(--primary);
            color: var(--primary-dark);
            background: var(--primary-light);
        }

        .content {
            padding: 22px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .tabs-card {
            background: var(--bg-card);
            border: 1px solid #dde3ea;
            border-radius: 14px;
            padding: 14px 16px;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
        }

        .search-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 420px;
        }

        .fault-device-filter {
            position: relative;
            width: 100%;
            max-width: 420px;
        }

        .fault-device-trigger {
            width: 100%;
            height: 40px;
            border: 1px solid #d4dce5;
            border-radius: 10px;
            padding: 0 14px;
            background: #fbfdff;
            color: var(--text-primary);
            font-size: 13px;
            text-align: left;
            cursor: pointer;
        }

        .fault-device-trigger:focus {
            outline: none;
            border-color: #2ec4b6;
            box-shadow: 0 0 0 3px rgba(46, 196, 182, 0.16);
        }

        .search-input {
            width: 100%;
            height: 40px;
            border: 1px solid #d4dce5;
            border-radius: 10px;
            padding: 0 14px 0 40px;
            font-size: 13px;
            color: var(--text-primary);
            background: #fbfdff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-input:focus {
            border-color: #2ec4b6;
            box-shadow: 0 0 0 3px rgba(46, 196, 182, 0.16);
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .device-search-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            z-index: 20;
            max-height: 240px;
            overflow-y: auto;
            border: 1px solid #d4dce5;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0 16px 32px rgba(15, 23, 42, 0.12);
        }

        .device-search-dropdown.show {
            display: block;
        }

        .device-search-option {
            display: flex;
            align-items: center;
            box-sizing: border-box;
            width: 100%;
            border: none;
            background: transparent;
            padding: 10px 14px;
            text-align: left;
            color: var(--text-primary);
            font-size: 13px;
            cursor: pointer;
        }

        .device-search-option:hover {
            background: #ecfbfa;
            color: var(--primary-dark);
        }

        .device-search-option.empty {
            color: var(--text-tertiary);
            cursor: default;
        }

        .device-search-option input {
            margin-right: 8px;
            flex: 0 0 auto;
        }

        .device-search-dropdown .search-input {
            width: calc(100% - 20px);
            margin: 10px;
            padding: 0 12px;
            box-sizing: border-box;
        }

        .summary {
            font-size: 12px;
            color: #475569;
            background: #f1f5f9;
            border: 1px solid #dbe3ed;
            border-radius: 999px;
            padding: 6px 10px;
            white-space: nowrap;
        }

        .list {
            display: block;
        }

        .fault-table {
            background: var(--bg-card);
            border: 1px solid #d8e0ea;
            border-radius: 14px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .fault-table-head,
        .fault-table-row {
            display: grid;
            grid-template-columns: 128px minmax(220px, 1.2fr) minmax(230px, 1.4fr) 186px 110px;
            gap: 14px;
            align-items: center;
            padding: 0 18px;
        }

        .fault-table-head {
            min-height: 46px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.2px;
            color: #64748b;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }

        .fault-table-body {
            max-height: calc(100vh - 312px);
            overflow: auto;
        }

        .fault-table-row {
            min-height: 68px;
            border-bottom: 1px solid #edf2f7;
            background: #fff;
            transition: background-color 0.18s ease;
        }

        .fault-table-row:hover {
            background: #f8fbff;
        }

        .fault-table-row:last-child {
            border-bottom: none;
        }

        .fault-cell {
            font-size: 14px;
            color: #0f172a;
            line-height: 1.45;
            word-break: break-word;
            min-width: 0;
            padding: 12px 0;
        }

        .fault-cell-id {
            font-weight: 700;
            color: #0f172a;
        }

        .fault-cell-site {
            color: #334155;
        }

        .fault-cell-content {
            color: #b45309;
        }

        .fault-cell-time {
            color: #475569;
            white-space: nowrap;
        }

        .fault-cell-action {
            display: flex;
            justify-content: flex-end;
        }

        .fault-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
        }

        .fault-action-btn {
            width: 88px;
            height: 34px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #2ec4b6, #14b8a6);
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .fault-action-btn:hover {
            background: linear-gradient(135deg, #26b4a7, #0ea899);
        }

        .fault-action-btn:active {
            background: #0f988a;
        }

        .fault-sheet-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1200;
        }

        .fault-sheet-overlay.active {
            display: block;
        }

        .fault-sheet-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .fault-sheet-panel {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            background: #fff;
            border-radius: 24px 24px 0 0;
            overflow: hidden;
            box-shadow: 0 -8px 24px rgba(15, 23, 42, 0.2);
        }

        .fault-sheet-option {
            width: 100%;
            height: 88px;
            border: none;
            border-top: 1px solid var(--border-light);
            background: #fff;
            color: #111827;
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
        }

        .fault-sheet-option:first-child {
            border-top: none;
        }

        .fault-sheet-option:hover {
            background: #f8fafc;
        }

        .fault-sheet-overlay.desktop-mode .fault-sheet-backdrop {
            background: rgba(15, 23, 42, 0.4);
        }

        .fault-desktop-dialog {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: min(460px, calc(100vw - 48px));
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 24px 56px rgba(15, 23, 42, 0.25);
            overflow: hidden;
        }

        .fault-desktop-title {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .fault-desktop-option {
            width: 100%;
            height: 52px;
            border: none;
            border-top: 1px solid var(--border-light);
            background: #fff;
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 600;
            text-align: left;
            padding: 0 20px;
            cursor: pointer;
        }

        .fault-desktop-option:hover {
            background: #f8fafc;
        }

        .status-page-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1250;
            background: #f3f4f6;
            overflow-y: auto;
        }

        .status-page-overlay.active {
            display: block;
        }

        .status-page-overlay.desktop-mode.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: rgba(15, 23, 42, 0.4);
        }

        .status-page-shell {
            width: min(860px, calc(100vw - 56px));
            max-height: calc(100vh - 64px);
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 24px 56px rgba(15, 23, 42, 0.25);
            overflow: auto;
        }

        .status-page-overlay.desktop-mode .status-page-header {
            position: sticky;
            top: 0;
            height: 64px;
        }

        .status-page-overlay.desktop-mode .status-page-title {
            font-size: 26px;
            letter-spacing: 0;
        }

        .status-page-overlay.desktop-mode .status-record-list {
            margin-top: 0;
            border-top: none;
        }

        .status-page-overlay.desktop-mode .status-record-item {
            font-size: 16px;
            padding: 18px 20px;
        }

        .status-page-overlay.desktop-mode .abnormal-list {
            padding: 16px;
            background: #f8fafc;
        }

        .status-page-overlay.desktop-mode .abnormal-time {
            font-size: 16px;
        }

        .status-page-overlay.desktop-mode .abnormal-code {
            font-size: 14px;
        }

        .status-page-overlay.desktop-mode .abnormal-message {
            font-size: 18px;
        }

        .status-page-header {
            position: sticky;
            top: 0;
            z-index: 2;
            height: 88px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border-bottom: 1px solid var(--border-light);
        }

        .status-page-back {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 50%;
            background: transparent;
            color: #111827;
            font-size: 24px;
            cursor: pointer;
        }

        .status-page-title {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #111827;
            line-height: 1;
        }

        .status-record-list {
            margin-top: 16px;
            background: #fff;
            border-top: 1px solid var(--border-light);
            border-bottom: 1px solid var(--border-light);
        }

        .status-record-item {
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--border-light);
            background: #fff;
            padding: 24px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 20px;
            color: #111827;
            cursor: pointer;
        }

        .status-record-item:last-child {
            border-bottom: none;
        }

        .status-record-arrow {
            color: #9ca3af;
            font-size: 24px;
            line-height: 1;
        }

        .abnormal-list {
            padding: 14px;
            display: grid;
            gap: 12px;
        }

        .abnormal-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 14px;
        }

        .abnormal-time {
            font-size: 20px;
            color: #6b7280;
            margin-bottom: 10px;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 10px;
        }

        .abnormal-code {
            font-size: 18px;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .abnormal-message {
            font-size: 22px;
            color: #6b7280;
            line-height: 1.35;
            word-break: break-word;
        }

        .btn {
            flex: 1;
            height: 36px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-ghost {
            background: #fff;
            border-color: #bce9e5;
            color: #49b8b1;
        }

        .empty {
            grid-column: 1 / -1;
            background: #fff;
            border: 1px dashed var(--border);
            border-radius: var(--radius);
            color: var(--text-tertiary);
            text-align: center;
            padding: 48px 16px;
        }

        .mobile-header {
            display: none;
            background: #fff;
            height: 56px;
            padding: 0 16px;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .menu-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: #fff;
            color: var(--text-primary);
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 99;
        }

        .overlay.show {
            display: block;
        }

        @media (max-width: 1024px) {
            .header-title {
                font-size: 32px;
            }

            .fault-table-head,
            .fault-table-row {
                grid-template-columns: 112px minmax(180px, 1fr) minmax(180px, 1.2fr) 158px 100px;
                gap: 10px;
                padding: 0 14px;
            }

            .fault-cell {
                font-size: 13px;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s;
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main {
                margin-left: 0;
            }

            .mobile-header {
                display: flex;
            }

            .header {
                position: static;
                padding: 14px 16px;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .header-title {
                font-size: 30px;
            }

            .header-desc {
                margin-top: 4px;
                font-size: 14px;
            }

            .header-right {
                width: 100%;
            }

            .btn-icon {
                width: 100%;
            }

            .content {
                padding: 14px;
                gap: 12px;
            }

            .search-row {
                align-items: stretch;
                flex-direction: column;
            }

            .search-input {
                width: 100%;
            }

            .summary {
                width: fit-content;
                align-self: flex-start;
            }

            .fault-table {
                border: none;
                box-shadow: none;
                background: transparent;
                display: grid;
                gap: 12px;
            }

            .fault-table-head {
                display: none;
            }

            .fault-table-body {
                max-height: none;
                overflow: visible;
                display: grid;
                gap: 12px;
            }

            .fault-table-row {
                display: block;
                border: 1px solid #e5e7eb;
                border-radius: 12px;
                box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08);
                padding: 0 14px 14px;
            }

            .fault-table-row:hover {

                    { name: '机械臂', status: 'normal', label: '正常' },
                    { name: '落杯器', status: 'normal', label: '正常' }
                ]
            }
        ];

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function resolveCurrentStaffFaultAccess() {
            const helper = window.CofeAdminStaffAccess;
            if (!helper || typeof helper.resolveCurrentStaffAccess !== 'function') {
                return {
                    isScoped: false,
                    visibleDeviceIds: [],
                    scopeMessage: ''
                };
            }

            const access = helper.resolveCurrentStaffAccess();
            if (!access || !access.isScoped || !access.currentStaff) {
                return {
                    isScoped: false,
                    visibleDeviceIds: [],
                    scopeMessage: ''
                };
            }

            if (typeof helper.hasModulePermission === 'function' && !helper.hasModulePermission(access.currentStaff, 'faults')) {
                return {
                    ...access,
                    visibleDeviceIds: [],
                    scopeMessage: '当前账号暂未开通故障页面权限'
                };
            }

            const visibleDeviceIds = typeof helper.getModuleVisibleDeviceIds === 'function'
                ? helper.getModuleVisibleDeviceIds(access.currentStaff, 'faults')
                : [];
            const normalizedVisibleDeviceIds = Array.from(new Set((Array.isArray(visibleDeviceIds) ? visibleDeviceIds : [])
                .map((deviceId) => String(deviceId || '').trim())
                .filter(Boolean)));

            return {
                ...access,
                visibleDeviceIds: normalizedVisibleDeviceIds,
                scopeMessage: normalizedVisibleDeviceIds.length
                    ? `当前可查看故障设备：${normalizedVisibleDeviceIds.length} 台`
                    : '你已拥有故障页面权限，但当前未分配可查看的设备，请联系管理员调整页面设备范围'
            };
        }

        function canAccessFaultDevice(deviceId, staffAccess = currentStaffFaultAccess) {
            if (!staffAccess || !staffAccess.isScoped) {
                return true;
            }
            const visibleDeviceSet = new Set((Array.isArray(staffAccess.visibleDeviceIds) ? staffAccess.visibleDeviceIds : [])
                .map((item) => String(item || '').trim())
                .filter(Boolean));
            return visibleDeviceSet.has(String(deviceId || '').trim());
        }

        function getScopedFaultEmptyText(staffAccess = currentStaffFaultAccess) {
            if (staffAccess && staffAccess.isScoped && (!Array.isArray(staffAccess.visibleDeviceIds) || !staffAccess.visibleDeviceIds.length) && staffAccess.scopeMessage) {
                return staffAccess.scopeMessage;
            }
            return '暂无故障记录';
        }

        function getFilteredFaults() {
            return faults.filter(item => {
                if (item.status !== 'fault') return false;
                if (!canAccessFaultDevice(item.id)) return false;
                if (!selectedFaultDeviceIds.has(item.id)) return false;
                return true;
            });
        }

        function getVisibleFaultSearchOptions() {
            return faults
                .filter(item => item.status === 'fault')
                .filter(item => canAccessFaultDevice(item.id))
                .map(item => ({
                    id: item.id,
                    locationName: item.siteName || ''
                }));
        }

        function formatFaultDeviceSearchLabel(option) {
            const deviceId = String(option?.id || '').trim();
            const locationName = String(option?.locationName || '').trim();
            if (!deviceId) return '';
            return locationName ? `${locationName} · ${deviceId}` : deviceId;
        }

        function getFaultDeviceSearchCandidates(keyword = '') {
            const normalizedKeyword = String(keyword || '').trim().toLowerCase();
            const options = getVisibleFaultSearchOptions();
            if (!normalizedKeyword) return options;
            return options.filter(option => {
                const candidates = [option.id, option.locationName, formatFaultDeviceSearchLabel(option)];
                return candidates.some(value => String(value || '').toLowerCase().includes(normalizedKeyword));
            });
        }

        function initializeFaultDeviceFilter() {
            selectedFaultDeviceIds = new Set(getVisibleFaultSearchOptions().map(option => option.id));
            renderFaultDeviceSearchDropdown('');
            updateFaultDeviceFilterTrigger();
        }

        function toggleFaultDeviceFilterDropdown() {
            const dropdown = document.getElementById('deviceSearchDropdown');
            if (!dropdown) return;
            renderFaultDeviceSearchDropdown('');
            dropdown.classList.toggle('show');
        }

        function renderFaultDeviceSearchDropdown(keyword = '') {
            const dropdown = document.getElementById('deviceSearchDropdown');
            if (!dropdown) return;
            const candidates = getFaultDeviceSearchCandidates(keyword);
            const visibleOptions = getVisibleFaultSearchOptions();
            const selectedCount = visibleOptions.filter(option => selectedFaultDeviceIds.has(option.id)).length;
            const allChecked = visibleOptions.length > 0 && selectedCount === visibleOptions.length;
            if (!candidates.length) {
                dropdown.innerHTML = `
                    <input type="text" id="deviceSearch" class="search-input" placeholder="搜索设备编号或点位名称" oninput="handleSearch()" onkeydown="handleFaultDeviceSearchKeydown(event)">
                    <label class="device-search-option">
                        <input type="checkbox" id="selectAllFaultDevices" ${allChecked ? 'checked' : ''} onchange="toggleSelectAllFaultDevices(this.checked)">
                        <span>全选设备</span>
                    </label>
                    <button type="button" class="device-search-option empty" disabled>无匹配设备</button>
                `;
                return;
            }
            dropdown.innerHTML = `
                <input type="text" id="deviceSearch" class="search-input" placeholder="搜索设备编号或点位名称" value="${escapeText(keyword)}" oninput="handleSearch()" onkeydown="handleFaultDeviceSearchKeydown(event)">
                <label class="device-search-option">
                    <input type="checkbox" id="selectAllFaultDevices" ${allChecked ? 'checked' : ''} onchange="toggleSelectAllFaultDevices(this.checked)">
                    <span>全选设备</span>
                </label>
                ${candidates.map(option => `
                    <label class="device-search-option">
                        <input type="checkbox" ${selectedFaultDeviceIds.has(option.id) ? 'checked' : ''} onchange="toggleFaultDeviceSelection('${escapeText(option.id)}', this.checked)">
                        <span>${escapeText(formatFaultDeviceSearchLabel(option))}</span>
                    </label>
                `).join('')}
            `;
        }

        function showFaultDeviceSearchDropdown() {
            const input = document.getElementById('deviceSearch');
            renderFaultDeviceSearchDropdown(input?.value || '');
            document.getElementById('deviceSearchDropdown')?.classList.add('show');
        }

        function hideFaultDeviceSearchDropdown() {
            document.getElementById('deviceSearchDropdown')?.classList.remove('show');
        }

        function toggleSelectAllFaultDevices(checked) {
            if (checked) {
                selectedFaultDeviceIds = new Set(getVisibleFaultSearchOptions().map(option => option.id));
            } else {
                selectedFaultDeviceIds = new Set();
            }
            searchKeyword = '';
            renderFaultDeviceSearchDropdown('');
            updateFaultDeviceFilterTrigger();
            renderSummary();
            renderList();
        }

        function toggleFaultDeviceSelection(deviceId, checked) {
            const normalizedDeviceId = String(deviceId || '').trim();
            if (checked) {
                selectedFaultDeviceIds.add(normalizedDeviceId);
            } else {
                selectedFaultDeviceIds.delete(normalizedDeviceId);
            }
            searchKeyword = '';
            renderFaultDeviceSearchDropdown('');
            updateFaultDeviceFilterTrigger();
            renderSummary();
            renderList();
        }

        function updateFaultDeviceFilterTrigger() {
            const trigger = document.getElementById('faultDeviceFilterTrigger');
            if (!trigger) return;
            const visibleIds = getVisibleFaultSearchOptions().map(option => option.id);
            const selected = visibleIds.filter(deviceId => selectedFaultDeviceIds.has(deviceId));
            if (visibleIds.length && selected.length === visibleIds.length) {
                trigger.textContent = '设备：全部';
                return;
            }
            if (!selected.length) {
                trigger.textContent = '设备：未选择';
                return;
            }
            trigger.textContent = selected.length <= 2 ? `设备：${selected.join('、')}` : `设备：已选 ${selected.length} 台`;
        }

        function selectFaultDeviceSearchOption(deviceId) {
            selectedFaultDeviceIds = new Set([String(deviceId || '').trim()].filter(Boolean));
            searchKeyword = '';
            hideFaultDeviceSearchDropdown();
            updateFaultDeviceFilterTrigger();
            renderSummary();
            renderList();
        }

        function handleFaultDeviceSearchKeydown(event) {
            if (event.key !== 'Enter') return;
            event.preventDefault();
            const input = document.getElementById('deviceSearch');
            const firstCandidate = getFaultDeviceSearchCandidates(input?.value || '')[0];
            if (firstCandidate) {
                selectFaultDeviceSearchOption(firstCandidate.id);
            }
        }

        function handleSearch() {
            searchKeyword = document.getElementById('deviceSearch').value || '';
            renderFaultDeviceSearchDropdown(searchKeyword);
            document.getElementById('deviceSearchDropdown')?.classList.add('show');
        }

        function renderSummary() {
            const list = getFilteredFaults();
            document.getElementById('summary').textContent = `故障设备 ${list.length} 台`;
        }

        function getFaultContent(item) {
            const abnormalParts = (item.orgStatus || []).filter(part => part.status === 'fault' || part.status === 'lost');
            if (abnormalParts.length) {
                return abnormalParts.map(part => `${part.name}${part.status === 'lost' ? '失联' : '故障'}`).join('，');
            }
            return `${item.id} 设备异常`;
        }

        function getFaultOccurredTime(item) {
            const rawUpdatedAt = String(item.updatedAt || '').trim();
            if (rawUpdatedAt && rawUpdatedAt !== '-') return rawUpdatedAt;
            const textSources = [item.fridgeTemp, item.beanTemp, item.craftTemp, item.beanHumidity];
            for (const source of textSources) {
                const text = String(source || '').trim();
                const match = text.match(/\(([^)]+)\)/);
                if (match?.[1]) return match[1];
            }
            return '-';
        }

        function isDesktopInteractionMode() {
            const width = Number(window?.innerWidth || 0);
            return width >= 1024;
        }

        function wrapStatusPage(content, isDesktop) {
            if (!isDesktop) return content;
            return `<div class="status-page-shell">${content}</div>`;
        }

        function escapeText(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function openRemoteActions(deviceId) {
            if (!canAccessFaultDevice(deviceId)) return;
            activeFaultDeviceId = deviceId;
            const panel = document.getElementById('remoteActionSheet');
            if (!panel) return;
            const isDesktop = isDesktopInteractionMode();
            panel.classList.toggle('desktop-mode', isDesktop);
            panel.innerHTML = isDesktop
                ? `
                    <div class="fault-sheet-backdrop" onclick="closeRemoteActions()"></div>
                    <div class="fault-desktop-dialog">
                        <div class="fault-desktop-title">远程操作 · ${escapeText(deviceId)}</div>
                        <button type="button" class="fault-desktop-option" onclick="handleRemoteAction('机构重启')">机构重启</button>
                        <button type="button" class="fault-desktop-option" onclick="handleRemoteAction('设备开门')">设备开门</button>
                        <button type="button" class="fault-desktop-option" onclick="handleRemoteAction('设备停售')">设备停售</button>
                        <button type="button" class="fault-desktop-option" onclick="handleRemoteAction('音量调节')">音量调节</button>
                    </div>
                `
                : `
                    <div class="fault-sheet-backdrop" onclick="closeRemoteActions()"></div>
                    <div class="fault-sheet-panel">
                        <button type="button" class="fault-sheet-option" onclick="handleRemoteAction('机构重启')">机构重启</button>
                        <button type="button" class="fault-sheet-option" onclick="handleRemoteAction('设备开门')">设备开门</button>
                        <button type="button" class="fault-sheet-option" onclick="handleRemoteAction('设备停售')">设备停售</button>
                        <button type="button" class="fault-sheet-option" onclick="handleRemoteAction('音量调节')">音量调节</button>
                    </div>
                `;
            panel.classList.add('active');
        }

        function closeRemoteActions() {
            const panel = document.getElementById('remoteActionSheet');
            if (!panel) return;
            panel.classList.remove('active');
            panel.classList.remove('desktop-mode');
        }

        function handleRemoteAction(actionName) {
            closeRemoteActions();
            alert(`已向设备 ${activeFaultDeviceId || '-'} 下发指令：${actionName}`);
        }

        function openEditStatus(deviceId) {
            if (!canAccessFaultDevice(deviceId)) return;
            activeFaultDeviceId = deviceId;
            const panel = document.getElementById('editStatusSheet');
            if (!panel) return;
            const isDesktop = isDesktopInteractionMode();
            panel.classList.toggle('desktop-mode', isDesktop);
            panel.innerHTML = isDesktop
                ? `
                    <div class="fault-sheet-backdrop" onclick="closeEditStatus()"></div>
                    <div class="fault-desktop-dialog">
                        <div class="fault-desktop-title">编辑状态 · ${escapeText(deviceId)}</div>
                        <button type="button" class="fault-desktop-option" onclick="applyDeviceStatus('normal')">正常</button>
                        <button type="button" class="fault-desktop-option" onclick="applyDeviceStatus('fault')">故障</button>
                        <button type="button" class="fault-desktop-option" onclick="applyDeviceStatus('shortage')">缺料</button>
                    </div>
                `
                : `
                    <div class="fault-sheet-backdrop" onclick="closeEditStatus()"></div>
                    <div class="fault-sheet-panel">
                        <button type="button" class="fault-sheet-option" onclick="applyDeviceStatus('normal')">正常</button>
                        <button type="button" class="fault-sheet-option" onclick="applyDeviceStatus('fault')">故障</button>
                        <button type="button" class="fault-sheet-option" onclick="applyDeviceStatus('shortage')">缺料</button>
                    </div>
                `;
            panel.classList.add('active');
        }

        function closeEditStatus() {
            const panel = document.getElementById('editStatusSheet');
            if (!panel) return;
            panel.classList.remove('active');
            panel.classList.remove('desktop-mode');
        }

        function applyDeviceStatus(statusKey) {
            const target = faults.find(item => item.id === activeFaultDeviceId);
            if (target) {
                target.status = statusKey;
                if (statusKey !== 'fault') {
                    target.deviceStatus = '在线';
                }
            }
            closeEditStatus();
            renderSummary();
            renderList();
        }

        function getAbnormalRecords(deviceId) {
            return [
                { time: '2026-02-18 15:40:28', code: '', message: `李丽杰停售了 ${deviceId}` },
                { time: '2026-01-31 09:55:08', code: '', message: `${deviceId}设备疑似没网或断电` },
                { time: '2026-01-31 09:55:08', code: '', message: `${deviceId}设备疑似没网或断电` },
                { time: '2026-01-31 09:55:08', code: '', message: `${deviceId}设备疑似没网或断电` },
                { time: '2026-01-31 09:55:08', code: '', message: `${deviceId}设备疑似没网或断电` },
                { time: '2026-01-31 09:55:08', code: '', message: `${deviceId}设备疑似没网或断电` }
            ];
        }

        function getOperationRecords(deviceId) {
            return [
                {
                    time: '2026-03-04 10:25:17',
                    operator: '王天宇',
                    action: '远程重启',
                    result: '成功',
                    note: `${deviceId} 重启后恢复出杯`
                },
                {
                    time: '2026-03-04 09:57:40',
                    operator: '李丽杰',
                    action: '设备开门',
                    result: '成功',
                    note: `${deviceId} 已完成人工补料`
                },
                {
                    time: '2026-03-04 08:11:05',
                    operator: '系统',
                    action: '音量调节',
                    result: '成功',
                    note: `${deviceId} 设备音量已调整为 9`
                }
            ];
        }

        function openStatusRecords(deviceId) {
            if (!canAccessFaultDevice(deviceId)) return;
            activeFaultDeviceId = deviceId;
            const page = document.getElementById('statusRecordPage');
            if (!page) return;
            const isDesktop = isDesktopInteractionMode();
            page.classList.toggle('desktop-mode', isDesktop);
            if (isDesktop) {
                page.onclick = function(event) {
                    if (event.target === page) closeStatusRecords();
                };
            } else {
                page.onclick = null;
            }
            const content = `
                <header class="status-page-header">
                    <button type="button" class="status-page-back" onclick="closeStatusRecords()">‹</button>
                    <div class="status-page-title">状态</div>
                </header>
                <div class="status-record-list">
                    <button type="button" class="status-record-item" onclick="openAbnormalRecords()">
                        <span>异常记录</span>
                        <span class="status-record-arrow">›</span>
                    </button>
                    <button type="button" class="status-record-item" onclick="openOperationRecords()">
                        <span>运维记录</span>
                        <span class="status-record-arrow">›</span>
                    </button>
                    <button type="button" class="status-record-item" onclick="alert('废料记录开发中')">
                        <span>废料记录</span>
                        <span class="status-record-arrow">›</span>
                    </button>
                </div>
            `;
            page.innerHTML = wrapStatusPage(content, isDesktop);
            page.classList.add('active');
        }

        function closeStatusRecords() {
            const page = document.getElementById('statusRecordPage');
            if (!page) return;
            page.classList.remove('active');
            page.classList.remove('desktop-mode');
            page.onclick = null;
        }

        function openAbnormalRecords() {
            const page = document.getElementById('abnormalRecordPage');
            if (!page) return;
            const statusPage = document.getElementById('statusRecordPage');
            if (statusPage) statusPage.classList.remove('active');
            const deviceId = activeFaultDeviceId || '-';
            const records = getAbnormalRecords(deviceId);
            const isDesktop = isDesktopInteractionMode();
            page.classList.toggle('desktop-mode', isDesktop);
            if (isDesktop) {
                page.onclick = function(event) {
                    if (event.target === page) closeAbnormalRecords();
                };
            } else {
                page.onclick = null;
            }
            const content = `
                <header class="status-page-header">
                    <button type="button" class="status-page-back" onclick="closeAbnormalRecords()">‹</button>
                    <div class="status-page-title">${escapeText(deviceId)}-异常记录</div>
                </header>
                <div class="abnormal-list">
                    ${records.map(item => `
                        <article class="abnormal-card">
                            <div class="abnormal-time">${escapeText(item.time)}</div>
                            <div class="abnormal-code">故障码：${escapeText(item.code || '')}</div>
                            <div class="abnormal-message">${escapeText(item.message)}</div>
                        </article>
                    `).join('')}
                </div>
            `;
            page.innerHTML = wrapStatusPage(content, isDesktop);
            page.classList.add('active');
        }

        function closeAbnormalRecords() {
            const page = document.getElementById('abnormalRecordPage');
            if (!page) return;
            page.classList.remove('active');
            page.classList.remove('desktop-mode');
            page.onclick = null;
            openStatusRecords(activeFaultDeviceId);
        }

        function openOperationRecords() {
            const page = document.getElementById('operationRecordPage');
            if (!page) return;
            const statusPage = document.getElementById('statusRecordPage');
            if (statusPage) statusPage.classList.remove('active');
            const deviceId = activeFaultDeviceId || '-';
            const records = getOperationRecords(deviceId);
            const isDesktop = isDesktopInteractionMode();
            page.classList.toggle('desktop-mode', isDesktop);
            if (isDesktop) {
                page.onclick = function(event) {
                    if (event.target === page) closeOperationRecords();
                };
            } else {
                page.onclick = null;
            }
            const content = `
                <header class="status-page-header">
                    <button type="button" class="status-page-back" onclick="closeOperationRecords()">‹</button>
                    <div class="status-page-title">${escapeText(deviceId)}-运维记录</div>
                </header>
                <div class="abnormal-list">
                    ${records.length ? records.map(item => `
                        <article class="abnormal-card">
                            <div class="abnormal-time">${escapeText(item.time || '-')}</div>
                            <div class="abnormal-code">操作人：${escapeText(item.operator || '-')}</div>
                            <div class="abnormal-code">操作项：${escapeText(item.action || '-')}</div>
                            <div class="abnormal-code">处理结果：${escapeText(item.result || '-')}</div>
                            <div class="abnormal-message">备注：${escapeText(item.note || '-')}</div>
                        </article>
                    `).join('') : '<div class="empty">暂无运维记录</div>'}
                </div>
            `;
            page.innerHTML = wrapStatusPage(content, isDesktop);
            page.classList.add('active');
        }

        function closeOperationRecords() {
            const page = document.getElementById('operationRecordPage');
            if (!page) return;
            page.classList.remove('active');
            page.classList.remove('desktop-mode');
            page.onclick = null;
            openStatusRecords(activeFaultDeviceId);
        }

        function goToDeviceMaterials(deviceId) {
            if (!canAccessFaultDevice(deviceId)) return;
            try {
                sessionStorage.setItem('currentDevice', deviceId);
            } catch (error) {
                // ignore storage failures and continue navigation
            }
            window.location.href = `materials.html?device=${encodeURIComponent(deviceId)}`;
        }

        function renderFaultActions(item) {
            return `
                <div class="fault-actions">
                    <button type="button" class="fault-action-btn" onclick="openRemoteActions('${item.id}')">远程操作</button>
                </div>
            `;
        }

        function renderList() {
            const container = document.getElementById('list');
            const data = getFilteredFaults();
            if (!data.length) {
                container.innerHTML = `<div class="empty">${getScopedFaultEmptyText(currentStaffFaultAccess)}</div>`;
                return;
            }

            container.innerHTML = `
                <section class="fault-table">
                    <div class="fault-table-head">
                        <div>设备编号</div>
                        <div>设备地址</div>
                        <div>故障内容</div>
                        <div>故障发生时间</div>
                        <div>操作</div>
                    </div>
                    <div class="fault-table-body">
                        ${data.map(item => `
                            <article class="fault-table-row">
                                <div class="fault-cell fault-cell-id" data-label="设备编号">${escapeText(item.id)}</div>
                                <div class="fault-cell fault-cell-site" data-label="设备地址">${escapeText(item.siteName)}</div>
                                <div class="fault-cell fault-cell-content" data-label="故障内容">${escapeText(getFaultContent(item))}</div>
                                <div class="fault-cell fault-cell-time" data-label="故障发生时间">${escapeText(getFaultOccurredTime(item))}</div>
                                <div class="fault-cell fault-cell-action" data-label="操作">
                                    ${renderFaultActions(item)}
                                </div>
                            </article>
                        `).join('')}
                    </div>
                </section>
            `;
        }

        currentStaffFaultAccess = resolveCurrentStaffFaultAccess();
        renderSidebarLoginProfile();
        initializeFaultDeviceFilter();
        renderSummary();
        renderList();
    </script>
</body>
</html>
