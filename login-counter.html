<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COFE+ 欢迎登录</title>
    <meta name="format-detection" content="telephone=no">
    <style>
        :root {
            --counter-bg: #120f14;
            --counter-panel: rgba(24, 20, 26, 0.88);
            --counter-panel-strong: rgba(17, 14, 19, 0.9);
            --counter-copper: #c48755;
            --counter-amber: #f3bb83;
            --counter-smoke: rgba(244, 236, 226, 0.72);
            --counter-line: rgba(255, 255, 255, 0.1);
            --counter-text: #f4ece2;
            --counter-shadow: 0 26px 70px rgba(0, 0, 0, 0.34);
            --radius-xl: 36px;
            --radius-lg: 28px;
            --radius-md: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(circle at 82% 18%, rgba(226, 149, 77, 0.2), transparent 18%),
                radial-gradient(circle at 18% 84%, rgba(188, 105, 54, 0.16), transparent 24%),
                linear-gradient(135deg, #1a171c 0%, #0f0c12 52%, #2d1d16 100%);
            color: var(--counter-text);
            -webkit-font-smoothing: antialiased;
        }

        .login-page {
            min-height: 100vh;
            padding: 28px;
        }

        .login-layout {
            min-height: calc(100vh - 56px);
            display: grid;
            grid-template-columns: minmax(0, 1.08fr) minmax(420px, 0.92fr);
            border-radius: var(--radius-xl);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01)),
                rgba(12, 10, 15, 0.86);
            box-shadow: var(--counter-shadow);
        }

        .login-stage {
            position: relative;
            overflow: hidden;
            padding: 54px;
            background:
                radial-gradient(circle at 80% 20%, rgba(241, 175, 111, 0.24), transparent 24%),
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
                linear-gradient(160deg, #1e1a20 0%, #111015 58%, #24150f 100%);
        }

        .login-stage::before,
        .login-stage::after {
            content: '';
            position: absolute;
            pointer-events: none;
        }

        .login-stage::before {
            inset: auto -12% -18% auto;
            width: 56%;
            height: 48%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(245, 170, 103, 0.24), rgba(245, 170, 103, 0));
            filter: blur(10px);
        }

        .login-stage::after {
            left: 56px;
            right: 56px;
            bottom: 44px;
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0), rgba(255, 215, 182, 0.42), rgba(255, 255, 255, 0));
        }

        .stage-brand {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 74px;
        }

        .stage-brand-mark {
            width: 68px;
            height: 68px;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 18px 32px rgba(0, 0, 0, 0.28);
        }

        .stage-brand-mark img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .stage-brand-copy strong {
            display: block;
            font-size: 14px;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(255, 216, 182, 0.64);
            margin-bottom: 8px;
        }

        .stage-brand-copy span {
            font-size: 16px;
            color: rgba(244, 236, 226, 0.76);
        }

        .stage-story {
            position: relative;
            z-index: 1;
            max-width: 520px;
        }

        .stage-story h2 {
            font-size: 64px;
            line-height: 0.96;
            letter-spacing: -0.06em;
            margin-bottom: 24px;
        }

        .stage-story p {
            font-size: 17px;
            line-height: 1.8;
            color: var(--counter-smoke);
            max-width: 460px;
        }

        .stage-badges {
            position: relative;
            z-index: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 28px;
        }

        .stage-badges span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 38px;
            padding: 0 16px;
            border-radius: 999px;
            font-size: 12px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 227, 201, 0.74);
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
        }

        .login-card {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 44px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
                rgba(18, 15, 20, 0.7);
        }

        .login-panel {
            width: min(100%, 428px);
            padding: 34px;
            border-radius: 30px;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01)),
                var(--counter-panel);
            border: 1px solid rgba(255, 255, 255, 0.09);
            box-shadow: var(--counter-shadow);
            backdrop-filter: blur(20px);
        }

        .login-panel-top {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .login-panel-top img {
            width: 54px;
            height: 54px;
            border-radius: 18px;
            box-shadow: 0 18px 24px rgba(0, 0, 0, 0.2);
        }

        .login-product-label {
            font-size: 13px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255, 224, 194, 0.58);
            margin-bottom: 6px;
        }

        .login-card h1 {
            font-size: 40px;
            line-height: 1;
            letter-spacing: -0.05em;
            margin-bottom: 12px;
        }

        .login-supporting {
            font-size: 15px;
            line-height: 1.7;
            color: var(--counter-smoke);
            margin-bottom: 28px;
        }

        .login-form {
            display: grid;
            gap: 16px;
        }

        .login-field {
            display: grid;
            gap: 9px;
        }

        .login-field label {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255, 237, 220, 0.76);
        }

        .login-field input {
            width: 100%;
            height: 54px;
            padding: 0 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--counter-line);
            background: rgba(255, 255, 255, 0.05);
            color: var(--counter-text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .login-field input:focus {
            border-color: rgba(243, 187, 131, 0.82);
            box-shadow: 0 0 0 4px rgba(243, 187, 131, 0.14);
            transform: translateY(-1px);
        }

        .login-field input::placeholder {
            color: rgba(244, 236, 226, 0.34);
        }

        .login-error {
            min-height: 20px;
            font-size: 13px;
            line-height: 1.5;
            color: #ff9a83;
        }

        .login-submit {
            height: 56px;
            border: 0;
            border-radius: 999px;
            background: linear-gradient(135deg, #d49662 0%, #b57748 100%);
            color: #23130f;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.01em;
            box-shadow: 0 16px 26px rgba(181, 119, 72, 0.22);
        }

        .login-footer {
            margin-top: 22px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 12px;
            line-height: 1.7;
            color: rgba(244, 236, 226, 0.48);
        }

        @media (max-width: 1024px) {
            .login-layout {
                grid-template-columns: 1fr;
            }

            .login-stage {
                min-height: 420px;
                padding: 36px 30px 30px;
            }

            .stage-brand {
                margin-bottom: 46px;
            }

            .stage-story h2 {
                font-size: 48px;
            }
        }

        @media (max-width: 768px) {
            .login-page {
                padding: 14px;
            }

            .login-layout {
                min-height: calc(100vh - 28px);
                border-radius: 28px;
            }

            .login-stage {
                min-height: 320px;
                padding: 24px 20px;
            }

            .stage-brand {
                gap: 12px;
                margin-bottom: 28px;
            }

            .stage-brand-mark {
                width: 54px;
                height: 54px;
                border-radius: 18px;
            }

            .stage-story h2 {
                font-size: 34px;
                margin-bottom: 16px;
            }

            .stage-story p {
                font-size: 14px;
                max-width: none;
            }

            .stage-badges {
                margin-top: 20px;
            }

            .login-card {
                padding: 0 14px 14px;
                margin-top: -28px;
                background: transparent;
            }

            .login-panel {
                width: 100%;
                padding: 26px 20px 22px;
                border-radius: 24px;
            }

            .login-card h1 {
                font-size: 32px;
            }

            .login-supporting {
                margin-bottom: 22px;
            }
        }
    </style>
</head>
<body class="login-page login-page-counter">
    <main class="login-layout">
        <section class="login-stage">
            <div class="stage-brand">
                <div class="stage-brand-mark">
                    <img src="logo.png" alt="COFE+ 标识">
                </div>
                <div class="stage-brand-copy">
                    <strong>COFE+</strong>
                    <span>运营控制台</span>
                </div>
            </div>

            <div class="stage-story">
                <h2>进入后台前，先回到这块夜色里的操作台。</h2>
                <p>深色空间让数据入口更安静，琥珀色灯带和金属高光则把气质拉向设备平台，而不是泛化的 SaaS 登录框。</p>
            </div>

            <div class="stage-badges">
                <span>Counter Mode</span>
                <span>Operational Focus</span>
                <span>Amber Control</span>
            </div>
        </section>

        <section class="login-card">
            <div class="login-panel">
                <div class="login-panel-top">
                    <img src="logo.png" alt="COFE+ 标识">
                    <div>
                        <p class="login-product-label">COFE+ · 运营控制台</p>
                        <h1>欢迎登录</h1>
                    </div>
                </div>

                <p class="login-supporting">进入运营后台，查看设备、订单与门店状态</p>

                <form id="loginForm" class="login-form" novalidate>
                    <div class="login-field">
                        <label for="loginAccount">账号</label>
                        <input id="loginAccount" name="account" type="text" placeholder="请输入运营账号" autocomplete="username">
                    </div>

                    <div class="login-field">
                        <label for="loginPassword">密码</label>
                        <input id="loginPassword" name="password" type="password" placeholder="请输入登录密码" autocomplete="current-password">
                    </div>

                    <p id="loginError" class="login-error" role="alert" aria-live="polite"></p>

                    <button id="loginSubmit" class="login-submit" type="submit">进入控制台</button>
                </form>

                <div class="login-footer">深色夜间吧台方案，保持同样的最小登录动作，但把入口语气调到更沉稳的设备控制台状态。</div>
            </div>
        </section>
    </main>
    <script>
        const LOGIN_SESSION_KEY = 'cofeLoginSession';
        const SIDEBAR_LOGIN_PROFILE_KEY = 'sidebarLoginProfile';
        const LOGIN_SUCCESS_TARGET = 'overview.html';
        const LOGIN_BUTTON_IDLE_TEXT = '进入控制台';
        const LOGIN_BUTTON_LOADING_TEXT = '登录中...';
        const LOGIN_THEME = 'counter';

        const loginForm = document.getElementById('loginForm');
        const loginAccountInput = document.getElementById('loginAccount');
        const loginPasswordInput = document.getElementById('loginPassword');
        const loginErrorNode = document.getElementById('loginError');
        const loginSubmitButton = document.getElementById('loginSubmit');

        function renderLoginError(message) {
            loginErrorNode.textContent = message || '';
        }

        function setLoginSubmittingState(isSubmitting) {
            loginSubmitButton.disabled = isSubmitting;
            loginSubmitButton.textContent = isSubmitting ? LOGIN_BUTTON_LOADING_TEXT : LOGIN_BUTTON_IDLE_TEXT;
        }

        function validateLoginForm() {
            if (!loginAccountInput.value.trim()) {
                return '请输入账号';
            }
            if (!loginPasswordInput.value.trim()) {
                return '请输入密码';
            }
            return '';
        }

        function persistLoginSession(account) {
            localStorage.setItem(LOGIN_SESSION_KEY, JSON.stringify({
                account,
                theme: LOGIN_THEME,
                loggedInAt: new Date().toISOString()
            }));
            localStorage.setItem(SIDEBAR_LOGIN_PROFILE_KEY, JSON.stringify({
                name: account,
                phone: account
            }));
        }

        function handleLoginSubmit(event) {
            event.preventDefault();
            const error = validateLoginForm();
            renderLoginError(error);
            if (error) {
                return;
            }
            setLoginSubmittingState(true);
            setTimeout(() => {
                const account = loginAccountInput.value.trim();
                persistLoginSession(account);
                window.location.replace(LOGIN_SUCCESS_TARGET);
            }, 800);
        }

        loginForm.addEventListener('submit', handleLoginSubmit);
    </script>
</body>
</html>
