<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>运维清单 - 运营控制台</title>
    <meta name="format-detection" content="telephone=no">
    <style>
        :root {
            --primary: #4ecdc4;
            --primary-dark: #3dbdb4;
            --primary-light: #e8f8f7;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --success: #10b981;
            --success-light: #d1fae5;
            --warning: #f59e0b;
            --warning-light: #fef3c7;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --bg-body: #f5f5f5;
            --bg-card: #ffffff;
            --border: #e5e7eb;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-body);
            min-height: 100vh;
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
        }

        /* 顶部导航 */
        .header {
            background: #fff;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            height: 50px;
        }

        .back-btn {
            position: absolute;
            left: 12px;
            font-size: 20px;
            cursor: pointer;
            color: #333;
            padding: 8px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
        }

        .header-title {
            font-size: 17px;
            font-weight: 600;
            color: #333;
        }

        .header-actions {
            position: absolute;
            right: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .materials-return-btn {
            background: #f3f8ff;
            color: #2563eb;
            border: 1px solid #bfdbfe;
            padding: 6px 10px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .add-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 16px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        /* 筛选标签 */
        .filter-tabs {
            display: flex;
            background: #fff;
            padding: 0 16px;
            border-bottom: 1px solid var(--border);
            gap: 24px;
        }

        .filter-tab {
            padding: 14px 8px;
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .filter-tab.active {
            color: var(--primary-dark);
            border-bottom-color: var(--primary);
            font-weight: 600;
        }

        .tab-badge {
            background: var(--danger);
            color: #fff;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            font-weight: 600;
            margin-left: 4px;
            min-width: 16px;
            text-align: center;
            vertical-align: middle;
        }
        
        .tab-badge.show {
            display: inline-block;
        }
        
        .tab-badge.hide {
            display: none;
        }

        /* 列表容器 */
        .order-list {
            padding: 12px 16px;
            padding-bottom: 100px;
        }

        .order-card {
            background: #fff;
            border-radius: var(--radius);
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .desktop-table-head,
        .order-desktop-row {
            display: none;
        }

        .order-mobile-block {
            display: block;
        }

        .order-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #f5f5f5;
        }

        .order-info {
            flex: 1;
        }

        .order-id {
            font-size: 13px;
            color: var(--text-tertiary);
            margin-bottom: 4px;
        }

        .order-time {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .order-device,
        .order-requester {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-top: 4px;
        }

        .order-requester {
            margin-top: 2px;
        }

        .order-status {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .order-status.pending {
            background: var(--warning-light);
            color: var(--warning);
        }

        .order-status.completed {
            background: var(--success-light);
            color: var(--success);
        }

        .order-status.voided {
            background: var(--danger-light);
            color: var(--danger);
        }

        .order-items {
            padding: 12px 16px;
            background: #fafafa;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding: 6px 0;
            font-size: 13px;
        }

        .order-item-main {
            flex: 1;
            min-width: 0;
        }

        .order-item-name {
            color: var(--text-secondary);
        }

        .order-item-code {
            display: block;
            margin-top: 2px;
            font-size: 11px;
            color: var(--text-tertiary);
            word-break: break-all;
        }

        .order-item-qty {
            color: var(--text-primary);
            font-weight: 500;
            flex-shrink: 0;
        }

        .order-item.more {
            color: var(--text-tertiary);
        }

        .filter-tab.hidden {
            display: none;
        }

        .order-footer {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-note {
            font-size: 12px;
            color: var(--text-tertiary);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .order-actions {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .btn-detail {
            background: #f5f5f5;
            color: var(--text-secondary);
        }

        .btn-print {
            background: #eef6ff;
            color: #2563eb;
            border-color: #bfdbfe;
        }

        .btn-void {
            background: #fff1f2;
            color: #e11d48;
            border-color: #fecdd3;
        }

        .btn-complete {
            background: var(--primary);
            color: #fff;
        }

        /* 详情弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            max-height: 80vh;
            overflow: hidden;
        }

        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            font-size: 18px;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
            max-height: calc(80vh - 130px);
        }

        .detail-section {
            margin-bottom: 20px;
        }

        .detail-label {
            font-size: 12px;
            color: var(--text-tertiary);
            margin-bottom: 6px;
        }

        .detail-value {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }

        .detail-items {
            background: #f8f8f8;
            border-radius: 10px;
            padding: 12px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-item-main {
            flex: 1;
            min-width: 0;
        }

        .detail-item-name {
            color: var(--text-primary);
        }

        .detail-item-code {
            margin-top: 2px;
            font-size: 11px;
            color: var(--text-tertiary);
            word-break: break-all;
        }

        .detail-item-qty {
            font-weight: 600;
            flex-shrink: 0;
        }

        .modal-footer {
            padding: 12px 20px 20px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .btn-default {
            background: #f5f5f5;
            color: var(--text-secondary);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-tertiary);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .empty-text {
            font-size: 15px;
        }

        .empty-btn {
            margin-top: 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            background: var(--success);
        }

        @media (min-width: 1200px) {
            body {
                background:
                    radial-gradient(circle at 10% 4%, rgba(78, 205, 196, 0.22) 0, rgba(78, 205, 196, 0) 38%),
                    radial-gradient(circle at 92% 0%, rgba(59, 130, 246, 0.13) 0, rgba(59, 130, 246, 0) 34%),
                    linear-gradient(180deg, #f6f8fb 0%, #eef2f7 100%);
            }

            .header,
            .filter-tabs,
            .order-list {
                max-width: 1560px;
                margin-left: auto;
                margin-right: auto;
                width: 100%;
            }

            .header {
                height: 76px;
                padding: 0 24px;
                justify-content: flex-start;
                gap: 10px;
                border: 1px solid var(--border);
                border-radius: 16px;
                margin-top: 16px;
                background: rgba(255, 255, 255, 0.94);
                box-shadow: 0 14px 28px rgba(15, 23, 42, 0.08);
            }

            .back-btn {
                position: static;
                font-size: 18px;
                min-width: 36px;
                min-height: 36px;
                border-radius: 8px;
                border: 1px solid var(--border);
                background: #fff;
                color: var(--text-secondary);
            }

            .header-title {
                font-size: 30px;
                font-weight: 700;
                color: var(--text-primary);
                letter-spacing: 0.3px;
            }

            .add-btn {
                position: static;
                margin-left: auto;
                border-radius: 10px;
                padding: 8px 18px;
                font-size: 15px;
                letter-spacing: 0.2px;
                box-shadow: 0 8px 20px rgba(78, 205, 196, 0.24);
            }

            .filter-tabs {
                margin-top: 12px;
                background: rgba(255, 255, 255, 0.92);
                border: 1px solid var(--border);
                border-radius: 16px;
                box-shadow: var(--shadow);
                padding: 8px;
                gap: 8px;
            }

            .filter-tab {
                border-bottom: none;
                border-radius: 12px;
                padding: 10px 18px;
                font-size: 16px;
                font-weight: 600;
                justify-content: center;
            }

            .filter-tab.active {
                background: var(--primary-light);
                color: #0f766e;
                box-shadow: inset 0 0 0 1px rgba(46, 196, 182, 0.24);
            }

            .tab-badge {
                font-size: 11px;
                padding: 2px 8px;
            }

            .order-list {
                padding: 14px 0 32px;
                border: 1px solid var(--border);
                border-radius: 16px;
                overflow: hidden;
                background: #fff;
                box-shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
            }

            .desktop-table-head {
                display: grid;
                grid-template-columns: 1.1fr 1fr 1fr .8fr 2fr .7fr 1.2fr .9fr;
                align-items: center;
                gap: 12px;
                padding: 10px 16px;
                border-bottom: 1px solid #e8edf5;
                background: linear-gradient(180deg, #f8fbff 0%, #f3f8ff 100%);
                font-size: 11px;
                color: #64748b;
                font-weight: 700;
                letter-spacing: 0.4px;
                text-transform: uppercase;
            }

            .order-card {
                margin-bottom: 0;
                border-radius: 0;
                border: none;
                box-shadow: none;
                border-bottom: 1px solid #eef2f7;
            }

            .order-card:last-child {
                border-bottom: none;
            }

            .order-mobile-block {
                display: none;
            }

            .order-desktop-row {
                display: grid;
                grid-template-columns: 1.1fr 1fr 1fr .8fr 2fr .7fr 1.2fr .9fr;
                gap: 12px;
                align-items: center;
                padding: 10px 16px;
                min-height: 72px;
            }

            .desktop-col {
                min-width: 0;
            }

            .desktop-order-id {
                font-size: 13px;
                font-weight: 700;
                color: #0f172a;
                line-height: 1.25;
            }

            .desktop-order-create {
                font-size: 11px;
                color: #94a3b8;
                margin-top: 4px;
            }

            .desktop-time {
                font-size: 12px;
                font-weight: 600;
                color: #0f172a;
            }

            .desktop-device,
            .desktop-requester,
            .desktop-note {
                font-size: 12px;
                color: #334155;
                line-height: 1.45;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .desktop-items {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }

            .desktop-item-chip {
                display: inline-flex;
                flex-direction: column;
                align-items: flex-start;
                gap: 2px;
                padding: 6px 8px;
                border-radius: 12px;
                background: #f1f5f9;
                border: 1px solid #e2e8f0;
                font-size: 11px;
                color: #334155;
                max-width: 100%;
            }

            .desktop-item-chip .name {
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                max-width: 100px;
            }

            .desktop-item-chip .qty {
                font-weight: 700;
                color: #0f172a;
            }

            .desktop-item-code {
                max-width: 100%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                color: #64748b;
            }

            .desktop-more {
                display: inline-flex;
                align-items: center;
                padding: 3px 8px;
                border-radius: 999px;
                font-size: 11px;
                background: #fff7ed;
                border: 1px solid #fed7aa;
                color: #c2410c;
            }

            .desktop-status {
                display: flex;
                justify-content: center;
            }

            .order-status {
                border-radius: 999px;
                font-size: 12px;
                padding: 5px 10px;
            }

            .desktop-actions {
                display: flex;
                justify-content: flex-end;
                gap: 8px;
            }

            .btn-sm {
                border-radius: 8px;
                padding: 6px 11px;
                font-size: 12px;
            }

            .btn-detail {
                border-color: #dbe3ec;
                background: #fff;
            }

            .modal {
                max-width: 760px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <button class="back-btn" onclick="goBack()">←</button>
        <h1 class="header-title">运维清单</h1>
        <div class="header-actions">
            <button class="materials-return-btn" id="materialsReturnBtn" onclick="returnToMaterialsPage()" style="display:none;">返回物料页</button>
            <button class="add-btn" onclick="goToAdd()">+ 添加</button>
        </div>
    </header>

    <!-- 筛选标签 -->
    <div class="filter-tabs">
        <div class="filter-tab active" id="allOrdersTab" onclick="switchTab('all')">
            <span>全部发货单</span>
            <span class="tab-badge hide" id="badgeAll">0</span>
        </div>
        <div class="filter-tab" id="myOrdersTab" onclick="switchTab('mine')">
            <span>我的发货单</span>
            <span class="tab-badge hide" id="badgeMine">0</span>
        </div>
    </div>

    <!-- 列表容器 -->
    <div class="order-list" id="orderList">
        <!-- 动态生成 -->
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">发货单详情</h3>
                <button class="modal-close" onclick="closeDetailModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- 动态生成 -->
            </div>
            <div class="modal-footer" id="modalFooter">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

                    return null;
                }

                const deviceId = String(parsed.deviceId || '').trim();
                if (!deviceId) {
                    return null;
                }

                return {
                    source: 'materials',
                    deviceId,
                    laneName: parsed.laneName ? String(parsed.laneName) : '',
                    materialCode: parsed.materialCode ? String(parsed.materialCode) : null
                };

                return null;

            sessionStorage.removeItem('materialsShipmentReturnContext');

            const context = readMaterialsShipmentReturnContext();
            if (!context || !context.deviceId) {

            return `materials.html?device=${encodeURIComponent(context.deviceId)}`;

            try {
                profile = JSON.parse(localStorage.getItem(SIDEBAR_LOGIN_PROFILE_KEY) || '{}') || {};
            } catch (error) {

            };

        function resolveCurrentOrdersAccess() {
            const helper = window.CofeAdminStaffAccess;
            if (!helper || typeof helper.resolveCurrentStaffAccess !== 'function') {
                return {
                    isScoped: false,
                    visibleDeviceIds: [],
                    canViewAllOrders: true,
                    scopeMessage: ''
                };
            }

            const access = helper.resolveCurrentStaffAccess();
            if (!access || !access.isScoped || !access.currentStaff) {
                return {
                    ...(access || {}),
                    isScoped: false,
                    visibleDeviceIds: [],
                    canViewAllOrders: false,
                    scopeMessage: '当前账号仅可查看我的发货单'
                };
            }

            if (typeof helper.hasModulePermission === 'function' && !helper.hasModulePermission(access.currentStaff, 'orders')) {
                return {
                    ...access,
                    visibleDeviceIds: [],
                    canViewAllOrders: false,
                    scopeMessage: '当前账号仅可查看我的发货单'
                };
            }

            const visibleDeviceIds = typeof helper.getModuleVisibleDeviceIds === 'function'
                ? helper.getModuleVisibleDeviceIds(access.currentStaff, 'orders')
                : [];
            const normalizedVisibleDeviceIds = Array.from(new Set((Array.isArray(visibleDeviceIds) ? visibleDeviceIds : [])
                .map((deviceId) => String(deviceId || '').trim())
                .filter(Boolean)));

            return {
                ...access,
                visibleDeviceIds: normalizedVisibleDeviceIds,
                canViewAllOrders: normalizedVisibleDeviceIds.length > 0,
                scopeMessage: normalizedVisibleDeviceIds.length
                    ? `当前可查看全部发货单设备：${normalizedVisibleDeviceIds.length} 台`
                    : '当前账号仅可查看我的发货单'
            };

        function cloneSampleOrderItems(groupKey) {
            return (SAMPLE_ORDER_ITEM_GROUPS[groupKey] || []).map(item => ({ ...item }));
        }

        function normalizeOrderDevice(order) {
            const sourceDeviceId = String(order?.deviceId || '').trim();
            const legacyDevice = LEGACY_SAMPLE_DEVICE_MAP[sourceDeviceId];
            const deviceId = legacyDevice?.deviceId || sourceDeviceId;
            const location = legacyDevice?.location || CURRENT_DEVICE_LOCATION_MAP[deviceId] || order?.location || '';
            return {
                deviceId,
                location,
                migrated: Boolean(legacyDevice) || (Boolean(deviceId) && location !== (order?.location || ''))
            };
        }

        function normalizeOrder(order, index = 0) {
            if (!order || typeof order !== 'object') {
                return null;
            }

            const sourceItems = Array.isArray(order.items) ? order.items : [];
            const legacySampleGroup = sourceItems
                .map(item => item && item.code)
                .find(code => LEGACY_SAMPLE_ORDER_SET_BY_CODE[code]);
            const itemsForNormalization = legacySampleGroup
                ? cloneSampleOrderItems(LEGACY_SAMPLE_ORDER_SET_BY_CODE[legacySampleGroup])
                : sourceItems;
            const normalizedDevice = normalizeOrderDevice(order);
            const normalizedStatus = order.status === 'voided'
                ? 'voided'
                : order.status === 'completed'
                    ? 'completed'
                    : 'pending';

            const normalizedItems = itemsForNormalization
                    .filter(item => item && typeof item === 'object' && item.name)
                    .map(item => {
                        const quantity = Number(item.quantity);
                        return {
                            code: item.code || '',
                            materialNumber: item.materialNumber || ORDER_MATERIAL_NUMBER_MAP[item.code] || item.code || '',
                            laneName: item.laneName || '',
                            name: item.name,
                            quantity: Number.isFinite(quantity) && quantity > 0 ? quantity : 1,
                            unit: item.unit || '个'
                        };
                    })

            return {
                id: order.id || `DL${Date.now()}${String(index).padStart(2, '0')}`,
                createTime: order.createTime || new Date().toISOString(),
                deliveryTime: order.deliveryTime || order.createTime || new Date().toISOString(),
                note: order.note || '',
                status: normalizedStatus,
                requestedBy: order.requestedBy || '当前用户',
                requestedByPhone: order.requestedByPhone || '',
                requestTime: order.requestTime || order.createTime || new Date().toISOString(),
                deviceId: normalizedDevice.deviceId,
                location: normalizedDevice.location,
                completedBy: order.completedBy || '',
                completedTime: order.completedTime || '',
                voidedBy: order.voidedBy || '',
                voidedTime: order.voidedTime || '',
                voidedReason: order.voidedReason || '',
                items: normalizedItems,
                _legacyMigrated: Boolean(legacySampleGroup) || normalizedDevice.migrated
            };
        }

        function readOrdersFromStorage() {
            let orders = [];

            try {
                orders = JSON.parse(localStorage.getItem('materialOrders') || '[]');
            } catch (error) {
                orders = [];
            }

            if (!Array.isArray(orders)) {
                orders = [];
            }

            let hasLegacyMigration = false;
            const normalizedOrders = orders
                .map((order, index) => {
                    const normalizedOrder = normalizeOrder(order, index);
                    if (!normalizedOrder) return null;
                    if (normalizedOrder._legacyMigrated) {
                        hasLegacyMigration = true;
                    }
                    const { _legacyMigrated, ...persistedOrder } = normalizedOrder;
                    return persistedOrder;
                })
                .filter(Boolean)
                .sort((a, b) => new Date(b.createTime).getTime() - new Date(a.createTime).getTime());

            if (normalizedOrders.length > 0) {
                if (hasLegacyMigration) {
                    localStorage.setItem('materialOrders', JSON.stringify(normalizedOrders));
                }
                return normalizedOrders;
            }

            const sampleOrders = createSampleOrders();
            localStorage.setItem('materialOrders', JSON.stringify(sampleOrders));
            return sampleOrders;
        }

        function init() {
            loadOrders();

        // 加载发货单
        function loadOrders() {
            currentRequesterProfile = getCurrentRequesterProfile();
            currentOrdersAccess = resolveCurrentOrdersAccess();
            currentOrders = readOrdersFromStorage();
            syncMaterialsReturnEntry();
            syncFilterTabs();
            renderOrders();
            updateBadges();
        }

        function isOwnOrder(order, requester = currentRequesterProfile) {
            if (!order) return false;
            const requesterPhone = String(requester?.phone || '').trim();
            const orderPhone = String(order.requestedByPhone || '').trim();
            if (requesterPhone && orderPhone) {
                return requesterPhone === orderPhone;
            }
            return String(order.requestedBy || '').trim() === String(requester?.name || '当前用户').trim();
        }

        function canAccessOrderInScope(order, access = currentOrdersAccess) {
            if (!order) return false;
            if (isOwnOrder(order)) return true;
            if (!canViewAllOrdersTab(access)) return false;
            if (!access || !access.isScoped) return true;
            const visibleDeviceSet = new Set((Array.isArray(access.visibleDeviceIds) ? access.visibleDeviceIds : [])
                .map((deviceId) => String(deviceId || '').trim())
                .filter(Boolean));
            return visibleDeviceSet.has(String(order.deviceId || '').trim());
        }

        function canVoidOrder(order, requester = currentRequesterProfile) {
            return Boolean(order) && order.status === 'pending' && isOwnOrder(order, requester);
        }

        function getVisibleOrdersByFilter(filter = currentFilter) {
            if (filter === 'mine') {
                return currentOrders.filter(order => isOwnOrder(order));
            }
            return currentOrders.filter(order => canAccessOrderInScope(order));
        }

        function getOrderStatusMeta(order) {
            if (order.status === 'voided') {
                return { text: '已作废', className: 'voided', color: 'var(--danger)' };
            }
            if (order.status === 'completed') {
                return { text: '已完成', className: 'completed', color: 'var(--success)' };
            }
            return { text: '待发货', className: 'pending', color: 'var(--warning)' };
        }

        function getEmptyTextByFilter(filter = currentFilter) {
            if (filter === 'mine') return '暂无我的发货单';
            if (filter === 'all') return '暂无可查看的全部发货单';
            return '暂无可查看的发货单';
        }

        function syncFilterTabs() {
            const allOrdersTab = document.getElementById('allOrdersTab');
            const myOrdersTab = document.getElementById('myOrdersTab');
            const showAllOrdersTab = canViewAllOrdersTab();

            if (allOrdersTab) {
                if (showAllOrdersTab) {
                    allOrdersTab.style.display = '';
                } else {
                    allOrdersTab.style.display = 'none';
                }
                allOrdersTab.classList.toggle('hidden', !showAllOrdersTab);
            }

            if (currentFilter === 'all' && !showAllOrdersTab) {
                currentFilter = 'mine';
            }

            [allOrdersTab, myOrdersTab].forEach(tab => {
                if (tab) tab.classList.remove('active');
            });

            if (currentFilter === 'all' && allOrdersTab && showAllOrdersTab) {
                allOrdersTab.classList.add('active');
            } else if (myOrdersTab) {
                myOrdersTab.classList.add('active');
            }
        }

        // 更新徽章数字
        function updateBadges() {
            const badgeAll = document.getElementById('badgeAll');
            const badgeMine = document.getElementById('badgeMine');
            const allCount = getVisibleOrdersByFilter('all').length;
            const mineCount = getVisibleOrdersByFilter('mine').length;

            if (badgeAll) {
                badgeAll.textContent = allCount;
                badgeAll.classList.toggle('show', allCount > 0);
                badgeAll.classList.toggle('hide', allCount === 0);
            }

            if (badgeMine) {
                badgeMine.textContent = mineCount;
                badgeMine.classList.toggle('show', mineCount > 0);
                badgeMine.classList.toggle('hide', mineCount === 0);
            }
        }

        // 切换筛选
        function switchTab(filter) {
            if (filter === 'all' && !canViewAllOrdersTab()) {
                return;
            }
            currentFilter = filter;
            syncFilterTabs();
            renderOrders();
            updateBadges();
        }

            return String(value == null ? '' : value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { border: 1px solid #d1d5db; padding: 10px 12px; text-align: left; font-size: 13px; }
        th { background: #f9fafb; }
        .note { margin-top: 20px; font-size: 13px; color: #374151; }
    </style>
</head>
<body>
    <h1>发货单</h1>
    <div class="meta">
        <div class="meta-item"><strong>发货单号</strong><span>${escapeHtml(order.id)}</span></div>
        <div class="meta-item"><strong>状态</strong><span class="status">${escapeHtml(statusMeta.text)}</span></div>
        <div class="meta-item"><strong>申请人</strong><span>${escapeHtml(order.requestedBy || '未知')}</span></div>
        <div class="meta-item"><strong>设备点位</strong><span>${escapeHtml(deviceInfo)}</span></div>
        <div class="meta-item"><strong>创建时间</strong><span>${escapeHtml(formatDateTime(order.createTime))}</span></div>
        <div class="meta-item"><strong>发货时间</strong><span>${escapeHtml(formatDateTime(order.deliveryTime))}</span></div>
    </div>
    <table>
        <thead>
            <tr>
                <th>物料名称</th>
                <th>商品编码</th>
                <th>数量</th>
            </tr>
        </thead>
        <tbody>
            ${itemRows}
        </tbody>
    </table>
    <div class="note"><strong>备注：</strong>${escapeHtml(noteText)}</div>
    ${voidedReasonText ? `<div class="note"><strong>作废原因：</strong>${escapeHtml(voidedReasonText)}</div>` : ''}
</body>
</html>`;
        }

        function printOrder(orderId) {
            const order = currentOrders.find(item => item.id === orderId);
            if (!order) return;

            const printWindow = window.open('', '_blank', 'width=960,height=720');
            if (!printWindow) {
                showToast('请允许浏览器打开打印窗口', 'error');
                return;
            }

            printWindow.document.write(buildPrintOrderHtml(order));
            printWindow.document.close();
            printWindow.focus();
            setTimeout(() => {
                printWindow.print();
            }, 160);
        }

        // 显示详情
        function showDetail(orderId) {
            const order = currentOrders.find(o => o.id === orderId);
            if (!order) return;

            const statusMeta = getOrderStatusMeta(order);
            const timeStr = formatDateTime(order.deliveryTime);
            const createStr = formatDateTime(order.createTime);
            const deviceInfo = order.deviceId ? `${order.deviceId} · ${order.location || ''}` : '未指定';
            const requester = order.requestedBy || '未知';
            const canVoid = canVoidOrder(order);

            let handlerInfo = '';
            if (order.status === 'completed' && order.completedBy) {
                const completedStr = formatDateTime(order.completedTime);
                handlerInfo = `
                <div class="detail-section">
                    <div class="detail-label">处理信息</div>
                    <div class="detail-value" style="color: var(--success);">
                        ✓ 由 ${order.completedBy} 于 ${completedStr} 完成
                    </div>
                </div>
                `;
            } else if (order.status === 'voided' && order.voidedBy) {
                const voidedStr = formatDateTime(order.voidedTime);
                handlerInfo = `
                <div class="detail-section">
                    <div class="detail-label">作废信息</div>
                    <div class="detail-value" style="color: var(--danger);">
                        ✕ 由 ${order.voidedBy} 于 ${voidedStr} 作废
                    </div>
                </div>
                `;
            }

            document.getElementById('modalBody').innerHTML = `
                <div class="detail-section">
                    <div class="detail-label">发货单号</div>
                    <div class="detail-value">${order.id}</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">状态</div>
                    <div class="detail-value" style="color: ${statusMeta.color};">${statusMeta.text}</div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">申请信息</div>
                    <div class="detail-value" style="font-size: 13px; line-height: 1.6;">
                        <div>👤 申请人: ${requester}</div>
                        <div>📍 设备: ${deviceInfo}</div>
                        <div>🕐 创建时间: ${createStr}</div>
                    </div>
                </div>
                <div class="detail-section">
                    <div class="detail-label">发货时间</div>
                    <div class="detail-value">${timeStr}</div>
                </div>
                ${handlerInfo}
                ${order.voidedReason ? `
                <div class="detail-section">
                    <div class="detail-label">作废原因</div>
                    <div class="detail-value" style="color: var(--text-secondary);">${order.voidedReason}</div>
                </div>
                ` : ''}
                <div class="detail-section">
                    <div class="detail-label">物料明细 (${order.items.length})</div>
                    <div class="detail-items">
                        ${order.items.map(item => `
                            <div class="detail-item">
                                <div class="detail-item-main">
                                    <span class="detail-item-name">${item.name}</span>
                                    ${item.laneName ? `<div class="detail-item-code">货道名称：${item.laneName}</div>` : ''}
                                    <div class="detail-item-code">商品编码：${item.materialNumber || item.code}</div>
                                </div>
                                <span class="detail-item-qty">+${item.quantity} ${item.unit}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
                ${order.note ? `
                <div class="detail-section">
                    <div class="detail-label">备注</div>
                    <div class="detail-value" style="color: var(--text-secondary);">${order.note}</div>
                </div>
                ` : ''}
            `;

            const footer = document.getElementById('modalFooter');
            footer.innerHTML = `
                <button class="btn btn-default" onclick="closeDetailModal()">关闭</button>
                <button class="btn btn-default btn-print" onclick="printOrder('${order.id}')">打印发货单</button>
                ${canVoid ? `<button class="btn btn-default btn-void" onclick="voidOrder('${order.id}'); closeDetailModal();">作废</button>` : ''}
            `;

            document.getElementById('detailModal').classList.add('active');
        }

        // 关闭详情弹窗
        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
        }

        function voidOrder(orderId) {
            const orderIndex = currentOrders.findIndex(o => o.id === orderId);
            if (orderIndex === -1) return;

            const targetOrder = currentOrders[orderIndex];
            if (!canVoidOrder(targetOrder)) {
                showToast('仅可作废自己待发货的发货单', 'error');
                return;
            }

            if (typeof window.confirm === 'function' && !window.confirm(`确认作废发货单 ${targetOrder.id} 吗？`)) {
                return;
            }

            const rawVoidedReason = typeof window.prompt === 'function'
                ? window.prompt('请输入作废原因', targetOrder.voidedReason || '')
                : '';
            if (rawVoidedReason === null) {
                return;
            }

            const voidedReason = String(rawVoidedReason || '').trim();
            if (!voidedReason) {
                showToast('请输入作废原因', 'error');
                return;
            }

            currentOrders[orderIndex].status = 'voided';
            currentOrders[orderIndex].voidedBy = currentRequesterProfile.name;
            currentOrders[orderIndex].voidedTime = new Date().toISOString();
            currentOrders[orderIndex].voidedReason = voidedReason;

            localStorage.setItem('materialOrders', JSON.stringify(currentOrders));
            currentOrders = readOrdersFromStorage();
            syncFilterTabs();
            renderOrders();
            updateBadges();
            showToast('发货单已作废', 'success');
        }

        // 格式化日期时间
        function formatDateTime(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            const pad = n => n.toString().padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
        }

        // 跳转添加物料
        function goToAdd() {
            window.location.href = 'materials-refill.html';
        }

        // 返回
        function goBack() {
            if (readMaterialsShipmentReturnContext()) {
                returnToMaterialsPage();
                return;
            }
            window.location.href = 'materials.html';
        }

        // 显示提示
        function showToast(message, type = 'normal') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = type === 'success' ? 'toast success show' : 'toast show';
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // 点击弹窗外部关闭
        document.getElementById('detailModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeDetailModal();
            }
        });

        // 初始化
        init();
    </script>
</body>
</html>
